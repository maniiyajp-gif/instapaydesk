function WorkerDashboard({ state, user }) {
  const myTxns = state.transactions.filter(t=>t.workerId===user.id);
  const myCustomers = state.customers.filter(c=>c.workerId===user.id);
  const myCharges = myTxns.reduce((s,t)=>(s+(t.amount*t.serviceChargePct/100)+t.extraCharge),0);
  const today = new Date().toISOString().slice(0,10);
  const todayTxns = myTxns.filter(t=>t.date===today);
  const todayVolume = todayTxns.reduce((s,t)=>s+t.amount,0);

  // Today's tasks
  const todayTasks = (state.dailyTasks||[]).filter(t=>t.workerId===user.id&&t.type==='task'&&t.date===today&&!t.done);
  // Pending reminders (overdue + today)
  const pendingReminders = (state.dailyTasks||[]).filter(t=>t.workerId===user.id&&t.type==='reminder'&&!t.done&&t.reminderDate<=today).sort((a,b)=>a.reminderDate>b.reminderDate?1:-1);

  const myCustIds = myCustomers.map(c=>c.id);
  const myCards = state.cards.filter(k=>myCustIds.includes(k.customerId));

  return (
    <div className="content fade-in">
      <div className="stats-grid">
        <div className="stat-card blue"><div className="stat-icon">👤</div><div className="stat-label">My Customers</div><div className="stat-value">{myCustomers.length}</div></div>
        <div className="stat-card orange"><div className="stat-icon">📅</div><div className="stat-label">Today's Volume</div><div className="stat-value mono">₹{todayVolume.toLocaleString('en-IN')}</div><div className="stat-sub">{todayTxns.length} transactions</div></div>
        <div className="stat-card purple"><div className="stat-icon">✅</div><div className="stat-label">Today's Tasks</div><div className="stat-value">{todayTasks.length}</div><div className="stat-sub">{pendingReminders.length} reminders</div></div>
      </div>

      {/* ── Today's Tasks ───────────────────────────────────────────── */}
      {(todayTasks.length>0||pendingReminders.length>0) && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:24}}>

          {/* Today Tasks */}
          <div className="card-block" style={{padding:'16px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:14}}>✅ Today's Tasks</div>
              <span style={{fontSize:11,background:'rgba(59,130,246,0.12)',color:'var(--accent)',padding:'2px 9px',borderRadius:20,fontWeight:700}}>{todayTasks.length}</span>
            </div>
            {todayTasks.length===0
              ? <div style={{fontSize:12,color:'var(--text3)',textAlign:'center',padding:'12px'}}>All done! 🎉</div>
              : <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {todayTasks.slice(0,5).map(t=>{
                    const pColor = {high:'var(--red)',medium:'var(--orange)',low:'var(--green)'}[t.priority||'medium'];
                    return (
                      <div key={t.id} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'8px 10px',background:'var(--surface2)',borderRadius:9,border:`1px solid ${pColor}22`}}>
                        <div style={{width:8,height:8,borderRadius:'50%',background:pColor,flexShrink:0,marginTop:4}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</div>
                          {t.taskType==='bill'&&t.billAmount>0&&<div style={{fontSize:11,color:'var(--orange)',fontFamily:"'JetBrains Mono',monospace"}}>₹{t.billAmount.toLocaleString('en-IN')}</div>}
                        </div>
                        <span style={{fontSize:10,color:pColor,fontWeight:700,textTransform:'uppercase',flexShrink:0}}>{t.priority||'med'}</span>
                      </div>
                    );
                  })}
                  {todayTasks.length>5&&<div style={{fontSize:11,color:'var(--text3)',textAlign:'center'}}>+{todayTasks.length-5} more</div>}
                </div>
            }
          </div>

          {/* Payment Reminders */}
          <div className="card-block" style={{padding:'16px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:14}}>🔔 Payment Reminders</div>
              {pendingReminders.length>0&&<span style={{fontSize:11,background:'rgba(239,68,68,0.12)',color:'var(--red)',padding:'2px 9px',borderRadius:20,fontWeight:700}}>{pendingReminders.length}</span>}
            </div>
            {pendingReminders.length===0
              ? <div style={{fontSize:12,color:'var(--text3)',textAlign:'center',padding:'12px'}}>No pending reminders</div>
              : <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {pendingReminders.slice(0,5).map(t=>{
                    const cust = state.customers.find(c=>c.id===t.custIdR);
                    const isOverdue = t.reminderDate<today;
                    return (
                      <div key={t.id} style={{padding:'8px 10px',background:isOverdue?'rgba(239,68,68,0.06)':'rgba(245,158,11,0.05)',borderRadius:9,border:`1px solid ${isOverdue?'rgba(239,68,68,0.25)':'rgba(245,158,11,0.25)'}`}}>
                        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                          {isOverdue&&<span style={{fontSize:9,background:'var(--red)',color:'#fff',padding:'1px 5px',borderRadius:4,fontWeight:700}}>OVERDUE</span>}
                          <span style={{fontSize:12,fontWeight:600,color:'var(--text)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</span>
                        </div>
                        <div style={{display:'flex',gap:8,fontSize:11,color:'var(--text3)'}}>
                          <span>📅 {t.reminderDate}</span>
                          {cust&&<span>👤 {cust.name}</span>}
                          {t.amount>0&&<span style={{color:'var(--orange)',fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>₹{t.amount.toLocaleString('en-IN')}</span>}
                        </div>
                      </div>
                    );
                  })}
                  {pendingReminders.length>5&&<div style={{fontSize:11,color:'var(--text3)',textAlign:'center'}}>+{pendingReminders.length-5} more</div>}
                </div>
            }
          </div>
        </div>
      )}

      {/* ── Recent Transactions ─────────────────────────────────────── */}
      <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>Recent Transactions</div>
      <div className="table-wrap">
        <table>
          <thead><tr><th>Ref</th><th>Customer</th><th>Card</th><th>Amount</th><th>Total Debit</th><th>Mode</th><th>Date</th></tr></thead>
          <tbody>
            {myTxns.slice(0,5).map(t=>{
              const c=state.customers.find(x=>x.id===t.customerId);
              const card=state.cards.find(x=>x.id===t.cardId);
              return <tr key={t.id}>
                <td className="text-mono text-accent" style={{fontSize:11}}>{t.txnRef}</td>
                <td>{c?.name}</td>
                <td className="text-mono">****{card?.last4}</td>
                <td className="debit-col">₹{t.amount.toLocaleString('en-IN')}</td>
                <td className="debit-col">₹{calcTotal(t).toLocaleString('en-IN',{maximumFractionDigits:0})}</td>
                <td><span className="chip chip-blue" style={{fontSize:10}}>{t.paymentMode}</span></td>
                <td className="text-sm">{t.date}</td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function DocUploadBox({ label, docKey, docs, onUpload, onRemove, required=true }) {
  const fileRef = React.useRef();
  const img = docs[docKey];
  const icons = { aadharFront:'🪪', aadharBack:'🪪', pan:'📋' };
  return (
    <div className={`doc-upload-box ${required?'required':''} ${img?'uploaded':''}`}>
      <div className="doc-upload-header">
        <span style={{fontSize:14}}>{icons[docKey]||'📄'}</span>
        <span className="doc-upload-label">{label}</span>
        {img ? <span className="doc-ok-badge">✓ Uploaded</span> : <span className="doc-required-badge">Required</span>}
      </div>
      <div className="doc-preview-area" onClick={()=>!img&&fileRef.current.click()}>
        {img
          ? <>
              <img src={img} className="doc-preview-img" alt={label} />
              <div className="doc-remove-btn" onClick={e=>{e.stopPropagation();onRemove(docKey);}}>✕</div>
            </>
          : <div className="doc-placeholder">
              <div className="doc-placeholder-icon">📤</div>
              <div className="doc-placeholder-text">Click to upload<br/><span style={{fontSize:10,color:'var(--text3)'}}>JPG, PNG, PDF</span></div>
            </div>
        }
      </div>
      <input ref={fileRef} type="file" accept="image/*,application/pdf" style={{display:'none'}} onChange={e=>{
        const f=e.target.files[0]; if(!f) return;
        const reader=new FileReader();
        reader.onload=ev=>onUpload(docKey, ev.target.result);
        reader.readAsDataURL(f);
        e.target.value='';
      }} />
    </div>
  );
}

    if (!form.name) return alert('Customer name is required');

    const custId = 'C'+Date.now();
    dispatch({ type:'ADD_CUSTOMER', payload:{ ...form, id:custId, workerId:user.id, status:'active' } });
    // If opening balance set, add ledger entry via a transaction-like payment record
    if(parseFloat(form.openingBalance||0) !== 0) {

        dispatch({ type:'ADD_TRANSACTION', payload:{
          id:'OB'+Date.now(), workerId:user.id, customerId:custId,
          date:new Date().toISOString().slice(0,10), amount:ob,
          serviceChargePct:0, extraCharge:0,

        }});
      } else {
        // Negative opening balance = we owe customer (credit in ledger)
        dispatch({ type:'ADD_PAYMENT', payload:{
          id:'OB'+Date.now(), workerId:user.id, customerId:custId,
          date:new Date().toISOString().slice(0,10), amount:Math.abs(ob),

</style></head><body>

${c.status==='blocked'||c.status==='inactive'?`<div class="inactive-box"><strong style="color:#dc2626;">⚠️ Account Status: ${c.status.toUpperCase()}</strong>${c.inactiveReason?`<br/><span style="font-size:13px;color:#7f1d1d;">Reason: ${c.inactiveReason}</span>`:''}${c.inactiveDate?`<span style="font-size:12px;color:#b91c1c;margin-left:12px;">Date: ${c.inactiveDate}</span>`:''}${c.inactiveBy?`<span style="font-size:12px;color:#b91c1c;margin-left:12px;">By: ${c.inactiveBy}</span>`:''}</div>`:''}

  function calcCustOutstanding(custId) {
    const txns = state.transactions.filter(t=>t.customerId===custId);
    const transfers = (state.transfers||[]).filter(t=>t.customerId===custId&&t.workerId===user.id);
    let bal = 0;
    const sorted = [...txns.map(t=>({...t,_type:'txn'})),...transfers.map(t=>({...t,_type:'transfer'}))].sort((a,b)=>a.date>b.date?1:-1);
    sorted.forEach(e=>{
      if(e._type==='transfer'){ bal += e.direction==='customer_to_bank'?-e.amount:e.amount; return; }
      if(e.isPayment||e.isBillPayment){ bal -= e.amount; return; }
      if(e.isOpeningBalance&&!e.isPayment){ bal += e.amount; return; }
      bal += e.amount;
      const sc = (e.amount*(e.serviceChargePct||0)/100)+(parseFloat(e.extraCharge)||0);
      if(sc>0) bal -= sc;
    });
    return bal;
  }

  function openComplaint(c) {
    setComplaintCust(c);
    setComplaintText('');
    setComplaintType('');
    setComplaintCardId('');
    // pre-compute outstanding ledger items for this customer
    const txns = state.transactions.filter(t=>t.customerId===c.id);
    const transfers = (state.transfers||[]).filter(t=>t.customerId===c.id&&t.workerId===user.id);
    let bal = 0;
    const sorted = [...txns.map(t=>({...t,_type:'txn'})),...transfers.map(t=>({...t,_type:'transfer'}))].sort((a,b)=>a.date>b.date?1:-1);
    const rows = [];
    sorted.forEach(e=>{
      if(e._type==='transfer'){
        if(e.direction==='customer_to_bank'){ bal-=e.amount; rows.push({date:e.date,desc:'Payment — '+e.bankName,debit:0,credit:e.amount,bal}); }
        else { bal+=e.amount; rows.push({date:e.date,desc:'Amount Given — '+e.bankName,debit:e.amount,credit:0,bal}); }
        return;
      }
      if(e.isPayment||e.isBillPayment){ bal-=e.amount; rows.push({date:e.date,desc:e.isBillPayment?'Bill Payment':'Payment',debit:0,credit:e.amount,bal}); return; }
      if(e.isOpeningBalance&&!e.isPayment){ bal+=e.amount; rows.push({date:e.date,desc:'Opening Balance',debit:e.amount,credit:0,bal}); return; }
      const card=state.cards.find(k=>k.id===e.cardId);
      bal+=e.amount; rows.push({date:e.date,desc:'Card Swipe'+(card?' ****'+card.last4:''),debit:e.amount,credit:0,bal});
      const sc=(e.amount*(e.serviceChargePct||0)/100)+(parseFloat(e.extraCharge)||0);
      if(sc>0){ bal-=sc; rows.push({date:e.date,desc:'  └ Service Charge',debit:0,credit:sc,bal}); }
    });
    setComplaintOutstandingItems(rows);
  }

  function submitComplaint() {
    if (!complaintType) return alert('Please select complaint type');
    if (!complaintText.trim()) return alert('Please describe the issue');
    if (complaintType==='chargeback' && !complaintCardId) return alert('Please select the card for chargeback');
    if (complaintType==='cyber' && !complaintCardId) return alert('Please select the card for cyber fraud');
    const card = complaintCardId ? state.cards.find(k=>k.id===complaintCardId) : null;
    const outstanding = calcCustOutstanding(complaintCust.id);
    dispatch({ type:'ADD_COMPLAINT', payload:{
      id:'COMP'+Date.now(), workerId:user.id, customerId:complaintCust.id,
      customerName:complaintCust.name, workerName:user.name,
      complaintType,
      cardId: complaintCardId||null,
      cardInfo: card ? { bank:card.bank, last4:card.last4, cardNumber:card.cardNumber } : null,
      outstandingAmount: complaintType==='outstanding' ? outstanding : null,
      outstandingLedger: complaintType==='outstanding' ? complaintOutstandingItems : null,
      text:complaintText.trim(), date:new Date().toISOString().slice(0,10),
      status:'pending'
    }});
    setComplaintText(''); setComplaintCust(null); setComplaintType(''); setComplaintCardId('');
    setComplaintSuccess(true); setTimeout(()=>setComplaintSuccess(false), 3000);
  }

  return (
    <div className="content fade-in">
      {viewDocsCust && <DocsViewModal customer={viewDocsCust} onClose={()=>setViewDocsCust(null)} />}
      {complaintSuccess && <div className="alert-banner alert-success">✅ Complaint reported to Admin successfully!</div>}

      {/* Complaint Modal */}
      {complaintCust && (
        <div className="modal-overlay" onClick={()=>setComplaintCust(null)}>
          <div className="modal" style={{width:560,maxWidth:'95vw'}} onClick={e=>e.stopPropagation()}>
            <div className="modal-title">🚨 Report / Complaint</div>
            <div className="modal-sub">This complaint will be sent to Admin for review.</div>
            {/* Customer info */}
            <div style={{background:'rgba(59,130,246,0.07)',border:'1px solid rgba(59,130,246,0.2)',borderRadius:10,padding:'10px 14px',marginBottom:16,display:'flex',gap:10,alignItems:'center'}}>
              <div className="avatar avatar-green">{complaintCust.name[0]}</div>
              <div>
                <div style={{fontWeight:700,fontSize:13}}>{complaintCust.name}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{complaintCust.mobile}</div>
              </div>
            </div>

            {/* Type selector */}
            <div className="form-group">
              <label className="form-label">Complaint Type *</label>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginTop:4}}>
                {[{id:'cyber',icon:'🛡️',label:'Cyber Fraud'},{id:'chargeback',icon:'↩️',label:'Chargeback'},{id:'outstanding',icon:'💰',label:'Outstanding'}].map(t=>(
                  <button key={t.id} onClick={()=>{setComplaintType(t.id);setComplaintCardId('');}} style={{padding:'12px 8px',border:`2px solid ${complaintType===t.id?'var(--red)':'var(--border2)'}`,borderRadius:12,background:complaintType===t.id?'rgba(239,68,68,0.1)':'var(--surface2)',cursor:'pointer',textAlign:'center',fontFamily:"'Sora',sans-serif",transition:'all 0.2s'}}>
                    <div style={{fontSize:22,marginBottom:4}}>{t.icon}</div>
                    <div style={{fontSize:12,fontWeight:700,color:complaintType===t.id?'var(--red)':'var(--text)'}}>{t.label}</div>
                  </button>
                ))}
              </div>
            </div>

            {/* Chargeback: card dropdown */}
            {complaintType==='chargeback' && <ChargebackCardSelect state={state} complaintCust={complaintCust} complaintCardId={complaintCardId} setComplaintCardId={setComplaintCardId} />}

            {/* Cyber Fraud: card dropdown */}
            {complaintType==='cyber' && <CardSelectDropdown state={state} complaintCust={complaintCust} complaintCardId={complaintCardId} setComplaintCardId={setComplaintCardId} label="Select Card (Cyber Fraud) *" accentColor="var(--red)" accentBg="rgba(239,68,68,0.08)" prefix="🛡️ Cyber fraud on:" />}

            {/* Outstanding: show ledger summary */}
            {complaintType==='outstanding' && <OutstandingSummary outstanding={calcCustOutstanding(complaintCust.id)} items={complaintOutstandingItems} />}

            {/* Description */}
            {complaintType && (
              <div className="form-group">
                <label className="form-label">
                  {complaintType==='cyber'?'Describe the Cyber Fraud *':complaintType==='chargeback'?'Chargeback Details *':'Outstanding Recovery Notes *'}
                </label>
                <textarea
                  className="form-input"
                  rows={3}
                  placeholder={
                    complaintType==='cyber'?'Describe the suspicious/fraudulent activity...' :
                    complaintType==='chargeback'?'Describe the chargeback reason, transaction details...' :
                    'Describe recovery attempts, customer response, contact history...'
                  }
                  value={complaintText}
                  onChange={e=>setComplaintText(e.target.value)}
                  style={{resize:'vertical'}}
                />
                <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>{complaintText.length} characters</div>
              </div>
            )}

            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setComplaintCust(null)}>Cancel</button>
              <button className="btn btn-danger" onClick={submitComplaint} disabled={!complaintType}>🚨 Submit Report</button>
            </div>
          </div>
        </div>
      )}

      <div className="table-wrap">
        <div className="table-header">
          <div className="table-title">👤 My Customers ({myCustomers.length})</div>
          <div className="table-actions">
            <input className="search-input" placeholder="Name / Mobile / Ref No..." value={search} onChange={e=>setSearch(e.target.value)} />
            <button className="btn btn-sm btn-primary" onClick={()=>setShowModal(true)}>+ Add Customer</button>
          </div>
        </div>
        <table>
          <thead><tr><th>Customer</th><th>Mobile</th><th>Reference Name</th><th>Ref. Number</th><th>Address</th><th>KYC Docs</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            {myCustomers.map(c=>(
              <tr key={c.id} style={{background:c.status==='blocked'||c.status==='inactive'?'rgba(239,68,68,0.03)':undefined}}>
                <td><div className="flex-center"><div className="avatar avatar-green">{c.name[0]}</div><div><div className="fw-600">{c.name}</div><div className="text-sm">{c.remarks||''}</div></div></div></td>
                <td className="text-mono">{c.mobile}</td>
                <td className="text-sm fw-600">{c.ref||'—'}</td>
                <td className="text-mono text-sm">{c.refNumber||'—'}</td>
                <td className="text-sm">{c.address}</td>
                <td>
                  <div className="doc-status-row">
                    <span className={`chip ${c.docs?.aadharFront?'chip-green':'chip-red'}`} style={{fontSize:10}}>Aadhar F {c.docs?.aadharFront?'✓':'✗'}</span>
                    <span className={`chip ${c.docs?.aadharBack?'chip-green':'chip-red'}`} style={{fontSize:10}}>Aadhar B {c.docs?.aadharBack?'✓':'✗'}</span>
                    <span className={`chip ${c.docs?.pan?'chip-green':'chip-red'}`} style={{fontSize:10}}>PAN {c.docs?.pan?'✓':'✗'}</span>
                  </div>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>{docCount(c)}/3 uploaded</div>
                </td>
                <td>
                  <span className={`status-badge status-${c.status==='blocked'?'fraud':c.status}`}>{c.status}</span>
                  {(c.status==='blocked'||c.status==='inactive') && c.inactiveReason && (
                    <div style={{fontSize:10,color:'var(--red)',marginTop:4,maxWidth:140}}>
                      ⚠️ {c.inactiveReason}
                    </div>
                  )}
                </td>
                <td>
                  <div className="action-btns" style={{flexWrap:'wrap',gap:5}}>
                    <button className="btn btn-sm btn-outline" style={{fontSize:11}} onClick={()=>setViewDocsCust(c)}>📂 KYC</button>
                    <button className="btn btn-sm btn-danger" style={{fontSize:11}} onClick={()=>openComplaint(c)}>🚨 Report</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {showModal && <div className="modal-overlay" onClick={()=>setShowModal(false)}>
        <div className="modal modal-lg" style={{width:700}} onClick={e=>e.stopPropagation()}>
          <div className="modal-title">Add New Customer</div>
          <div className="modal-sub">All fields marked * and all 3 KYC documents are mandatory.</div>

          <div className="form-row">
            <div className="form-group"><label className="form-label">Customer Name *</label><input className="form-input" placeholder="Full Name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} /></div>
            <div className="form-group"><label className="form-label">Mobile Number *</label><input className="form-input" placeholder="10-digit mobile" value={form.mobile} onChange={e=>setForm({...form,mobile:e.target.value})} /></div>
          </div>

          <div style={{background:'rgba(59,130,246,0.06)',border:'1px solid rgba(59,130,246,0.2)',borderRadius:10,padding:'14px 16px',marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--accent)',marginBottom:10,textTransform:'uppercase',letterSpacing:'0.06em'}}>Reference Information (Mandatory)</div>
            <div className="form-row">
              <div className="form-group" style={{marginBottom:0}}><label className="form-label">Reference Name *</label><input className="form-input" placeholder="Who referred this customer?" value={form.ref} onChange={e=>setForm({...form,ref:e.target.value})} /></div>
              <div className="form-group" style={{marginBottom:0}}><label className="form-label">Reference Mobile / Number *</label><input className="form-input text-mono" placeholder="Reference contact number" value={form.refNumber} onChange={e=>setForm({...form,refNumber:e.target.value})} /></div>
            </div>
          </div>

          <div className="form-group"><label className="form-label">Address</label><input className="form-input" placeholder="Full Address" value={form.address} onChange={e=>setForm({...form,address:e.target.value})} /></div>

          <div style={{background:'rgba(16,185,129,0.06)',border:'1px solid rgba(16,185,129,0.2)',borderRadius:10,padding:'14px 16px',marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--green)',marginBottom:6}}>Opening Balance</div>
            <div className="form-row" style={{marginBottom:0}}>
              <div className="form-group" style={{marginBottom:0}}>
                <label className="form-label">Amount (₹)</label>
                <input className="form-input text-mono" style={{fontSize:17}} placeholder="0.00" value={form.openingBalance} onChange={e=>setForm({...form,openingBalance:e.target.value})} />
              </div>
              <div style={{flex:1,paddingTop:28,fontSize:12,color:'var(--text3)',lineHeight:1.6}}>
                <strong style={{color:'var(--text2)'}}>Positive:</strong> Customer aapna paisa baaki che (amne malshe)<br/>
                <strong style={{color:'var(--text2)'}}>Negative:</strong> Amne customer ne aapva padse<br/>
                <strong style={{color:'var(--text2)'}}>0:</strong> No opening balance
              </div>
            </div>
          </div>

          <div style={{marginBottom:6}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--text)',marginBottom:4,display:'flex',alignItems:'center',gap:8}}>
              KYC Document Upload
              <span style={{fontSize:11,color:'var(--red)',fontWeight:600}}>— All 3 documents are mandatory</span>
            </div>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:12}}>Upload clear photo/scan of each document. Supported: JPG, PNG, PDF.</div>
          </div>

          <div className="doc-upload-grid">
            <DocUploadBox label="Aadhar Card – Front" docKey="aadharFront" docs={form.docs} onUpload={handleDocUpload} onRemove={handleDocRemove} />
            <DocUploadBox label="Aadhar Card – Back" docKey="aadharBack" docs={form.docs} onUpload={handleDocUpload} onRemove={handleDocRemove} />
            <DocUploadBox label="PAN Card" docKey="pan" docs={form.docs} onUpload={handleDocUpload} onRemove={handleDocRemove} />
          </div>

          <div style={{display:'flex',gap:8,marginBottom:16}}>
            {[{key:'aadharFront',label:'Aadhar Front'},{key:'aadharBack',label:'Aadhar Back'},{key:'pan',label:'PAN Card'}].map(d=>(
              <span key={d.key} className={`chip ${form.docs[d.key]?'chip-green':'chip-red'}`} style={{fontSize:11}}>{d.label}: {form.docs[d.key]?'✓ Ready':'✗ Missing'}</span>
            ))}
          </div>

          <div className="form-row">
            <div className="form-group"><label className="form-label">Aadhaar Number</label><input className="form-input text-mono" placeholder="XXXX XXXX XXXX" maxLength={14} value={form.aadharNumber||''} onChange={e=>setForm({...form,aadharNumber:e.target.value.replace(/\D/g,'').slice(0,12).replace(/(\d{4})(\d{4})(\d{0,4})/,'$1 $2 $3').trim()})} /></div>
            <div className="form-group"><label className="form-label">PAN Card Number</label><input className="form-input text-mono" placeholder="ABCDE1234F" maxLength={10} value={form.panNumber||''} onChange={e=>setForm({...form,panNumber:e.target.value.toUpperCase().slice(0,10)})} /></div>
          </div>
          <div className="form-group"><label className="form-label">Remarks</label><textarea className="form-input" placeholder="Any remarks or notes..." value={form.remarks} onChange={e=>setForm({...form,remarks:e.target.value})} /></div>

          <div className="modal-footer">
            <button className="btn btn-secondary" onClick={()=>setShowModal(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={addCustomer}>Add Customer</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

function CardsPage({ state, dispatch, user }) {
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ customerId:'', holder:'', bank:'', cardNumberRaw:'', billing:'', due:'', limit:'', color:'blue' });
  const [expandedCusts, setExpandedCusts] = useState({});   // { custId: true/false }
  const [selectedCard, setSelectedCard] = useState(null);    // clicked card id for detail
  const [detailTab, setDetailTab] = useState('info');
  const [cardSearch, setCardSearch] = useState('');          // last 4 digit search

  const myCustomers = state.customers.filter(c=>c.workerId===user.id);
  const myCustomerIds = myCustomers.map(c=>c.id);
  const allMyCards = state.cards.filter(k=>myCustomerIds.includes(k.customerId));

  // ── Due priority ──────────────────────────────────────────────────────────
  const todayDay = new Date().getDate();
  function getDueDays(due) {
    const d = parseInt(due)||31;
    let diff = d - todayDay;
    if (diff < 0) diff += 30;
    return diff;
  }
  function getDueBadge(due) {
    const d = getDueDays(due);
    if (d <= 0) return { cls:'due-overdue', label:'OVERDUE', priority:0 };
    if (d <= 3) return { cls:'due-urgent',  label:d+'d left', priority:1 };
    if (d <= 7) return { cls:'due-soon',    label:d+'d left', priority:2 };
    return       { cls:'due-ok',            label:'Due '+due+'th', priority:3 };
  }

  // ── Filter cards by last-4 search ─────────────────────────────────────────
  const searchFiltered = cardSearch.trim()===''
    ? allMyCards
    : allMyCards.filter(k=>(k.last4||'').includes(cardSearch.trim())||(k.cardNumber||'').slice(-4).includes(cardSearch.trim()));

  // ── Group by customer, sort customers by most-urgent card ─────────────────
  const custGroups = myCustomers.map(c=>{
    const cards = searchFiltered.filter(k=>k.customerId===c.id)
      .sort((a,b)=>getDueDays(a.due)-getDueDays(b.due));
    return { cust:c, cards };
  }).filter(g=>g.cards.length>0)
    .sort((a,b)=>getDueDays(a.cards[0]?.due)-getDueDays(b.cards[0]?.due));

  // ── Card form helpers ─────────────────────────────────────────────────────
  const rawDigits = form.cardNumberRaw.replace(/\D/g,'');
  const isValid16 = rawDigits.length===16;
  const livePreview = rawDigits.length>0?maskCard(rawDigits):'#### **** **## ######';

  function addCard() {
    if (!form.customerId) return alert('Select a customer');
    if (!form.holder)     return alert('Card holder name required');
    if (!form.bank)       return alert('Bank name required');
    if (!isValid16)       return alert('Enter valid 16-digit card number');
    const digits = rawDigits;
    dispatch({ type:'ADD_CARD', payload:{ ...form, cardNumber:digits, last4:digits.slice(-4), first4:digits.slice(0,4), id:'K'+Date.now(), addedByWorkerId:user.id, addedByName:user.name, addedDate:new Date().toISOString().slice(0,10) } });
    setShowModal(false);
    setForm({ customerId:'', holder:'', bank:'', cardNumberRaw:'', billing:'', due:'', limit:'', color:'blue' });
  }

  function toggleCust(id) { setExpandedCusts(p=>({...p,[id]:!p[id]})); setSelectedCard(null); }
  function toggleCard(id) { setSelectedCard(p=>p===id?null:id); setDetailTab('info'); }

  const selCard = allMyCards.find(x=>x.id===selectedCard);
  const selCust = selCard ? state.customers.find(c=>c.id===selCard.customerId) : null;
  const selTxns = selectedCard ? state.transactions.filter(t=>t.cardId===selectedCard).sort((a,b)=>b.date>a.date?1:-1) : [];

  return (
    <div className="content fade-in">

      {/* ── Search + Add ────────────────────────────────────────────── */}
      <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:20,flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:220,position:'relative'}}>
          <input
            className="search-input"
            style={{width:'100%',paddingLeft:36,fontSize:13}}
            placeholder="Search by last 4 digits of card (e.g. 4521)..."
            value={cardSearch}
            onChange={e=>setCardSearch(e.target.value.replace(/\D/g,'').slice(0,4))}
            maxLength={4}
          />
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:14,opacity:0.5}}>🔍</span>
          {cardSearch && <span onClick={()=>setCardSearch('')} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',cursor:'pointer',fontSize:13,color:'var(--text3)'}}>✕</span>}
          {cardSearch && <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>{searchFiltered.length} card(s) found for ****{cardSearch}</div>}
        </div>
        <button className="btn btn-sm btn-primary" style={{whiteSpace:'nowrap'}} onClick={()=>setShowModal(true)}>+ Add Card</button>
      </div>

      {/* ── Customer-grouped card list ──────────────────────────────── */}
      {custGroups.length===0 && <div className="empty-state"><div className="empty-icon">💳</div><div className="empty-text">No cards{cardSearch?` matching ****${cardSearch}`:''}</div></div>}

      {custGroups.map(({cust, cards})=>{
        const isExpanded = expandedCusts[cust.id] !== false; // default open
        const topBadge = getDueBadge(cards[0]?.due);
        return (
          <div key={cust.id} style={{marginBottom:14,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,overflow:'hidden'}}>

            {/* Customer row header — click to expand/collapse */}
            <div
              onClick={()=>toggleCust(cust.id)}
              style={{display:'flex',alignItems:'center',gap:12,padding:'14px 18px',cursor:'pointer',background:'rgba(255,255,255,0.02)',borderBottom:isExpanded?'1px solid var(--border)':'none',transition:'background 0.15s'}}
            >
              <div style={{width:38,height:38,borderRadius:'50%',background:'linear-gradient(135deg,var(--accent),var(--accent2))',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:16,color:'#fff',flexShrink:0}}>{cust.name[0]}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:15}}>{cust.name}</div>
                <div style={{fontSize:11,color:'var(--text3)',fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{cust.mobile} &nbsp;|&nbsp; {cards.length} card{cards.length>1?'s':''}</div>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span className={`status-badge ${topBadge.cls==='due-overdue'?'status-fraud':topBadge.cls==='due-urgent'||topBadge.cls==='due-soon'?'status-pending':'status-active'}`} style={{fontSize:11}}>{topBadge.label}</span>
                <span style={{fontSize:18,color:'var(--text3)',transition:'transform 0.2s',transform:isExpanded?'rotate(180deg)':'rotate(0deg)'}}>⌄</span>
              </div>
            </div>

            {/* Cards for this customer */}
            {isExpanded && (
              <div style={{padding:'16px 18px',display:'flex',flexDirection:'column',gap:12}}>
                {cards.map(k=>{
                  const badge = getDueBadge(k.due);
                  const display = k.cardNumber?maskCard(k.cardNumber):('**** **** **** '+k.last4);
                  const isSelCard = selectedCard===k.id;
                  return (
                    <div key={k.id}>
                      {/* Card row — click to expand detail */}
                      <div
                        onClick={()=>toggleCard(k.id)}
                        style={{display:'flex',alignItems:'center',gap:14,padding:'12px 16px',borderRadius:12,border:`1px solid ${isSelCard?'var(--accent)':'var(--border)'}`,background:isSelCard?'rgba(59,130,246,0.07)':'var(--surface2)',cursor:'pointer',transition:'all 0.15s'}}
                      >
                        {/* Mini card visual */}
                        <div style={{width:64,height:40,borderRadius:8,background:k.color==='blue'?'linear-gradient(135deg,#1e3a8a,#3730a3)':k.color==='gold'?'linear-gradient(135deg,#78350f,#b45309)':'linear-gradient(135deg,#111827,#1f2937)',display:'flex',flexDirection:'column',alignItems:'flex-start',justifyContent:'flex-end',padding:'6px 8px',flexShrink:0,position:'relative',overflow:'hidden'}}>
                          <div style={{fontSize:8,fontFamily:"'JetBrains Mono',monospace",color:'rgba(255,255,255,0.8)',letterSpacing:'0.08em'}}>****{k.last4}</div>
                          <div style={{position:'absolute',top:4,right:6,fontSize:9,color:'rgba(255,255,255,0.6)',fontWeight:700}}>{k.bank?.slice(0,4)}</div>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,letterSpacing:'0.12em',fontWeight:600}}>{display}</div>
                          <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{k.bank} &nbsp;|&nbsp; {k.holder}</div>
                        </div>
                        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                          <span className={`chip ${badge.cls==='due-overdue'?'chip-red':badge.cls==='due-urgent'||badge.cls==='due-soon'?'chip-yellow':'chip-green'}`} style={{fontSize:10}}>{badge.label}</span>
                          <span style={{fontSize:11,color:'var(--text3)'}}>₹{(Number(k.limit)/1000).toFixed(0)}K limit</span>
                        </div>
                        <span style={{fontSize:16,color:isSelCard?'var(--accent)':'var(--text3)',transition:'transform 0.2s',transform:isSelCard?'rotate(180deg)':'rotate(0deg)',marginLeft:4}}>⌄</span>
                      </div>

                      {/* ── Card Detail Panel (inline below card row) ────── */}
                      {isSelCard && (
                        <div style={{marginTop:8,border:'1px solid var(--border2)',borderRadius:12,overflow:'hidden',background:'var(--surface)'}}>
                          <div style={{display:'flex',background:'rgba(59,130,246,0.08)',borderBottom:'1px solid var(--border)'}}>
                            {['info','txns'].map(t=>(
                              <button key={t} onClick={e=>{e.stopPropagation();setDetailTab(t);}} style={{flex:1,padding:'9px',border:'none',background:'transparent',cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:12,color:detailTab===t?'var(--accent)':'var(--text3)',borderBottom:detailTab===t?'2px solid var(--accent)':'2px solid transparent',transition:'all 0.15s'}}>
                                {t==='info'?'👤 Customer & Card Info':'💱 Transactions ('+selTxns.length+')'}
                              </button>
                            ))}
                          </div>
                          <div style={{padding:'16px'}}>
                            {detailTab==='info' && selCust && (
                              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                                <div>
                                  <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Customer</div>
                                  {[['Name',selCust.name],['Mobile',selCust.mobile],['Address',selCust.address||'—'],['Reference',(selCust.ref||'—')+' ('+( selCust.refNumber||'—')+')'],['Status',selCust.status.toUpperCase()],['Remarks',selCust.remarks||'—']].map(([l,v])=>(
                                    <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>
                                      <span style={{color:'var(--text3)'}}>{l}</span>
                                      <span style={{fontWeight:600,fontFamily:l==='Mobile'?"'JetBrains Mono',monospace":undefined,color:l==='Status'?(selCust.status==='active'?'var(--green)':'var(--red)'):undefined,maxWidth:160,textAlign:'right',wordBreak:'break-word'}}>{v}</span>
                                    </div>
                                  ))}

function MyBanksPage({ state, dispatch, user }) {
  const [showModal, setShowModal] = useState(false);
  const [editBank, setEditBank] = useState(null);
  const [form, setForm] = useState({ name:'', account:'', ifsc:'', upi:'', mdrRate:'', openingBalance:'0' });
  const myBanks = (state.workerBanks||[]).filter(b=>b.workerId===user.id);

  // ── Calculate balance per bank ─────────────────────────────────────────────
  function calcBankBalance(b) {
    const opening = parseFloat(b.openingBalance||0);
    const allTxns = (state.transactions||[]).filter(t=>t.workerId===user.id);
    // Card swipe inflow (net settlement)
    const swipeTxns = allTxns.filter(t=>!t.isPayment&&!t.isBillPayment);
    const inflow = swipeTxns.reduce((s,t)=>{
      if(t.splitParts){
        const p=t.splitParts.find(p=>p.bankId===b.id);
        return s+(p?p.netAmt||p.amount:0);
      }
      if(t.swipeBankId===b.id) return s+(t.swipeNetAmt||t.amount);
      return s;
    },0);
    // Bill payments — debit from bank (money going out to pay bills)
    const billTxns = allTxns.filter(t=>t.isBillPayment);
    const billOut = billTxns.reduce((s,t)=>{
      if(t.splitParts){
        const p=t.splitParts.find(p=>p.bankId===b.id);
        return s+(p?p.amount:0);
      }
      if(t.swipeBankId===b.id) return s+(t.amount+(parseFloat(t.extraCharge)||0));
      return s;
    },0);
    const trfIn  = (state.transfers||[]).filter(tr=>tr.bankId===b.id&&tr.workerId===user.id&&tr.direction==='customer_to_bank').reduce((s,tr)=>s+tr.amount,0);
    const trfOut = (state.transfers||[]).filter(tr=>tr.bankId===b.id&&tr.workerId===user.id&&tr.direction==='bank_to_customer').reduce((s,tr)=>s+tr.amount,0);
    return opening + inflow - billOut + trfIn - trfOut;
  }

  const totalBalance = myBanks.reduce((s,b)=>s+calcBankBalance(b), 0);

  function openAdd() { setEditBank(null); setForm({ name:'', account:'', ifsc:'', upi:'', mdrRate:'', openingBalance:'0' }); setShowModal(true); }
  function openEdit(b) { setEditBank(b); setForm({ name:b.name, account:b.account, ifsc:b.ifsc, upi:b.upi||'', mdrRate:b.mdrRate||'', openingBalance:b.openingBalance||'0' }); setShowModal(true); }

  function save() {
    if (!form.name) return alert('Bank name required');
    if (form.mdrRate && isNaN(parseFloat(form.mdrRate))) return alert('MDR Rate must be a number');
    if (editBank) dispatch({ type:'EDIT_BANK', payload:{ ...editBank, ...form } });
    else dispatch({ type:'ADD_BANK', payload:{ ...form, id:'B'+Date.now(), workerId:user.id } });
    setShowModal(false);
  }

  function del(id) {
    if (!window.confirm('Delete this bank account?')) return;
    dispatch({ type:'DELETE_BANK', payload:id });
  }

  return (
    <div className="content fade-in">
      {/* Total balance summary */}
      {myBanks.length>0 && (
        <div style={{marginBottom:20,display:'flex',gap:12,flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:200,background:'linear-gradient(135deg,rgba(16,185,129,0.12),rgba(5,150,105,0.08))',border:'1px solid rgba(16,185,129,0.25)',borderRadius:14,padding:'16px 20px'}}>
            <div style={{fontSize:11,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6}}>Total Available Balance</div>
            <div className="text-mono fw-600" style={{fontSize:26,color:totalBalance>=0?'var(--green)':'var(--red)'}}>₹{Math.abs(totalBalance).toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
            <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>{myBanks.length} bank{myBanks.length!==1?'s':''} combined</div>
          </div>
          {myBanks.map(b=>{
            const bal = calcBankBalance(b);
            return (
              <div key={b.id} style={{flex:1,minWidth:180,background:'var(--surface)',border:`1px solid ${bal>0?'rgba(59,130,246,0.2)':'var(--border)'}`,borderRadius:14,padding:'14px 16px'}}>
                <div style={{fontSize:12,fontWeight:700,marginBottom:2}}>{b.name}</div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:'var(--text3)',marginBottom:8}}>{b.account||'—'}</div>
                <div className={'text-mono fw-600 '+(bal>=0?'text-green':'text-red')} style={{fontSize:18}}>₹{Math.abs(bal).toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
                <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>MDR: {b.mdrRate||0}%</div>
              </div>
            );
          })}
        </div>
      )}
      <div className="alert-banner" style={{background:'rgba(59,130,246,0.08)',border:'1px solid rgba(59,130,246,0.2)',color:'var(--text2)',marginBottom:20}}>
        🏦 These banks are used for <strong style={{color:'var(--accent)'}}>Card Swipe</strong> payments. Set the <strong style={{color:'var(--orange)'}}>MDR %</strong> for each bank — the bank deducts this from your settlement. Your profit = <strong style={{color:'var(--green)'}}>Service Charge % − MDR %</strong>.
      </div>
      <div className="table-wrap">
        <div className="table-header">
          <div className="table-title">🏦 My Bank Accounts ({myBanks.length})</div>
          <button className="btn btn-sm btn-primary" onClick={openAdd}>+ Add Bank</button>
        </div>
        {myBanks.length === 0 && <div className="empty-state"><div className="empty-icon">🏦</div><div className="empty-text">No banks added yet.</div></div>}
        {myBanks.length > 0 && <table>
          <thead><tr><th>Bank Name</th><th>Account</th><th>IFSC</th><th>UPI</th><th>MDR Rate</th><th>Available Balance</th><th>Example on ₹10,000</th><th>Actions</th></tr></thead>
          <tbody>
            {myBanks.map(b=>{
              const mdr = parseFloat(b.mdrRate)||0;
              return <tr key={b.id}>
                <td><div className="flex-center"><div className="bank-icon" style={{width:32,height:32,fontSize:14}}>🏦</div><div><div className="bank-name">{b.name}</div>{b.openingBalance&&parseFloat(b.openingBalance)!==0&&<div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>Opening: <span className="text-mono">₹{parseFloat(b.openingBalance).toLocaleString('en-IN',{maximumFractionDigits:0})}</span></div>}</div></div></td>
                <td className="text-mono text-sm">{b.account||'—'}</td>
                <td className="text-mono text-sm">{b.ifsc||'—'}</td>
                <td className="text-sm">{b.upi||'—'}</td>
                <td>{mdr>0?<span className="chip chip-red" style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13}}>{mdr.toFixed(2)}%</span>:<span className="chip chip-yellow" style={{fontSize:11}}>Not Set</span>}</td>
                <td>{(()=>{
                  const bal=calcBankBalance(b);
                  return (
                    <div>
                      <div className={'text-mono fw-600 '+(bal>=0?'text-green':'text-red')} style={{fontSize:16}}>₹{Math.abs(bal).toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
                      <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>{bal>=0?'Available':'Deficit'}</div>
                    </div>
                  );
                })()}</td>
                <td>{mdr>0?<div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>Gross: <span className="text-mono">₹10,000</span></div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>MDR: <span className="text-mono text-red">-₹{(10000*mdr/100).toFixed(2)}</span></div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>Net to you: <span className="text-mono text-green fw-600">₹{(10000-10000*mdr/100).toFixed(2)}</span></div>
                </div>:<span className="text-sm">—</span>}</td>
                <td><div className="action-btns">
                  <button className="btn btn-sm btn-outline" onClick={()=>openEdit(b)}>✏️ Edit</button>
                  <button className="btn btn-sm btn-danger" onClick={()=>del(b.id)}>🗑️</button>
                </div></td>
              </tr>;
            })}
          </tbody>
        </table>}
      </div>
      {showModal && <div className="modal-overlay" onClick={()=>setShowModal(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-title">{editBank?'Edit Bank Account':'Add Bank Account'}</div>
          <div className="modal-sub">MDR = bank's charge deducted at settlement. Your profit = Service Charge − MDR.</div>
          <div className="form-group"><label className="form-label">Bank Name *</label><input className="form-input" placeholder="e.g. HDFC Bank" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} /></div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Account Number</label><input className="form-input text-mono" placeholder="XXXX1234" value={form.account} onChange={e=>setForm({...form,account:e.target.value})} /></div>
            <div className="form-group"><label className="form-label">IFSC Code</label><input className="form-input text-mono" placeholder="HDFC0001234" value={form.ifsc} onChange={e=>setForm({...form,ifsc:e.target.value})} /></div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">UPI ID</label><input className="form-input" placeholder="name@bank" value={form.upi} onChange={e=>setForm({...form,upi:e.target.value})} /></div>
            <div className="form-group">
              <label className="form-label">MDR Rate % *</label>

    </div>
  );

function BankStatementPage({ state, user }) {
  const myBanks = (state.workerBanks||[]).filter(b=>b.workerId===user.id);
  const today   = new Date().toISOString().slice(0,10);
  const [selBankId, setSelBankId] = useState(myBanks[0]?.id||'');

  const [toDate,    setToDate]    = useState('');

  const selBank = myBanks.find(b=>b.id===selBankId);

  // Calculate bank balance using same logic as BankLedgerModal
  function calcBal(b) {
    const opening = parseFloat(b.openingBalance||0);
    const bTxns   = (state.transactions||[]).filter(t=>t.workerId===user.id&&!t.isPayment);
    const inflow  = bTxns.reduce((s,t)=>{ if(t.isBillPayment) return s; if(t.splitParts){const p=t.splitParts.find(p=>p.bankId===b.id);return s+(p?p.netAmt||p.amount:0);} if(t.swipeBankId===b.id) return s+(t.swipeNetAmt||t.amount); return s; },0);
    const billOut = bTxns.reduce((s,t)=>{ if(!t.isBillPayment) return s; if(t.splitParts){const p=t.splitParts.find(p=>p.bankId===b.id);return s+(p?p.amount:0);} if(t.swipeBankId===b.id) return s+(t.amount+(parseFloat(t.extraCharge)||0)); return s; },0);
    const trfIn   = (state.transfers||[]).filter(tr=>tr.bankId===b.id&&tr.workerId===user.id&&tr.direction==='customer_to_bank').reduce((s,tr)=>s+tr.amount,0);
    const trfOut  = (state.transfers||[]).filter(tr=>tr.bankId===b.id&&tr.workerId===user.id&&tr.direction==='bank_to_customer').reduce((s,tr)=>s+tr.amount,0);
    return opening + inflow - billOut + trfIn - trfOut;
  }

  // Build filtered transactions for selected bank
  const allBankTxns = selBank ? (state.transactions||[]).filter(t=>
    t.workerId===user.id && !t.isPayment &&
    (t.swipeBankId===selBankId || (t.splitParts&&t.splitParts.some(p=>p.bankId===selBankId)))
  ).sort((a,b)=>a.date>b.date?1:-1) : [];

  const filteredTxns = allBankTxns.filter(t=>{
    if(fromDate && t.date < fromDate) return false;
    if(toDate   && t.date > toDate)   return false;
    return true;
  });

  const currentBal = selBank ? calcBal(selBank) : 0;
  const hasFilter  = fromDate || toDate;

  return (
    <div className="content fade-in">
      {/* Bank selector */}
      <div className="card-block" style={{marginBottom:20}}>
        <div className="form-group" style={{marginBottom:0}}>
          <label className="form-label">Select Bank</label>

          }
        </div>
      </>}
    </div>
  );
}

function BillPaymentPage({ state, dispatch, user }) {
  const today = new Date().toISOString().slice(0,10);
  const defaultForm = { customerId:'', cardId:'', date:today, amount:'', extraCharge:'0', swipeBankId:'', notes:'', billMonth:'', dueDate:'' };
  // Auto-refresh today's date each time form resets
  const getTodayForm = () => ({ customerId:'', cardId:'', date:new Date().toISOString().slice(0,10), amount:'', extraCharge:'0', swipeBankId:'', notes:'', billMonth:'', dueDate:'' });
  const [form, setForm] = useState(defaultForm);
  const [splitParts, setSplitParts] = useState([]);
  const [useSplit, setUseSplit] = useState(false);
  const [success, setSuccess] = useState(false);

  const myCustomers = state.customers.filter(c=>c.workerId===user.id&&c.status==='active');
  const custCards   = state.cards.filter(k=>k.customerId===form.customerId);
  const myBanks     = (state.workerBanks||[]).filter(b=>b.workerId===user.id);
  const selBank     = myBanks.find(b=>b.id===form.swipeBankId);

  const amt   = parseFloat(form.amount)||0;
  const extra = parseFloat(form.extraCharge)||0;
  const total = amt + extra;

  // Single bank MDR
  const mdrPct = (!useSplit&&selBank) ? (parseFloat(selBank.mdrRate)||0) : 0;
  const mdrAmt = total * mdrPct / 100;
  const netAmt = total - mdrAmt;

  // Split
  const splitTotal     = splitParts.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const splitRemaining = total - splitTotal;
  const splitMdrAmt    = splitParts.reduce((s,p)=>{
    const b=myBanks.find(x=>x.id===p.bankId);
    return s+(parseFloat(p.amount)||0)*(parseFloat(b?.mdrRate||0)/100);
  },0);
  const splitNetAmt = splitTotal - splitMdrAmt;

  function addPart()  { setSplitParts([...splitParts,{id:Date.now(),bankId:myBanks[0]?.id||'',amount:''}]); }
  function removePart(id) { setSplitParts(splitParts.filter(p=>p.id!==id)); }
  function updatePart(id,f,v) { setSplitParts(splitParts.map(p=>p.id===id?{...p,[f]:v}:p)); }

  function submit() {
    if (!form.customerId) return alert('Select a customer');
    if (!form.cardId)     return alert('Select a card');
    if (!form.amount||amt<=0) return alert('Enter bill amount');
    if (!useSplit && !form.swipeBankId) return alert('Select your bank');
    if (useSplit) {
      if(splitParts.length===0) return alert('Add at least one bank part');
      if(Math.abs(splitRemaining)>1) return alert('Split total ₹'+splitTotal.toFixed(0)+' must match ₹'+total.toFixed(0));
    }

    const txnRef = 'BILL'+Math.floor(Math.random()*9000000+1000000);
    const parts = useSplit ? splitParts.map(p=>{
      const b=myBanks.find(x=>x.id===p.bankId);
      const pAmt=parseFloat(p.amount)||0;
      const mPct=parseFloat(b?.mdrRate||0);
      const mAmt=pAmt*mPct/100;
      return {bankId:p.bankId,bankName:b?.name||'',amount:pAmt,mdrPct:mPct,mdrAmt:mAmt,netAmt:pAmt-mAmt};
    }) : null;
    const swipeBank = !useSplit ? selBank : null;

    dispatch({ type:'ADD_TRANSACTION', payload:{
      id:'T'+Date.now(), workerId:user.id, status:'success', txnRef,
      customerId:form.customerId, cardId:form.cardId,
      date:form.date, amount:amt,
      serviceChargePct:0, extraCharge:extra,
      paymentMode:'Bill Payment',
      isBillPayment:true,
      billMonth:form.billMonth, billDueDate:form.dueDate, notes:form.notes,
      splitParts:parts,
      swipeBankId:form.swipeBankId||null,
      swipeBankName:swipeBank?.name||null,
      swipeMdrPct:mdrPct, swipeMdrAmt:mdrAmt,
      swipeNetAmt:useSplit?splitNetAmt:netAmt,
      swipeProfit: extra - (useSplit?splitMdrAmt:mdrAmt),
    }});
    setSuccess(true);
    setForm(getTodayForm());
    setSplitParts([]); setUseSplit(false);
    setTimeout(()=>setSuccess(false),4000);
  }

  // Recent bill payments
  const recentBills = state.transactions.filter(t=>t.workerId===user.id&&t.isBillPayment).sort((a,b)=>b.date>a.date?1:-1).slice(0,6);

  return (
    <div className="content fade-in">

            <label className="form-label">Customer *</label>
            <select className="form-input" value={form.customerId} onChange={e=>setForm({...form,customerId:e.target.value,cardId:''})}>
              <option value="">Select Customer</option>
              {myCustomers.map(c=><option key={c.id} value={c.id}>{c.name} — {c.mobile}</option>)}
            </select>
          </div>

          {/* Card */}
          {form.customerId && (
            <div className="form-group">
              <label className="form-label">Card *</label>
              <select className="form-input" value={form.cardId} onChange={e=>{
                const card = custCards.find(k=>k.id===e.target.value);
                let autoDue = '';
                if(card?.due){
                  const now = new Date();
                  const dueDay = parseInt(card.due)||1;
                  let d = new Date(now.getFullYear(), now.getMonth(), dueDay);
                  if(d <= now) d = new Date(now.getFullYear(), now.getMonth()+1, dueDay);
                  autoDue = d.toISOString().slice(0,10);
                }
                setForm({...form, cardId:e.target.value, dueDate:autoDue||form.dueDate});
              }}>
                <option value="">Select Card</option>
                {custCards.map(k=><option key={k.id} value={k.id}>{k.cardNumber?maskCard(k.cardNumber):'**** **** **** '+k.last4} — {k.bank}{k.due?' (Due '+k.due+'th)':''}</option>)}
              </select>
              {form.cardId && custCards.find(k=>k.id===form.cardId)?.due && (
                <div style={{fontSize:11,color:'var(--orange)',marginTop:4}}>📅 Card due: {custCards.find(k=>k.id===form.cardId)?.due}th every month</div>
              )}
            </div>
          )}

          {/* Date + Amount */}
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Date *</label>

            </div>
          </div>

          {/* Extra charge */}
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Extra Charge (₹)</label>

      </div>
    </div>
  );
}


function NewTransactionPage({ state, dispatch, user }) {
  const defaultForm = { customerId:'', cardId:'', date:'2026-03-18', amount:'', serviceChargePct:'2', extraCharge:'0', paymentMode:'Card Swipe', swipeBankId:'' };
  const [form, setForm] = useState(defaultForm);
  const [splitParts, setSplitParts] = useState([]); // [{bankId, amount}]
  const [useSplit, setUseSplit] = useState(false);
  const [success, setSuccess] = useState(false);
  const myCustomers = state.customers.filter(c=>c.workerId===user.id&&c.status==='active');
  const custCards = state.cards.filter(k=>k.customerId===form.customerId);
  const myBanks = (state.workerBanks||[]).filter(b=>b.workerId===user.id);
  const amt = parseFloat(form.amount)||0;
  const sc = amt*parseFloat(form.serviceChargePct||0)/100;
  const extra = parseFloat(form.extraCharge)||0;
  const total = amt+sc+extra;  // Total customer pays (debit)

  // ── Customer outstanding balance ──────────────────────────────────────────
  // Use same calculation as Customer Ledger page
  const custOutstanding = form.customerId ? calcCustOutstanding(form.customerId, user.id, state) : 0;

  // Same as LedgerPage: Swipe=Debit(+), SC=Credit(-)
  const netAfterSwipe = amt ? (amt - sc - extra) : 0;

  // ── Single bank swipe MDR ──────────────────────────────────────────────────
  const selBank = myBanks.find(b=>b.id===form.swipeBankId);
  const swipeMdrPct = (!useSplit && selBank) ? (parseFloat(selBank.mdrRate)||0) : 0;
  const swipeMdrAmt  = total * swipeMdrPct / 100;           // what bank deducts
  const swipeNetAmt  = total - swipeMdrAmt;                 // what you receive from bank
  const swipeProfit  = sc + extra - swipeMdrAmt;            // your actual profit

  // ── Split parts MDR ────────────────────────────────────────────────────────
  const splitTotal = splitParts.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const splitRemaining = total - splitTotal;
  const splitMdrAmt = splitParts.reduce((s,p)=>{
    const b=myBanks.find(x=>x.id===p.bankId); const pAmt=parseFloat(p.amount)||0;
    return s + pAmt*(parseFloat(b?.mdrRate||0)/100);
  },0);
  const splitNetAmt = splitTotal - splitMdrAmt;
  const splitProfit = (sc+extra) - splitMdrAmt;

  function addPart() { setSplitParts([...splitParts, { id:Date.now(), bankId:myBanks[0]?.id||'', amount:'' }]); }
  function updatePart(id, field, val) { setSplitParts(splitParts.map(p=>p.id===id?{...p,[field]:val}:p)); }
  function removePart(id) { setSplitParts(splitParts.filter(p=>p.id!==id)); }

  function validate() {
    if (!form.customerId||!form.cardId||!form.amount) { alert('Customer, Card and Amount are required'); return false; }
    if (useSplit && splitParts.length === 0) { alert('Add at least one bank part for split payment'); return false; }
    if (useSplit) {
      const diff = Math.abs(splitRemaining);
      if (diff > 1) { alert('Split parts total ₹' + splitTotal.toFixed(0) + ' does not match Total Debit ₹' + total.toFixed(0) + '. Difference: ₹' + splitRemaining.toFixed(0)); return false; }
      for (const p of splitParts) { if (!p.bankId) { alert('Select a bank for each part'); return false; } }
    }
    return true;
  }

  function createTransaction(mode='direct') {
    if (!validate()) return;
    // gateway removed
    doCreate();
  }

  function doCreate() {
    const txnRef = 'TXN'+Math.floor(Math.random()*9000000+1000000);
    const parts = useSplit ? splitParts.map(p=>{
      const b=myBanks.find(x=>x.id===p.bankId);
      const pAmt=parseFloat(p.amount)||0; const mPct=parseFloat(b?.mdrRate||0);
      const mAmt=pAmt*mPct/100;
      return { bankId:p.bankId, bankName:b?.name||'', amount:pAmt, mdrPct:mPct, mdrAmt:mAmt, netAmt:pAmt-mAmt };
    }) : null;
    const swipeBank = form.paymentMode==='Card Swipe' && !useSplit ? myBanks.find(b=>b.id===form.swipeBankId) : null;
    dispatch({ type:'ADD_TRANSACTION', payload:{
      ...form, amount:amt, serviceChargePct:parseFloat(form.serviceChargePct), extraCharge:extra,
      id:'T'+Date.now(), workerId:user.id, status:'success', txnRef,
      splitParts: parts,
      swipeBankId: form.swipeBankId||null,

      swipeProfit: swipeProfit,
    }});
    setSuccess(true);
    setForm(defaultForm);
    setSplitParts([]);
    setUseSplit(false);
    setTimeout(()=>setSuccess(false),4000);
  }



  return (

        <div className="card-block">

          <div className="form-group"><label className="form-label">Customer *</label>

                <span className={'text-mono fw-600 '+(custOutstanding>0?'text-red':'text-green')} style={{fontSize:14}}>
                  ₹{Math.abs(custOutstanding).toLocaleString('en-IN',{maximumFractionDigits:2})} {custOutstanding>0?'Dr':'Cr'}

              </div>
            )}
          </div>
          {form.customerId && <div className="form-group"><label className="form-label">Card *</label>
            <select className="form-input" value={form.cardId} onChange={e=>setForm({...form,cardId:e.target.value})}>

              {custCards.map(k=><option key={k.id} value={k.id}>{k.cardNumber?maskCard(k.cardNumber):'**** **** **** '+k.last4} — {k.bank}</option>)}

          <div className="form-row">
            <div className="form-group"><label className="form-label">Transaction Date *</label><input className="form-input" type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} /></div>
            <div className="form-group"><label className="form-label">Swipe Amount (₹) *</label><input className="form-input text-mono" placeholder="0.00" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} /></div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Service Charge %</label><input className="form-input" placeholder="2.0" value={form.serviceChargePct} onChange={e=>setForm({...form,serviceChargePct:e.target.value})} /></div>
            <div className="form-group"><label className="form-label">Extra Charge (₹)</label><input className="form-input text-mono" placeholder="0" value={form.extraCharge} onChange={e=>setForm({...form,extraCharge:e.target.value})} /></div>
          </div>

          {/* Service Charge summary box */}
          {amt>0 && (()=>{
            const totalSC = sc + extra;
            return (
              <div style={{background:'rgba(245,158,11,0.08)',border:'1px solid rgba(245,158,11,0.25)',borderRadius:11,padding:'11px 14px',marginBottom:14}}>
                <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6}}>📊 Service Charge</div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                  <span style={{fontSize:12,color:'var(--text2)'}}>SC ({form.serviceChargePct}%)</span>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:'var(--orange)',fontSize:13}}>₹{sc.toFixed(2)}</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <span style={{fontSize:12,color:'var(--text2)'}}>Extra</span>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:'var(--orange)',fontSize:13}}>₹{extra.toFixed(2)}</span>

                <div style={{borderTop:'1px solid rgba(245,158,11,0.3)',paddingTop:6,display:'flex',justifyContent:'space-between'}}>

                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:800,color:'var(--orange)',fontSize:15}}>₹{totalSC.toFixed(2)}</span>
                </div>
              </div>
            );
          })()}

          {/* Live balance preview */}
          {form.customerId && amt>0 && (
            <div style={{padding:'12px 14px',borderRadius:10,background:'rgba(59,130,246,0.07)',border:'1px solid rgba(59,130,246,0.2)',marginBottom:12}}>
              <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>After This Swipe</div>
              <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                <div style={{textAlign:'center',padding:'6px 10px',background:'var(--surface)',borderRadius:8,border:'1px solid var(--border)'}}>
                  <div style={{fontSize:9,color:'var(--text3)',marginBottom:2}}>Current</div>
                  <div className={'text-mono fw-600 '+(custOutstanding>0?'text-red':'text-green')} style={{fontSize:13}}>₹{Math.abs(custOutstanding).toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
                  {custOutstanding!==0&&<div style={{fontSize:9,color:custOutstanding>0?'var(--red)':'var(--green)',fontWeight:700}}>{custOutstanding>0?'Dr':'Cr'}</div>}
                </div>
                <span style={{fontSize:14,color:'var(--text3)',fontWeight:700}}>+</span>
                <div style={{textAlign:'center',padding:'6px 10px',background:'var(--surface)',borderRadius:8,border:'1px solid rgba(239,68,68,0.3)'}}>
                  <div style={{fontSize:9,color:'var(--text3)',marginBottom:2}}>Swipe</div>
                  <div className="text-mono fw-600 text-red" style={{fontSize:13}}>₹{amt.toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
                </div>
                <span style={{fontSize:14,color:'var(--text3)',fontWeight:700}}>−</span>
                <div style={{textAlign:'center',padding:'6px 10px',background:'var(--surface)',borderRadius:8,border:'1px solid rgba(245,158,11,0.3)'}}>
                  <div style={{fontSize:9,color:'var(--text3)',marginBottom:2}}>SC</div>
                  <div className="text-mono fw-600 text-orange" style={{fontSize:13}}>₹{(sc+extra).toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
                </div>
                <span style={{fontSize:14,color:'var(--text3)',fontWeight:700}}>=</span>
                <div style={{textAlign:'center',padding:'6px 12px',background:(custOutstanding+netAfterSwipe)>0?'rgba(239,68,68,0.1)':'rgba(16,185,129,0.1)',borderRadius:8,border:`1px solid ${(custOutstanding+netAfterSwipe)>0?'rgba(239,68,68,0.3)':'rgba(16,185,129,0.3)'}`}}>
                  <div style={{fontSize:9,color:'var(--text3)',marginBottom:2}}>Balance</div>
                  <div className={'text-mono fw-600 '+((custOutstanding+netAfterSwipe)>0?'text-red':'text-green')} style={{fontSize:15}}>₹{Math.abs(custOutstanding+netAfterSwipe).toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
                  <div style={{fontSize:9,color:(custOutstanding+netAfterSwipe)>0?'var(--red)':'var(--green)',fontWeight:700}}>{(custOutstanding+netAfterSwipe)>0?'Dr':'Cr'}</div>
                </div>
              </div>
            </div>
          )}

          {!useSplit && (
            <div className="form-group">
              <label className="form-label">Receiving Bank *</label>
              {myBanks.length===0
                ? <div className="alert-banner alert-warn" style={{marginBottom:0}}>⚠️ No banks added. Go to <strong>My Bank Accounts</strong> to add banks first.</div>
                : <select className="form-input" value={form.swipeBankId} onChange={e=>setForm({...form,swipeBankId:e.target.value})}>
                    <option value="">Select Your Bank</option>
                    {myBanks.map(b=><option key={b.id} value={b.id}>{b.name} {b.mdrRate?'(MDR '+b.mdrRate+'%)':''}</option>)}
                  </select>
              }
              {/* Bank net settlement preview */}
              {form.swipeBankId && amt>0 && (()=>{
                const selB = myBanks.find(b=>b.id===form.swipeBankId);
                if(!selB) return null;
                const mdrPct = parseFloat(selB.mdrRate||0);
                const mdrAmt = amt * mdrPct / 100;
                const netAmt = amt - mdrAmt;

                        <div style={{fontSize:9,color:'var(--text3)',marginBottom:2}}>Swipe Credit</div>

                      </div>
                      <span style={{fontSize:13,color:'var(--text3)',fontWeight:700}}>−</span>
                      <div style={{textAlign:'center',padding:'6px 10px',background:'var(--surface)',borderRadius:8,border:'1px solid rgba(239,68,68,0.25)'}}>
                        <div style={{fontSize:9,color:'var(--text3)',marginBottom:2}}>MDR {mdrPct>0?mdrPct+'%':'0%'}</div>
                        <div className="text-mono fw-600 text-red" style={{fontSize:13}}>₹{mdrAmt.toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
                      </div>
                      <span style={{fontSize:13,color:'var(--text3)',fontWeight:700}}>=</span>
                      <div style={{textAlign:'center',padding:'6px 12px',background:'rgba(16,185,129,0.1)',borderRadius:8,border:'1px solid rgba(16,185,129,0.3)'}}>
                        <div style={{fontSize:9,color:'var(--text3)',marginBottom:2}}>Net Received</div>
                        <div className="text-mono fw-600 text-green" style={{fontSize:15}}>₹{netAmt.toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
                      </div>
                    </div>
                  </div>
                );
              })()}
            </div>
          )}

          <div style={{marginBottom:16}}>
            <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',fontSize:13,color:'var(--text2)'}}>
              <input type="checkbox" checked={useSplit} onChange={e=>{setUseSplit(e.target.checked);if(!e.target.checked)setSplitParts([]);setForm(f=>({...f,swipeBankId:''}));}} style={{width:16,height:16,accentColor:'var(--accent)',cursor:'pointer'}} />
              <span>Split payment across multiple banks (Part Payment)</span>
            </label>
          </div>

          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-primary" onClick={()=>createTransaction('direct')}>Create Transaction</button>
            
          </div>
        </div>

        <div>

          {useSplit && total > 0 && (
            <div className="card-block">
              <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>🔀 Part-wise Payment Split</div>
              <div style={{fontSize:12,color:'var(--text3)',marginBottom:14}}>Distribute Total Debit ₹{total.toLocaleString('en-IN',{maximumFractionDigits:0})} across multiple banks</div>

              {splitParts.map((p,idx)=>{
                const pb=myBanks.find(b=>b.id===p.bankId);
                const pMdr=parseFloat(pb?.mdrRate||0);
                const pAmt=parseFloat(p.amount)||0;
                const pMdrAmt=pAmt*pMdr/100; const pNet=pAmt-pMdrAmt;
                return (
                <div key={p.id} className="split-part">
                  <div className="split-part-header">
                    <span className="split-part-label">Part {idx+1}</span>
                    <div className="split-remove" onClick={()=>removePart(p.id)}>✕</div>
                  </div>
                  <div className="form-row">
                    <div className="form-group" style={{marginBottom:0}}>
                      <label className="form-label">Bank</label>
                      {myBanks.length===0
                        ? <div style={{fontSize:12,color:'var(--red)'}}>No banks added.</div>

                            <option value="">Select Bank</option>
                            {myBanks.map(b=><option key={b.id} value={b.id}>{b.name}{b.mdrRate?` (MDR ${b.mdrRate}%)`:''}</option>)}
                          </select>
                      }
                    </div>
                    <div className="form-group" style={{marginBottom:0}}>
                      <label className="form-label">Amount (₹)</label>
                      <input className="form-input text-mono" placeholder="0" value={p.amount} onChange={e=>updatePart(p.id,'amount',e.target.value)} />
                    </div>
                  </div>
                  {pb && pMdr>0 && pAmt>0 && (
                    <div style={{marginTop:8,padding:'6px 10px',background:'rgba(245,158,11,0.07)',border:'1px solid rgba(245,158,11,0.18)',borderRadius:8,display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,fontSize:11}}>
                      <span style={{color:'var(--text3)'}}>MDR {pMdr}%: <span className="text-red text-mono">-₹{pMdrAmt.toFixed(2)}</span></span>
                      <span style={{color:'var(--text2)',textAlign:'right'}}>Net Settlement: <span className="text-green text-mono fw-600">₹{pNet.toFixed(2)}</span></span>
                    </div>
                  )}
                </div>
                );
              })}

              <button className="add-part-btn" onClick={addPart}>+ Add Bank Part</button>

            </div>
          )}
        </div>
      </div>
    </div>
  );
}


// ─── MANUAL LEDGER (CASH BOOK) ────────────────────────────────────────────────
function ManualLedgerPage({ state, dispatch, user }) {
  const myEntries = (state.manualEntries||[]).filter(e=>e.workerId===user.id);

  // ── Persons list ──────────────────────────────────────────────────────────
  const persons = [];
  const seen = new Set();
  myEntries.forEach(e=>{ const k=e.name+'|'+e.mobile; if(!seen.has(k)){seen.add(k);persons.push({name:e.name,mobile:e.mobile});} });

  const [selPerson, setSelPerson] = useState('');
  const [showAddEntry, setShowAddEntry] = useState(false);
  const [showAddPerson, setShowAddPerson] = useState(false);

  // Add person form
  const [pForm, setPForm] = useState({ name:'', mobile:'', openingType:'debit', openingAmt:'' });

  // Add entry form
  const [eForm, setEForm] = useState({ type:'debit', amount:'', desc:'', date:new Date().toISOString().slice(0,10) });

  const [selName, selMob] = selPerson ? selPerson.split('|') : ['',''];
  const personEntries = selPerson
    ? myEntries.filter(e=>e.name===selName&&e.mobile===selMob).sort((a,b)=>a.date>b.date?1:-1)
    : [];

  // Running balance ledger
  let runBal = 0;
  const ledgerRows = personEntries.map(e=>{
    if(e.type==='debit') runBal += e.amount;
    else                 runBal -= e.amount;
    return {...e, bal:runBal};
  });
  const totalDebit  = personEntries.filter(e=>e.type==='debit').reduce((s,e)=>s+e.amount,0);
  const totalCredit = personEntries.filter(e=>e.type==='credit').reduce((s,e)=>s+e.amount,0);
  const netBal      = totalDebit - totalCredit;

  function addPerson() {
    if (!pForm.name.trim())   return alert('Name required');
    if (!pForm.mobile.trim()) return alert('Mobile required');
    const key = pForm.name.trim()+'|'+pForm.mobile.trim();
    if (seen.has(key)) return alert('Person already exists');
    // Add opening balance entry if provided
    if (pForm.openingAmt && parseFloat(pForm.openingAmt)>0) {
      dispatch({ type:'ADD_MANUAL_ENTRY', payload:{ id:'ME'+Date.now(), workerId:user.id, name:pForm.name.trim(), mobile:pForm.mobile.trim(), amount:parseFloat(pForm.openingAmt), type:pForm.openingType, desc:'Opening Balance', date:new Date().toISOString().slice(0,10) }});
    } else {
      // Just open with a zero marker
      dispatch({ type:'ADD_MANUAL_ENTRY', payload:{ id:'ME'+Date.now(), workerId:user.id, name:pForm.name.trim(), mobile:pForm.mobile.trim(), amount:0, type:'debit', desc:'Account Opened', date:new Date().toISOString().slice(0,10) }});
    }
    setSelPerson(pForm.name.trim()+'|'+pForm.mobile.trim());
    setPForm({ name:'', mobile:'', openingType:'debit', openingAmt:'' });
    setShowAddPerson(false);
  }

  function addEntry() {
    if (!eForm.amount || parseFloat(eForm.amount)<=0) return alert('Enter valid amount');
    if (!eForm.desc.trim()) return alert('Enter description');
    dispatch({ type:'ADD_MANUAL_ENTRY', payload:{ id:'ME'+Date.now(), workerId:user.id, name:selName, mobile:selMob, amount:parseFloat(eForm.amount), type:eForm.type, desc:eForm.desc.trim(), date:eForm.date }});
    setEForm({ type:'debit', amount:'', desc:'', date:new Date().toISOString().slice(0,10) });
    setShowAddEntry(false);
  }

  // Print ledger
  function printLedger() {
    const rows = ledgerRows.map(r=>`
      <tr style="border-bottom:1px solid #e2e8f0">
        <td style="padding:7px 10px;font-size:12px">${r.date}</td>
        <td style="padding:7px 10px;font-size:12px">${r.desc}</td>
        <td style="padding:7px 10px;font-size:12px;text-align:right;color:${r.type==='debit'?'#dc2626':'#94a3b8'}">${r.type==='debit'?'₹'+r.amount.toFixed(2):'—'}</td>
        <td style="padding:7px 10px;font-size:12px;text-align:right;color:${r.type==='credit'?'#059669':'#94a3b8'}">${r.type==='credit'?'₹'+r.amount.toFixed(2):'—'}</td>
        <td style="padding:7px 10px;font-size:12px;text-align:right;font-weight:600;color:${r.bal>0?'#dc2626':r.bal<0?'#059669':'#64748b'}">₹${Math.abs(r.bal).toFixed(2)} ${r.bal>0?'Dr':r.bal<0?'Cr':''}</td>
      </tr>`).join('');
    const html = `<!DOCTYPE html><html><head><title>Cash Book — ${selName}</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;padding:24px;color:#0f172a}

.sub{font-size:12px;color:#64748b;margin-top:3px}
