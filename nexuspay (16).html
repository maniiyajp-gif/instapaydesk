// ─── ADMIN BANK PAGE ──────────────────────────────────────────────────────────

function AdminBankPage({ state, dispatch, user }) {
  const today = new Date().toISOString().slice(0,10);
  const firstOfMonth = today.slice(0,7)+'-01';
  const entries = (state.adminBankEntries||[]).filter(e=>e.workerId===user.id).sort((a,b)=>a.date>b.date?1:-1);

  const [showForm, setShowForm] = useState(false);
  const [editEntry, setEditEntry] = useState(null);
  const [form, setForm] = useState({ type:'credit', amount:'', desc:'', date:today });
  const [fromDate, setFromDate] = useState(firstOfMonth);
  const [toDate,   setToDate]   = useState(today);
  const [typeFilter, setTypeFilter] = useState('');

  const filtered = entries.filter(e=>{
    if(fromDate && e.date < fromDate) return false;
    if(toDate   && e.date > toDate)   return false;
    if(typeFilter && e.type !== typeFilter) return false;
    return true;
  });

  // Running balance
  let runBal = 0;
  const ledger = filtered.map(e=>{
    if(e.type==='credit') runBal += e.amount;
    else                  runBal -= e.amount;
    return {...e, bal:runBal};
  });

  const totalCredit = filtered.filter(e=>e.type==='credit').reduce((s,e)=>s+e.amount,0);
  const totalDebit  = filtered.filter(e=>e.type==='debit').reduce((s,e)=>s+e.amount,0);
  const netBal      = totalCredit - totalDebit;

  // Overall balance (all entries, no filter)
  const overallBal = entries.reduce((s,e)=>e.type==='credit'?s+e.amount:s-e.amount,0);

  function save() {
    if (!form.amount || parseFloat(form.amount)<=0) return alert('Enter valid amount');
    if (!form.desc.trim()) return alert('Enter description');
    if (editEntry) {
      dispatch({ type:'EDIT_ADMIN_BANK_ENTRY', payload:{ id:editEntry.id, type:form.type, amount:parseFloat(form.amount), desc:form.desc.trim(), date:form.date }});
    } else {
      dispatch({ type:'ADD_ADMIN_BANK_ENTRY', payload:{ id:'AB'+Date.now(), workerId:user.id, type:form.type, amount:parseFloat(form.amount), desc:form.desc.trim(), date:form.date }});
    }
    setForm({ type:'credit', amount:'', desc:'', date:today });
    setEditEntry(null);
    setShowForm(false);
  }

  function openEdit(e) {
    setEditEntry(e);
    setForm({ type:e.type, amount:String(e.amount), desc:e.desc, date:e.date });
    setShowForm(true);
  }

  function downloadReport() {
    let csv = 'Admin Bank Ledger\n';
    csv += 'Worker:,'+user.name+'\n';
    csv += 'Period:,'+(fromDate||'All')+' to '+(toDate||'All')+'\n\n';
    csv += 'Date,Description,Credit,Debit,Balance\n';
    ledger.forEach(e=>{
      csv += `${e.date},"${e.desc}",${e.type==='credit'?e.amount:''},${e.type==='debit'?e.amount:''},${e.bal}\n`;
    });
    csv += `\nTotal Credit,,${totalCredit},,\nTotal Debit,,,${totalDebit},\nNet Balance,,,,${netBal}\n`;
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a'); a.href=url; a.download='AdminBank_'+today+'.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  return (
    <div className="content fade-in">

      {/* Overall Balance */}
      <div style={{background:'linear-gradient(135deg,#1e3a8a,#3730a3)',borderRadius:14,padding:'20px 24px',marginBottom:20,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.6)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>🏛️ Admin Bank — Current Balance</div>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.5)',fontFamily:"'JetBrains Mono',monospace"}}>{user.name}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:30,fontWeight:800,color:overallBal>=0?'#86efac':'#fca5a5',fontFamily:"'JetBrains Mono',monospace"}}>
            {overallBal<0?'− ':''}₹{Math.abs(overallBal).toLocaleString('en-IN',{maximumFractionDigits:0})}
          </div>
          <div style={{fontSize:11,color:overallBal>=0?'#86efac':'#fca5a5',fontWeight:700}}>{overallBal>=0?'Credit Balance':'Debit Balance'}</div>
        </div>
      </div>

      {/* Filters + buttons */}
      <div className="card-block" style={{marginBottom:16}}>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end'}}>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">From</label>
            <input type="date" className="form-input" style={{width:140}} value={fromDate} onChange={e=>setFromDate(e.target.value)} />
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">To</label>
            <input type="date" className="form-input" style={{width:140}} value={toDate} onChange={e=>setToDate(e.target.value)} />
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Type</label>
            <select className="form-input" style={{width:140}} value={typeFilter} onChange={e=>setTypeFilter(e.target.value)}>
              <option value="">All</option>
              <option value="credit">Credit Only</option>
              <option value="debit">Debit Only</option>
            </select>
          </div>
          {(fromDate!==firstOfMonth||toDate!==today||typeFilter)&&<button className="btn btn-sm btn-outline" onClick={()=>{setFromDate(firstOfMonth);setToDate(today);setTypeFilter('');}}>↺ Reset</button>}
          <div style={{marginLeft:'auto',display:'flex',gap:8}}>
            <button onClick={downloadReport} className="btn btn-sm btn-outline">⬇️ CSV</button>
            <button onClick={()=>{setEditEntry(null);setForm({type:'debit',amount:'',desc:'',date:today});setShowForm(true);}} style={{padding:'8px 14px',background:'rgba(239,68,68,0.12)',border:'1px solid rgba(239,68,68,0.3)',color:'var(--red)',borderRadius:8,cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:12}}>＋ Debit</button>
            <button onClick={()=>{setEditEntry(null);setForm({type:'credit',amount:'',desc:'',date:today});setShowForm(true);}} style={{padding:'8px 14px',background:'rgba(16,185,129,0.12)',border:'1px solid rgba(16,185,129,0.3)',color:'var(--green)',borderRadius:8,cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:12}}>＋ Credit</button>
          </div>
        </div>
      </div>

      {/* Stats */}
      <div className="stats-grid" style={{marginBottom:16}}>
        <div className="stat-card green"><div className="stat-label">Total Credit</div><div className="stat-value mono" style={{fontSize:16}}>₹{totalCredit.toLocaleString('en-IN',{maximumFractionDigits:0})}</div></div>
        <div className="stat-card red"><div className="stat-label">Total Debit</div><div className="stat-value mono" style={{fontSize:16}}>₹{totalDebit.toLocaleString('en-IN',{maximumFractionDigits:0})}</div></div>
        <div className={`stat-card ${netBal>=0?'green':'red'}`}><div className="stat-label">Net {fromDate||toDate?'(Filtered)':'(All Time)'}</div><div className={`stat-value mono ${netBal>=0?'text-green':'text-red'}`} style={{fontSize:16}}>{netBal<0?'− ':''}₹{Math.abs(netBal).toLocaleString('en-IN',{maximumFractionDigits:0})}</div></div>
        <div className="stat-card blue"><div className="stat-label">Entries</div><div className="stat-value">{filtered.length}</div></div>
      </div>

      {/* Ledger table */}
      <div className="table-wrap">
        <div className="table-header"><div className="table-title">🏛️ Admin Bank Ledger</div></div>
        {ledger.length===0
          ? <div className="empty-state"><div className="empty-icon">🏛️</div><div className="empty-text">No entries yet. Add Credit or Debit entries.</div></div>
          : <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Description</th>
                  <th style={{textAlign:'right',color:'var(--green)'}}>Credit (₹)</th>
                  <th style={{textAlign:'right',color:'var(--red)'}}>Debit (₹)</th>
                  <th style={{textAlign:'right'}}>Balance (₹)</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {ledger.map((e,i)=>(
                  <tr key={e.id} style={{background:i%2===0?'transparent':'rgba(255,255,255,0.01)'}}>
                    <td className="text-sm">{e.date}</td>
                    <td style={{fontSize:13}}>{e.desc}</td>
                    <td className="credit-col" style={{textAlign:'right'}}>{e.type==='credit'?'₹'+e.amount.toLocaleString('en-IN',{maximumFractionDigits:2}):'—'}</td>
                    <td className="debit-col" style={{textAlign:'right'}}>{e.type==='debit'?'₹'+e.amount.toLocaleString('en-IN',{maximumFractionDigits:2}):'—'}</td>
                    <td style={{textAlign:'right',fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:e.bal>0?'var(--green)':e.bal<0?'var(--red)':'var(--text3)'}}>
                      {e.bal<0?'− ':''}₹{Math.abs(e.bal).toLocaleString('en-IN',{maximumFractionDigits:2})}
                    </td>
                    <td style={{textAlign:'center'}}>
                      <div style={{display:'flex',gap:4}}>
                      <button onClick={()=>openEdit(e)} style={{background:'rgba(59,130,246,0.08)',border:'1px solid rgba(59,130,246,0.2)',borderRadius:6,color:'var(--accent)',cursor:'pointer',padding:'3px 8px',fontSize:11,fontFamily:"'Sora',sans-serif"}}>✏️</button>
                      <button onClick={()=>{if(window.confirm('Delete this entry?'))dispatch({type:'DELETE_ADMIN_BANK_ENTRY',payload:e.id});}} style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:6,color:'var(--red)',cursor:'pointer',padding:'3px 8px',fontSize:11,fontFamily:"'Sora',sans-serif"}}>🗑️</button>
                    </div>
                    </td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr style={{borderTop:'2px solid var(--border2)',background:'var(--surface2)'}}>
                  <td colSpan={2} style={{padding:'10px 14px',fontWeight:700}}>Total</td>
                  <td className="credit-col fw-600" style={{textAlign:'right',padding:'10px 14px'}}>₹{totalCredit.toLocaleString('en-IN',{maximumFractionDigits:0})}</td>
                  <td className="debit-col fw-600" style={{textAlign:'right',padding:'10px 14px'}}>₹{totalDebit.toLocaleString('en-IN',{maximumFractionDigits:0})}</td>
                  <td style={{textAlign:'right',padding:'10px 14px',fontFamily:"'JetBrains Mono',monospace",fontWeight:800,color:netBal>=0?'var(--green)':'var(--red)'}}>
                    {netBal<0?'− ':''}₹{Math.abs(netBal).toLocaleString('en-IN',{maximumFractionDigits:0})}
                  </td>
                  <td/>
                </tr>
              </tfoot>
            </table>
        }
      </div>

      {/* Add Entry Modal */}
      {showForm && (
        <div className="modal-overlay" onClick={()=>setShowForm(false)}>
          <div className="modal" style={{width:420}} onClick={e=>e.stopPropagation()}>
            <div className="modal-title" style={{color:form.type==='credit'?'var(--green)':'var(--red)'}}>
              {editEntry ? (form.type==='credit'?'✏️ Edit Credit Entry':'✏️ Edit Debit Entry') : (form.type==='credit'?'➕ Credit Entry':'➖ Debit Entry')}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
              {[{id:'credit',label:'➕ Credit',col:'var(--green)'},{id:'debit',label:'➖ Debit',col:'var(--red)'}].map(t=>(
                <button key={t.id} onClick={()=>setForm({...form,type:t.id})} style={{padding:'10px',border:`2px solid ${form.type===t.id?t.col:'var(--border)'}`,borderRadius:9,background:form.type===t.id?`rgba(${t.col==='var(--green)'?'16,185,129':'239,68,68'},0.08)`:'var(--surface2)',cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:13,color:form.type===t.id?t.col:'var(--text)'}}>
                  {t.label}
                </button>
              ))}
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Amount (₹) *</label><input className="form-input text-mono" style={{fontSize:18}} placeholder="0.00" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} autoFocus /></div>
              <div className="form-group"><label className="form-label">Date *</label><input type="date" className="form-input" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} /></div>
            </div>
            <div className="form-group"><label className="form-label">Description *</label><input className="form-input" placeholder="e.g. Cash deposit, Withdrawal, Transfer..." value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})} onKeyDown={e=>e.key==='Enter'&&save()} /></div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>{setShowForm(false);setEditEntry(null);}}>Cancel</button>
              <button className="btn btn-primary" style={{background:form.type==='credit'?'linear-gradient(135deg,var(--green),#059669)':'linear-gradient(135deg,var(--red),#dc2626)'}} onClick={save}>
                {editEntry?'Save Changes':(form.type==='credit'?'Add Credit':'Add Debit')}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function downloadCSVReport(filename, headers, rows) {
  let csv = headers.join(',') + '\n';
  rows.forEach(r => { csv += r.map(v => '"'+String(v||'').replace(/"/g,'""')+'"').join(',') + '\n'; });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function BillPaymentReportPage({ state, user }) {
  const today = new Date().toISOString().slice(0,10);
  const firstOfMonth = today.slice(0,7)+'-01';
  const [fromDate, setFromDate] = useState(firstOfMonth);
  const [toDate,   setToDate]   = useState(today);
  const [selCust,  setSelCust]  = useState('');
  const [selBank,  setSelBank]  = useState('');

  const myCustomers = state.customers.filter(c=>c.workerId===user.id);
  const myBanks     = (state.workerBanks||[]).filter(b=>b.workerId===user.id);

  const bills = state.transactions.filter(t=>
    t.workerId===user.id && t.isBillPayment &&
    (!fromDate || t.date>=fromDate) &&
    (!toDate   || t.date<=toDate) &&
    (!selCust  || t.customerId===selCust) &&
    (!selBank  || t.swipeBankId===selBank || (t.splitParts&&t.splitParts.some(p=>p.bankId===selBank)))
  ).sort((a,b)=>b.date>a.date?1:-1);

  const totalAmt = bills.reduce((s,t)=>s+t.amount,0);
  const totalMdr = bills.reduce((s,t)=>s+(t.swipeMdrAmt||0),0);
  const totalNet = totalAmt - totalMdr;

  function downloadReport() {
    const headers = ['Date','Customer','Mobile','Card','Bill Month','Bank','Amount','MDR','Net','Ref'];
    const rows = bills.map(t=>{

  const totalTrfOut   = transfers.filter(t=>t.direction==='bank_to_customer').reduce((s,t)=>s+t.amount,0);
  const adminCredit   = (state.adminBankEntries||[]).filter(e=>e.workerId===user.id&&e.type==='credit').reduce((s,e)=>s+e.amount,0);
  const adminDebit    = (state.adminBankEntries||[]).filter(e=>e.workerId===user.id&&e.type==='debit').reduce((s,e)=>s+e.amount,0);

  // ── Customer Outstanding (all time) ──────────────────────────────────────
  const custOutstandingTotal = myCustomers.reduce((s,c)=>s+calcCustOutstanding(c.id,user.id,state),0);

  // ── My Bank Balances (all time) ───────────────────────────────────────────
  function calcBankBal(b) {
    const opening  = parseFloat(b.openingBalance||0);
    const bTxns    = (state.transactions||[]).filter(t=>t.workerId===user.id&&!t.isPayment);
    const inflow   = bTxns.reduce((s,t)=>{ if(t.isBillPayment)return s; if(t.splitParts){const p=t.splitParts.find(p=>p.bankId===b.id);return s+(p?p.netAmt||p.amount:0);} if(t.swipeBankId===b.id)return s+(t.swipeNetAmt||t.amount); return s; },0);
    const billOut  = bTxns.reduce((s,t)=>{ if(!t.isBillPayment)return s; if(t.splitParts){const p=t.splitParts.find(p=>p.bankId===b.id);return s+(p?p.amount:0);} if(t.swipeBankId===b.id)return s+(t.amount+(parseFloat(t.extraCharge)||0)); return s; },0);
    const trfIn    = (state.transfers||[]).filter(tr=>tr.bankId===b.id&&tr.workerId===user.id&&tr.direction==='customer_to_bank').reduce((s,tr)=>s+tr.amount,0);
    const trfOut   = (state.transfers||[]).filter(tr=>tr.bankId===b.id&&tr.workerId===user.id&&tr.direction==='bank_to_customer').reduce((s,tr)=>s+tr.amount,0);
    return opening + inflow - billOut + trfIn - trfOut;
  }
  const bankBalTotal = myBanks.reduce((s,b)=>s+calcBankBal(b),0);

  // ── My Cash = Cash transfers IN - OUT (all time) ──────────────────────────
  const allTransfers = (state.transfers||[]).filter(t=>t.workerId===user.id);
  const cashIn  = allTransfers.filter(t=>t.isCash&&t.direction==='customer_to_bank').reduce((s,t)=>s+t.amount,0);
  const cashOut = allTransfers.filter(t=>t.isCash&&t.direction==='bank_to_customer').reduce((s,t)=>s+t.amount,0);
  const cashTotal = cashIn - cashOut;

  // ── Admin Bank (all time) ──────────────────────────────────────────────────
  const adminBankBalance = adminCredit - adminDebit;

  // ── GRAND TOTAL ────────────────────────────────────────────────────────────
  // Customer Outstanding + My Banks + My Cash - Admin Bank
  const grandTotal = custOutstandingTotal + bankBalTotal + cashTotal - adminBankBalance;

  // Per-bank breakdown
  const bankBreakdown = myBanks.map(b=>{
    const bSwipes = swipes.filter(t=>t.swipeBankId===b.id||(t.splitParts&&t.splitParts.some(p=>p.bankId===b.id)));
    const bBills  = billPayments.filter(t=>t.swipeBankId===b.id);
    const bSwipeGross = bSwipes.reduce((s,t)=>{ if(t.splitParts){const p=t.splitParts.find(x=>x.bankId===b.id);return s+(p?p.amount:0);} return s+t.amount; },0);
    const bBillAmt  = bBills.reduce((s,t)=>s+t.amount,0);
    const bMdr      = bSwipes.reduce((s,t)=>{ if(t.splitParts){const p=t.splitParts.find(x=>x.bankId===b.id);return s+(p?p.mdrAmt||0:0);} return s+(t.swipeMdrAmt||0); },0) + bBills.reduce((s,t)=>s+(t.swipeMdrAmt||0),0);
    return { bank:b, swipeGross:bSwipeGross, billAmt:bBillAmt, mdr:bMdr, net:bSwipeGross-bBillAmt-bMdr, count:bSwipes.length+bBills.length };
  });

  const custSummary = myCustomers.map(c=>({ cust:c, bal:calcCustOutstanding(c.id,user.id,state) })).filter(x=>x.bal!==0);

  function downloadReport() {
    let csv = 'CLOSING REPORT\n';
    csv += 'Worker:,'+user.name+'\n';
    csv += 'Period:,'+(fromDate||'All')+' to '+(toDate||'All')+'\n';
    csv += 'Generated:,'+today+'\n\n';
    csv += 'SUMMARY\n';
    csv += 'Customer Outstanding (All Time),,'+custOutstandingTotal.toFixed(2)+'\n';
    csv += 'My Bank Balance (All Time),,'+bankBalTotal.toFixed(2)+'\n';
    csv += 'My Cash Balance (All Time),,'+cashTotal.toFixed(2)+'\n';
    csv += 'Admin Bank Balance (All Time),,'+adminBankBalance.toFixed(2)+'\n';
    csv += 'GRAND TOTAL (Cust+Banks+Cash-Admin),,'+grandTotal.toFixed(2)+'\n\n';
    csv += 'PERIOD: '+fromDate+' to '+toDate+'\n';
    csv += 'Total Swipe,,'+totalSwipe+'\nSC Earned,,'+totalSC.toFixed(2)+'\nBill Payments,,'+totalBill+'\nMDR Paid,,'+totalMdr.toFixed(2)+'\n';
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='ClosingReport_'+fromDate+'_'+toDate+'.csv';a.click();
    URL.revokeObjectURL(url);
  }

  const Row = ({label,val,color,bold,indent,divider})=>(
    <div style={{display:'flex',justifyContent:'space-between',padding:divider?'4px 0':'8px 0',borderBottom:divider?'none':'1px solid rgba(255,255,255,0.05)'}}>
      <span style={{fontSize:13,color:'var(--text2)',fontWeight:bold?700:400,paddingLeft:indent?12:0}}>{label}</span>
      <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:bold?800:600,fontSize:bold?16:13,color:color||'var(--text)'}}>{val}</span>
    </div>
  );

  const fmt = n => (n<0?'− ':'')+'₹'+Math.abs(n).toLocaleString('en-IN',{maximumFractionDigits:0});

  return (
    <div className="content fade-in">

      {/* Date filter */}
      <div className="card-block" style={{marginBottom:16}}>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end'}}>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">From</label>
            <input type="date" className="form-input" style={{width:145}} value={fromDate} onChange={e=>setFromDate(e.target.value)} />
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">To</label>
            <input type="date" className="form-input" style={{width:145}} value={toDate} onChange={e=>setToDate(e.target.value)} />
          </div>
          <button className="btn btn-sm btn-outline" onClick={()=>{setFromDate(firstOfMonth);setToDate(today);}}>This Month</button>
          <button className="btn btn-sm btn-outline" onClick={()=>{setFromDate(today);setToDate(today);}}>Today</button>
          <button className="btn btn-sm btn-primary" style={{marginLeft:'auto'}} onClick={downloadReport}>⬇️ Download CSV</button>
        </div>
      </div>

      {/* Grand Total Banner */}
      <div style={{background:'linear-gradient(135deg,#1e3a8a,#4c1d95)',borderRadius:14,padding:'18px 24px',marginBottom:20,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.55)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:4}}>Grand Total (All Time)</div>
          <div style={{fontSize:12,color:'rgba(255,255,255,0.4)'}}>Customer Outstanding + My Banks + My Cash − Admin Bank</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:32,fontWeight:900,fontFamily:"'JetBrains Mono',monospace",color:grandTotal>=0?'#86efac':'#fca5a5'}}>
            {grandTotal<0?'− ':''}₹{Math.abs(grandTotal).toLocaleString('en-IN',{maximumFractionDigits:0})}
          </div>
        </div>
      </div>

      <div className="grid-2">
        {/* Left */}
        <div>
          {/* All-time balance breakdown */}
          <div className="card-block" style={{marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>💰 Balance Breakdown (All Time)</div>
            <Row label="👤 Customer Outstanding" val={fmt(custOutstandingTotal)} color={custOutstandingTotal>0?'var(--red)':custOutstandingTotal<0?'var(--green)':'var(--text3)'} />
            <Row label="🏦 My Bank Balance" val={fmt(bankBalTotal)} color={bankBalTotal>=0?'var(--green)':'var(--red)'} />
            <Row label="💵 My Cash Balance" val={fmt(cashTotal)} color={cashTotal>=0?'var(--green)':'var(--red)'} />
            <Row label="🏛️ Admin Bank" val={'− '+fmt(adminBankBalance)} color="var(--red)" />
            <div style={{height:2,background:'linear-gradient(90deg,var(--accent),var(--accent3))',margin:'8px 0',borderRadius:2}}/>
            <Row label="💰 GRAND TOTAL" val={fmt(grandTotal)} color={grandTotal>=0?'var(--green)':'var(--red)'} bold={true} />
          </div>

          {/* Period summary */}
          <div className="card-block">
            <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>📅 Period Summary ({fromDate||'All'} → {toDate||'All'})</div>
            <Row label="💳 Total Swipe" val={fmt(totalSwipe)} />
            <Row label="  └ SC Earned" val={'₹'+totalSC.toFixed(0)} color="var(--orange)" indent />
            <Row label="  └ MDR Swipe" val={'−₹'+totalSwipeMdr.toFixed(0)} color="var(--red)" indent />
            <Row label="🧾 Bill Payments" val={'−'+fmt(totalBill)} color="var(--red)" />
            <Row label="  └ MDR Bill" val={'−₹'+totalBillMdr.toFixed(0)} color="var(--red)" indent />
            <Row label="⬇️ Transfer IN" val={'+'+fmt(totalTrfIn)} color="var(--green)" />
            <Row label="⬆️ Transfer OUT" val={'−'+fmt(totalTrfOut)} color="var(--red)" />
          </div>
        </div>

        {/* Right */}
        <div>
          {/* Bank-wise */}
          <div className="card-block" style={{marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>🏦 Bank Balance (All Time)</div>
            {myBanks.length===0
              ? <div style={{color:'var(--text3)',fontSize:13,textAlign:'center',padding:'20px'}}>No banks added.</div>
              : myBanks.map(b=>{
                  const bal = calcBankBal(b);
                  return (
                    <div key={b.id} style={{display:'flex',justifyContent:'space-between',padding:'10px 12px',background:'var(--surface2)',borderRadius:9,marginBottom:6,border:'1px solid var(--border)'}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:13}}>{b.name}</div>
                        <div style={{fontSize:11,color:'var(--text3)',fontFamily:"'JetBrains Mono',monospace"}}>{b.account||'—'}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:15,color:bal>=0?'var(--green)':'var(--red)'}}>{fmt(bal)}</div>
                      </div>
                    </div>
                  );
                })
            }
            <div style={{display:'flex',justifyContent:'space-between',padding:'8px 12px',background:'rgba(16,185,129,0.08)',borderRadius:9,border:'1px solid rgba(16,185,129,0.2)',marginTop:4}}>
              <span style={{fontWeight:700,fontSize:13}}>Total Banks</span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:800,fontSize:15,color:bankBalTotal>=0?'var(--green)':'var(--red)'}}>{fmt(bankBalTotal)}</span>
            </div>
          </div>

          {/* Customer outstanding */}
          <div className="card-block">
            <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>👤 Customer Outstanding (All Time)</div>
            {custSummary.length===0
              ? <div style={{color:'var(--green)',fontSize:13,textAlign:'center',padding:'10px'}}>✅ All accounts clear</div>
              : custSummary.map(({cust,bal})=>(
                  <div key={cust.id} style={{display:'flex',justifyContent:'space-between',padding:'8px 10px',background:'var(--surface2)',borderRadius:8,marginBottom:6,border:'1px solid var(--border)'}}>
                    <div>
                      <div style={{fontWeight:600,fontSize:13}}>{cust.name}</div>
                      <div style={{fontSize:11,color:'var(--text3)',fontFamily:"'JetBrains Mono',monospace"}}>{cust.mobile}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:14,color:bal>0?'var(--red)':'var(--green)'}}>{fmt(bal)}</div>
                      <div style={{fontSize:10,fontWeight:700,color:bal>0?'var(--red)':'var(--green)'}}>{bal>0?'Dr':'Cr'}</div>
                    </div>
                  </div>
                ))
            }
            {custSummary.length>0&&(
              <div style={{display:'flex',justifyContent:'space-between',padding:'8px 12px',background:custOutstandingTotal>0?'rgba(239,68,68,0.08)':'rgba(16,185,129,0.08)',borderRadius:9,border:`1px solid ${custOutstandingTotal>0?'rgba(239,68,68,0.2)':'rgba(16,185,129,0.2)'}`,marginTop:4}}>
                <span style={{fontWeight:700,fontSize:13}}>Total Outstanding</span>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:800,fontSize:15,color:custOutstandingTotal>0?'var(--red)':'var(--green)'}}>{fmt(custOutstandingTotal)}</span>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── DAILY TASKS PAGE ─────────────────────────────────────────────────────────

function DailyTasksPage({ state, dispatch, user }) {
  const today = new Date().toISOString().slice(0,10);
  const [selDate, setSelDate] = useState(today);
  const [fromDate, setFromDate] = useState(today);
  const [toDate,   setToDate]   = useState(today);
  const [showForm, setShowForm] = useState(false);
  const [editTask, setEditTask] = useState(null);
  const [tab, setTab] = useState('tasks');
  const emptyForm = { taskType:'note', title:'', desc:'', priority:'medium', date:today, custId:'', cardId:'', billDueDate:today, billAmount:'', remark:'', reminderDate:today, reminderTime:'10:00', amount:'', custIdR:'', type:'task' };
  const [form, setForm] = useState(emptyForm);

  const myTasks     = (state.dailyTasks||[]).filter(t=>t.workerId===user.id&&t.type==='task');
  const myReminders = (state.dailyTasks||[]).filter(t=>t.workerId===user.id&&t.type==='reminder');
  const myCustomers = state.customers.filter(c=>c.workerId===user.id);
  const custCards   = form.custId ? state.cards.filter(k=>k.customerId===form.custId) : [];

  const dateTasks = myTasks.filter(t=>(!fromDate||t.date>=fromDate)&&(!toDate||t.date<=toDate)).sort((a,b)=>a.date>b.date?1:a.date<b.date?-1:a.done===b.done?0:a.done?1:-1);
  const pendingReminders = myReminders.filter(t=>!t.done).sort((a,b)=>a.reminderDate>b.reminderDate?1:-1);
  const doneReminders    = myReminders.filter(t=>t.done).sort((a,b)=>b.reminderDate>a.reminderDate?1:-1);
  const overdueCount = myReminders.filter(t=>!t.done&&t.reminderDate<today).length;

  function save() {
    if (form.type==='task') {
      if (!form.title.trim() && form.taskType==='note') return alert('Title required');
      if (form.taskType==='bill' && !form.custId) return alert('Select customer');
    } else {
      if (!form.title.trim()) return alert('Title required');
    }

    const baseTitle = form.taskType==='bill'
      ? ('💳 Bill Payment — '+(myCustomers.find(c=>c.id===form.custId)?.name||''))
      : form.title.trim();

    const payload = {
      type: form.type,
      taskType: form.taskType,
      title: baseTitle,
      desc: form.desc.trim(),
      priority: form.priority,
      date: form.date,
      // bill fields
      custId: form.custId,
      cardId: form.cardId,
      billDueDate: form.billDueDate,
      billAmount: parseFloat(form.billAmount)||0,
      remark: form.remark.trim(),
      // reminder fields
      reminderDate: form.reminderDate,
      reminderTime: form.reminderTime,
      amount: parseFloat(form.amount)||0,
      custIdR: form.custIdR,
      done: editTask?.done||false,
      workerId: user.id
    };

    if (editTask) {
      dispatch({ type:'EDIT_TASK', payload:{ id:editTask.id, ...payload }});
    } else {
      dispatch({ type:'ADD_TASK', payload:{ id:'TK'+Date.now(), ...payload }});
    }
    setForm(emptyForm);
    setEditTask(null);
    setShowForm(false);
  }

  function openEdit(t) {
    setEditTask(t);
    setForm({ ...emptyForm, ...t });
    setShowForm(true);
  }

  function openAddTask(taskType) {
    setEditTask(null);
    setForm({ ...emptyForm, type:'task', taskType, date:today });
    setShowForm(true);
  }

  const priorityColor = { high:'var(--red)', medium:'var(--orange)', low:'var(--green)' };
  const priorityBg    = { high:'rgba(239,68,68,0.08)', medium:'rgba(245,158,11,0.08)', low:'rgba(16,185,129,0.08)' };
  function addDays(d,n){ const dt=new Date(d); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); }

  // Task card renderer
  function TaskCard({t}) {
    const cust = state.customers.find(c=>c.id===t.custId);
    const card = state.cards.find(k=>k.id===t.cardId);
    const isBill = t.taskType==='bill';
    return (
      <div style={{display:'flex',gap:12,padding:'13px 14px',background:t.done?'var(--surface2)':'var(--surface)',borderRadius:12,border:`1px solid ${t.done?'var(--border)':(isBill?'rgba(99,102,241,0.35)':priorityColor[t.priority||'medium']+'44')}`,opacity:t.done?0.55:1,transition:'all 0.2s'}}>
        <button onClick={()=>dispatch({type:'TOGGLE_TASK',payload:t.id})} style={{width:22,height:22,borderRadius:6,border:`2px solid ${t.done?'var(--green)':isBill?'var(--accent2)':priorityColor[t.priority||'medium']}`,background:t.done?'var(--green)':'transparent',cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff',marginTop:1}}>
          {t.done?'✓':''}
        </button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:isBill?6:2}}>
            <span style={{fontSize:13,fontWeight:700,textDecoration:t.done?'line-through':'none',color:t.done?'var(--text3)':'var(--text)'}}>{t.title}</span>
            {isBill&&<span style={{fontSize:10,padding:'1px 6px',borderRadius:5,background:'rgba(99,102,241,0.15)',color:'var(--accent2)',fontWeight:700}}>BILL</span>}
          </div>
          {isBill&&(
            <div style={{display:'flex',gap:10,flexWrap:'wrap',fontSize:11,color:'var(--text3)',marginBottom:t.desc?4:0}}>
              {cust&&<span>👤 {cust.name} · {cust.mobile}</span>}
              {card&&<span>💳 ****{card.last4} ({card.bank})</span>}
              {t.billDueDate&&<span style={{color:t.billDueDate<today&&!t.done?'var(--red)':'var(--text3)'}}>Due: {t.billDueDate}</span>}
              {t.billAmount>0&&<span style={{color:'var(--orange)',fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>₹{t.billAmount.toLocaleString('en-IN')}</span>}
            </div>
          )}
          {t.desc&&<div style={{fontSize:11,color:'var(--text3)'}}>{t.desc}</div>}
          {t.remark&&<div style={{fontSize:11,color:'var(--text2)',fontStyle:'italic'}}>📝 {t.remark}</div>}
        </div>
        <div style={{display:'flex',gap:4,alignItems:'flex-start',flexShrink:0}}>
          {!isBill&&<span style={{fontSize:10,padding:'2px 7px',borderRadius:5,background:priorityBg[t.priority||'medium'],color:priorityColor[t.priority||'medium'],fontWeight:700,textTransform:'uppercase'}}>{t.priority||'med'}</span>}
          <button onClick={()=>openEdit(t)} style={{background:'rgba(59,130,246,0.08)',border:'1px solid rgba(59,130,246,0.2)',borderRadius:6,color:'var(--accent)',cursor:'pointer',padding:'2px 7px',fontSize:11}}>✏️</button>
          <button onClick={()=>{if(window.confirm('Delete?'))dispatch({type:'DELETE_TASK',payload:t.id});}} style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:6,color:'var(--red)',cursor:'pointer',padding:'2px 7px',fontSize:11}}>🗑️</button>
        </div>
      </div>
    );
  }

  return (
    <div className="content fade-in">
      {/* Tabs */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
        {[{id:'tasks',label:'✅ Daily Tasks'},{id:'reminders',label:'🔔 Reminders'+(overdueCount?' ('+overdueCount+' overdue)':'')}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'11px',border:`2px solid ${tab===t.id?'var(--accent)':'var(--border)'}`,borderRadius:10,background:tab===t.id?'rgba(59,130,246,0.08)':'var(--surface)',cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:13,color:tab===t.id?'var(--accent)':'var(--text)'}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ── TASKS TAB ── */}
      {tab==='tasks' && (
        <div>
          {/* Date Range Filter */}
          <div style={{display:'flex',gap:8,alignItems:'flex-end',marginBottom:14,flexWrap:'wrap'}}>
            <div className="form-group" style={{marginBottom:0}}>
              <label className="form-label">From</label>
              <input type="date" className="form-input" style={{width:140}} value={fromDate} onChange={e=>setFromDate(e.target.value)} />
            </div>
            <div className="form-group" style={{marginBottom:0}}>
              <label className="form-label">To</label>
              <input type="date" className="form-input" style={{width:140}} value={toDate} onChange={e=>setToDate(e.target.value)} />
            </div>
            <button onClick={()=>{setFromDate(today);setToDate(today);}} style={{padding:'9px 12px',background:fromDate===today&&toDate===today?'var(--accent)':'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,cursor:'pointer',color:fromDate===today&&toDate===today?'#fff':'var(--text)',fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:600}}>Today</button>
            <button onClick={()=>{const w=addDays(today,-((new Date(today).getDay()+6)%7));setFromDate(w);setToDate(today);}} style={{padding:'9px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,cursor:'pointer',color:'var(--text)',fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:600}}>This Week</button>
            <button onClick={()=>{setFromDate(today.slice(0,7)+'-01');setToDate(today);}} style={{padding:'9px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,cursor:'pointer',color:'var(--text)',fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:600}}>This Month</button>
          </div>

          {/* Add buttons */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>

                            </div>
                          </div>

                  <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Done ({doneReminders.length})</div>
                  <div style={{display:'flex',flexDirection:'column',gap:6,opacity:0.5}}>

                        <button onClick={()=>dispatch({type:'TOGGLE_TASK',payload:t.id})} style={{fontSize:11,padding:'2px 7px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',color:'var(--text3)',fontFamily:"'Sora',sans-serif"}}>Undo</button>
                      </div>
                    ))}
                  </div>
                </>}
              </>
          }
        </div>
      )}

      {/* ── MODAL ── */}
      {showForm && (

// ─── SETTINGS PAGE ─────────────────────────────────────────────────────────────

function SettingsPage({ state, dispatch, user, darkMode, setDarkMode }) {
  const currentPin = (state.workerPins||{})[user.id];
  const [showPinModal, setShowPinModal] = useState(false);
  const [pinMode, setPinMode] = useState('set'); // set | change | remove
  const [oldPin, setOldPin] = useState('');
  const [newPin, setNewPin] = useState('');
  const [confirmPin, setConfirmPin] = useState('');
  const [pinSuccess, setPinSuccess] = useState('');

  function savePin() {
    if (pinMode==='change' && oldPin !== currentPin) return alert('Old PIN incorrect');
    if (newPin.length !== 4 || !/^\d{4}$/.test(newPin)) return alert('PIN must be exactly 4 digits');
    if (newPin !== confirmPin) return alert('PINs do not match');
    dispatch({ type:'SET_PIN', payload:{ userId:user.id, pin:newPin }});
    setShowPinModal(false);
    setOldPin(''); setNewPin(''); setConfirmPin('');
    setPinSuccess('✅ PIN '+(pinMode==='set'?'set':'changed')+' successfully!');
    setTimeout(()=>setPinSuccess(''),3000);
  }

  function removePin() {
    if (oldPin !== currentPin) return alert('PIN incorrect');
    dispatch({ type:'CLEAR_PIN', payload:user.id });
    setShowPinModal(false);
    setOldPin('');
    setPinSuccess('✅ PIN removed.');
    setTimeout(()=>setPinSuccess(''),3000);
  }

  return (
    <div className="content fade-in">
      {pinSuccess && <div className="alert-banner alert-success">{pinSuccess}</div>}

      {/* Appearance */}
      <div className="card-block" style={{marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:16}}>🎨 Appearance</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
          <div>
            <div style={{fontWeight:600,fontSize:13}}>Theme</div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{darkMode?'Dark Mode — Comfortable for low light':'Light Mode — Clean and bright'}</div>
          </div>
          <div className="theme-toggle-wrap" onClick={()=>setDarkMode(d=>!d)} style={{cursor:'pointer'}}>
            <span style={{fontSize:16}}>{darkMode?'🌙':'☀️'}</span>
            <button className={`theme-toggle ${darkMode?'dark':''}`} onClick={e=>e.stopPropagation()} style={{pointerEvents:'none'}}>
              <div className="theme-toggle-knob">{darkMode?'🌙':'☀️'}</div>
            </button>
            <span className="theme-toggle-label">{darkMode?'Dark':'Light'}</span>
          </div>
        </div>
      </div>

      {/* Security / PIN */}
      <div className="card-block" style={{marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:16}}>🔐 Security</div>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 0',borderBottom:'1px solid var(--border)'}}>
          <div>
            <div style={{fontWeight:600,fontSize:13}}>Login PIN</div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>
              {currentPin
                ? '🔒 PIN is set — required after every login'
                : '🔓 No PIN — login directly with password only'}
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {currentPin && (
              <button onClick={()=>{setPinMode('remove');setOldPin('');setShowPinModal(true);}} style={{padding:'8px 14px',background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.25)',borderRadius:8,color:'var(--red)',cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:600,fontSize:12}}>
                Remove
              </button>
            )}
            <button onClick={()=>{setPinMode(currentPin?'change':'set');setOldPin('');setNewPin('');setConfirmPin('');setShowPinModal(true);}} style={{padding:'8px 16px',background:'linear-gradient(135deg,var(--accent),var(--accent2))',border:'none',borderRadius:8,color:'#fff',cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:12}}>
              {currentPin?'Change PIN':'Set PIN'}
            </button>
          </div>
        </div>

        {currentPin && (
          <div style={{marginTop:12,padding:'10px 14px',background:'rgba(16,185,129,0.07)',border:'1px solid rgba(16,185,129,0.2)',borderRadius:9,fontSize:12,color:'var(--green)'}}>
            ✅ PIN protection is active. After logging in with your password, you will be asked to enter your 4-digit PIN.
          </div>
        )}
      </div>

      {/* Account Info */}
      <div className="card-block">
        <div style={{fontSize:14,fontWeight:700,marginBottom:16}}>👤 Account</div>
        <div style={{display:'grid',gap:10}}>
          {[{label:'Name',val:user.name},{label:'Email',val:user.email},{label:'Role',val:user.role==='admin'?'Administrator':'Worker'},{label:'ID',val:user.id}].map(r=>(
            <div key={r.label} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontSize:12,color:'var(--text3)',fontWeight:600}}>{r.label}</span>
              <span style={{fontSize:13,color:'var(--text)',fontFamily:r.label==='ID'?"'JetBrains Mono',monospace":undefined}}>{r.val}</span>
            </div>
          ))}
        </div>
      </div>

      {/* PIN Modal */}
      {showPinModal && (
        <div className="modal-overlay" onClick={()=>setShowPinModal(false)}>
          <div className="modal" style={{width:380}} onClick={e=>e.stopPropagation()}>
            <div className="modal-title">{pinMode==='remove'?'🗑️ Remove PIN':pinMode==='change'?'🔄 Change PIN':'🔐 Set PIN'}</div>
            <div className="modal-sub">{pinMode==='set'?'Set a 4-digit PIN for extra security after login.':pinMode==='change'?'Enter old PIN and set a new one.':'Enter your PIN to remove it.'}</div>

            {(pinMode==='change'||pinMode==='remove') && (
              <div className="form-group">
                <label className="form-label">Current PIN</label>
                <input className="form-input text-mono" style={{letterSpacing:'0.3em',fontSize:20,textAlign:'center'}} type="password" maxLength={4} placeholder="••••" value={oldPin} onChange={e=>setOldPin(e.target.value.replace(/\D/g,'').slice(0,4))} autoFocus />
              </div>
            )}
            {pinMode!=='remove' && <>
              <div className="form-group">
                <label className="form-label">{pinMode==='change'?'New PIN':'PIN (4 digits)'}</label>
                <input className="form-input text-mono" style={{letterSpacing:'0.3em',fontSize:20,textAlign:'center'}} type="password" maxLength={4} placeholder="••••" value={newPin} onChange={e=>setNewPin(e.target.value.replace(/\D/g,'').slice(0,4))} autoFocus={pinMode==='set'} />
              </div>
              <div className="form-group">
                <label className="form-label">Confirm PIN</label>
                <input className="form-input text-mono" style={{letterSpacing:'0.3em',fontSize:20,textAlign:'center'}} type="password" maxLength={4} placeholder="••••" value={confirmPin} onChange={e=>setConfirmPin(e.target.value.replace(/\D/g,'').slice(0,4))} onKeyDown={e=>e.key==='Enter'&&savePin()} />
              </div>
            </>}
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowPinModal(false)}>Cancel</button>
              <button className="btn btn-primary" style={{background:pinMode==='remove'?'linear-gradient(135deg,var(--red),#dc2626)':undefined}} onClick={pinMode==='remove'?removePin:savePin}>
                {pinMode==='remove'?'Remove PIN':pinMode==='change'?'Change PIN':'Set PIN'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── REDUCER ─────────────────────────────────────────────────────────────────
function reducer(state, action) {
  switch (action.type) {
    case 'ADD_WORKER': return { ...state, workers:[...state.workers,action.payload] };
    case 'EDIT_WORKER': return { ...state, workers:state.workers.map(w=>w.id===action.payload.id?{...w,...action.payload}:w) };
    case 'TOGGLE_WORKER': return { ...state, workers:state.workers.map(w=>w.id===action.payload?{...w,status:w.status==='active'?'inactive':'active'}:w) };
    case 'ADD_CUSTOMER': return { ...state, customers:[...state.customers,action.payload] };
    case 'BLOCK_CUSTOMER': return { ...state, customers:state.customers.map(c=>c.id===action.payload.id?{...c,status:'blocked',inactiveReason:action.payload.reason,inactiveDate:action.payload.date,inactiveBy:action.payload.by}:c) };
    case 'UNBLOCK_CUSTOMER': return { ...state, customers:state.customers.map(c=>c.id===action.payload?{...c,status:'active',inactiveReason:'',inactiveDate:'',inactiveBy:''}:c) };
    case 'ADD_CARD': return { ...state, cards:[...state.cards,action.payload] };
    case 'ADD_TRANSACTION': return { ...state, transactions:[...state.transactions,action.payload] };
    case 'ADD_PAYMENT': return { ...state, transactions:[...state.transactions,{...action.payload,serviceChargePct:0,extraCharge:0,cardId:'',isPayment:true,status:'success'}] };
    case 'RESOLVE_UNLOCK': return { ...state, unlockRequests:state.unlockRequests.map(u=>u.id===action.payload.id?{...u,status:action.payload.action}:u) };
    case 'ADD_BANK': return { ...state, workerBanks:[...state.workerBanks,action.payload] };
    case 'EDIT_BANK': return { ...state, workerBanks:state.workerBanks.map(b=>b.id===action.payload.id?action.payload:b) };
    case 'DELETE_BANK': return { ...state, workerBanks:state.workerBanks.filter(b=>b.id!==action.payload) };
    case 'ADD_TRANSFER': return { ...state, transfers:[...state.transfers,action.payload] };
    case 'ADD_MANUAL_ENTRY': return { ...state, manualEntries:[...state.manualEntries,action.payload] };
    case 'ADD_LEDGER_ENTRY': return { ...state, ledgerEntries:[...(state.ledgerEntries||[]),action.payload] };
    case 'DELETE_LEDGER_ENTRY': return { ...state, ledgerEntries:(state.ledgerEntries||[]).filter(e=>e.id!==action.payload) };
    case 'ADD_ADMIN_BANK_ENTRY': return { ...state, adminBankEntries:[...(state.adminBankEntries||[]),action.payload] };
    case 'EDIT_ADMIN_BANK_ENTRY': return { ...state, adminBankEntries:(state.adminBankEntries||[]).map(e=>e.id===action.payload.id?{...e,...action.payload}:e) };
    case 'DELETE_ADMIN_BANK_ENTRY': return { ...state, adminBankEntries:(state.adminBankEntries||[]).filter(e=>e.id!==action.payload) };
    case 'ADD_TASK':    return { ...state, dailyTasks:[...(state.dailyTasks||[]),action.payload] };
    case 'SET_PIN': return { ...state, workerPins:{...(state.workerPins||{}), [action.payload.userId]:action.payload.pin} };
    case 'CLEAR_PIN': return { ...state, workerPins:{...(state.workerPins||{}), [action.payload]:null} };
    case 'EDIT_TASK':   return { ...state, dailyTasks:(state.dailyTasks||[]).map(t=>t.id===action.payload.id?{...t,...action.payload}:t) };
    case 'DELETE_TASK': return { ...state, dailyTasks:(state.dailyTasks||[]).filter(t=>t.id!==action.payload) };
    case 'TOGGLE_TASK': return { ...state, dailyTasks:(state.dailyTasks||[]).map(t=>t.id===action.payload?{...t,done:!t.done}:t) };
    case 'ADD_COMPLAINT': return { ...state, complaints:[...state.complaints,action.payload] };
    case 'RESOLVE_COMPLAINT': return { ...state, complaints:state.complaints.map(c=>c.id===action.payload?{...c,status:'resolved'}:c) };
    case 'ADD_COMPLAINT_MSG': return { ...state, complaints:state.complaints.map(c=>c.id===action.payload.complaintId?{...c,messages:[...(c.messages||[]),action.payload.msg]}:c) };
    case 'ADD_PLAN': return { ...state, plans:[...(state.plans||[]),action.payload] };
    case 'EDIT_PLAN': return { ...state, plans:(state.plans||[]).map(p=>p.id===action.payload.id?{...p,...action.payload}:p) };
    case 'DELETE_PLAN': return { ...state, plans:(state.plans||[]).filter(p=>p.id!==action.payload) };
    case 'TOGGLE_PLAN': return { ...state, plans:(state.plans||[]).map(p=>p.id===action.payload?{...p,active:p.active===false?true:false}:p) };
    case 'ADD_SUBSCRIPTION': return { ...state, subscriptions:[...(state.subscriptions||[]),action.payload] };
    case 'RENEW_SUBSCRIPTION': return { ...state, subscriptions:(state.subscriptions||[]).map(s=>s.id===action.payload.id?{...s,expiryDate:action.payload.expiryDate,status:'active',payments:[...(s.payments||[]),action.payload.payment]}:s) };
    case 'EXPIRE_SUBSCRIPTION': return { ...state, subscriptions:(state.subscriptions||[]).map(s=>s.id===action.payload?{...s,status:'expired'}:s) };
    case 'ADD_PLAN_REQUEST': return { ...state, subscriptionRequests:[...(state.subscriptionRequests||[]),action.payload] };
    case 'UPDATE_PLAN_REQUEST': return { ...state, subscriptionRequests:(state.subscriptionRequests||[]).map(r=>r.id===action.payload.id?{...r,...action.payload}:r) };
    case 'ADD_PLAN_REQUEST': return { ...state, subscriptionRequests:[...(state.subscriptionRequests||[]),action.payload] };
    case 'APPROVE_PLAN_REQUEST': {
      const req = (state.subscriptionRequests||[]).find(r=>r.id===action.payload.id);
      if(!req) return state;
      const plan = (state.plans||[]).find(p=>p.id===req.planId);
      const start = new Date().toISOString().slice(0,10);
      const expiry = new Date(); expiry.setDate(expiry.getDate()+(plan?.duration||30));
      return {
        ...state,
        subscriptionRequests:(state.subscriptionRequests||[]).map(r=>r.id===action.payload.id?{...r,status:'approved',respondedAt:start}:r),
        subscriptions:[...(state.subscriptions||[]),{
          id:'SUB'+Date.now(), workerId:req.workerId, planId:req.planId, planName:req.planName,
          planPrice:req.planPrice, planColor:plan?.color||'blue', duration:plan?.duration||30,
          startDate:start, expiryDate:expiry.toISOString().slice(0,10), status:'active',
          paymentMode:req.paymentMode, txnRef:req.txnRef, notes:req.notes, createdAt:start,
          payments:[{amount:req.planPrice,date:start,mode:req.paymentMode,ref:req.txnRef||'RCP'+Date.now(),note:'Via worker request'}]
        }]
      };
    }
    case 'REJECT_PLAN_REQUEST': return { ...state, subscriptionRequests:(state.subscriptionRequests||[]).map(r=>r.id===action.payload?{...r,status:'rejected',respondedAt:new Date().toISOString().slice(0,10)}:r) };
    case 'DELETE_MANUAL_ENTRY': return { ...state, manualEntries:state.manualEntries.filter(e=>e.id!==action.payload) };
    default: return state;
  }
}

// ─── PAGE TITLES ─────────────────────────────────────────────────────────────
const PAGE_TITLES = {
  dashboard:'Admin Dashboard', workers:'Worker Management', allCustomers:'All Customers', allTransactions:'All Transactions',
  reports:'System Reports', fraudAlerts:'Fraud Alerts', unlockRequests:'Unlock Requests', loginLogs:'Login Activity Logs',
  adminSearch:'Search & Track', plansAdmin:'Manage Plans', subscriptionsAdmin:'Worker Subscriptions', myPlan:'My Subscription',
  wDashboard:'Worker Dashboard', customers:'My Customers', cards:'Card Management', newTransaction:'New Transaction',
  transactions:'Transaction History', ledger:'Customer Ledger', payments:'Payments', dailyReport:'Daily Report',
  myBanks:'My Bank Accounts',
  bankStatement:'Bank Statements',
  transfers:'Fund Transfer',
  complaints:'Customer Complaints',
  workerComplaints:'My Complaints',
  tracking:'Track & Search',
  manualLedger:'Cash Book',
  billPayment:'Bill Payment',
  adminBank:'Admin Bank',
  dailyTasks:'Tasks & Reminders',
  settings:'Settings',
  billPaymentReport:'Bill Payment Report',
  swipeReport:'Swipe Report',
  transferReport:'Fund Transfer Report',
  closingReport:'Closing Report',
};

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App() {
  const [state, dispatch] = React.useReducer(reducer, INITIAL_STATE);
  const [currentUser, setCurrentUser] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [pinStep, setPinStep] = useState(false);
  const [pendingUser, setPendingUser] = useState(null);
  const [pinInput, setPinInput] = useState('');
  const [darkMode, setDarkMode] = useState(()=>{
    try { return localStorage.getItem('nexuspay_theme') !== 'light'; } catch(e){ return true; }
  });
  const now = new Date().toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'});

  React.useEffect(()=>{
    document.body.classList.toggle('light-mode', !darkMode);
    try { localStorage.setItem('nexuspay_theme', darkMode?'dark':'light'); } catch(e){}
  }, [darkMode]);

  function handleLogin(user) {
    const userPin = (state.workerPins||{})[user.id];
    if (userPin) {
      setPendingUser(user);
      setPinStep(true);
      setPinInput('');
    } else {
      setCurrentUser(user);
      setPage(user.role==='admin'?'dashboard':'wDashboard');
    }
  }

  function verifyPin() {
    const userPin = (state.workerPins||{})[pendingUser.id];
    if (pinInput === userPin) {
      setCurrentUser(pendingUser);
      setPage(pendingUser.role==='admin'?'dashboard':'wDashboard');
      setPinStep(false);
      setPendingUser(null);
      setPinInput('');
    } else {
      setPinInput('');
      alert('Wrong PIN. Try again.');
    }
  }

  function handleLogout() { setCurrentUser(null); setPage('login'); }

  // Auto-login from shortcut launcher
  React.useEffect(()=>{
    try {
      const token = localStorage.getItem('nexuspay_autologin');
      if(token) {
        const user = JSON.parse(token);
        localStorage.removeItem('nexuspay_autologin');
        handleLogin(user);
      }
    } catch(e){}
  }, []);

  if (!currentUser && pinStep && pendingUser) return (
    <div className="login-wrap">
      <div className="login-bg"/><div className="login-grid"/>
      <div className="login-card" style={{textAlign:'center'}}>
        <div className="login-logo"><div className="login-logo-icon">🔐</div><div className="login-logo-text">PIN Verify</div></div>
        <div className="login-title">Enter Your PIN</div>
        <div className="login-sub">Welcome back, <strong>{pendingUser.name}</strong></div>
        <div style={{display:'flex',gap:10,justifyContent:'center',margin:'20px 0'}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{width:48,height:56,borderRadius:12,border:`2px solid ${pinInput.length>i?'var(--accent)':'var(--border)'}`,background:'var(--surface2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:700,color:'var(--accent)',transition:'all 0.15s'}}>
              {pinInput.length>i?'●':''}
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,maxWidth:240,margin:'0 auto 16px'}}>
          {[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((k,i)=>(
            <button key={i} onClick={()=>{
              if(k==='⌫') setPinInput(p=>p.slice(0,-1));
              else if(k!==''&&pinInput.length<4) { const np=pinInput+k; setPinInput(np); if(np.length===4) setTimeout(()=>{ const up=(state.workerPins||{})[pendingUser.id]; if(np===up){setCurrentUser(pendingUser);setPage(pendingUser.role==='admin'?'dashboard':'wDashboard');setPinStep(false);setPendingUser(null);setPinInput('');} else {setPinInput('');alert('Wrong PIN');} },100); }
            }} style={{padding:'14px',borderRadius:12,border:'1px solid var(--border)',background:k===''?'transparent':'var(--surface)',cursor:k===''?'default':'pointer',fontSize:k==='⌫'?18:20,fontWeight:700,color:'var(--text)',fontFamily:"'Sora',sans-serif",boxShadow:k!==''?'var(--shadow)':'none'}}>
              {k}
            </button>
          ))}
        </div>
        <button onClick={()=>{setPinStep(false);setPendingUser(null);setPinInput('');}} style={{fontSize:12,color:'var(--text3)',background:'none',border:'none',cursor:'pointer',fontFamily:"'Sora',sans-serif"}}>← Back to login</button>
      </div>
    </div>
  );
  if (!currentUser) return <LoginPage onLogin={handleLogin} workers={state.workers} darkMode={darkMode} setDarkMode={setDarkMode} />;

  const isAdmin = currentUser.role==='admin';

  // ── Worker subscription check ─────────────────────────────────────────────
  if (!isAdmin) {
    const today = new Date().toISOString().slice(0,10);
    const activeSub = (state.subscriptions||[]).find(s=>
      s.workerId===currentUser.id &&
      s.status==='active' &&
      s.expiryDate >= today
    );
    // Allow myPlan page even without subscription
    if (!activeSub && page !== 'myPlan') {
      const expiredSub = (state.subscriptions||[]).filter(s=>s.workerId===currentUser.id).sort((a,b)=>b.expiryDate>a.expiryDate?1:-1)[0];
      const daysExpired = expiredSub ? Math.abs(Math.ceil((new Date(expiredSub.expiryDate)-new Date())/(1000*60*60*24))) : null;
      const pendingReq = (state.subscriptionRequests||[]).find(r=>r.workerId===currentUser.id&&r.status==='pending');
      return (
        <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse 60% 50% at 50% 0%,rgba(239,68,68,0.1) 0%,transparent 60%)'}}/>

          {/* Top bar */}
          <div style={{position:'fixed',top:0,left:0,right:0,background:'var(--surface)',borderBottom:'1px solid var(--border)',padding:'14px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',zIndex:10}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:32,height:32,background:'linear-gradient(135deg,var(--accent),var(--accent3))',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>💳</div>
              <span style={{fontWeight:700,fontSize:15}}>NexusPay TMS</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontSize:12,color:'var(--text3)'}}>👤 {currentUser.name}</span>
              <button onClick={handleLogout} style={{padding:'7px 14px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text2)',cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:600,fontSize:12}}>Sign Out</button>
            </div>
          </div>

          <div style={{maxWidth:800,width:'100%',position:'relative',zIndex:1,marginTop:60}}>
            {/* Status banner */}
            <div style={{background:pendingReq?'rgba(245,158,11,0.08)':'rgba(239,68,68,0.07)',border:`1px solid ${pendingReq?'rgba(245,158,11,0.3)':'rgba(239,68,68,0.25)'}`,borderRadius:16,padding:'18px 22px',marginBottom:28,display:'flex',alignItems:'center',gap:14}}>
              <div style={{fontSize:32}}>{pendingReq?'⏳':'🔒'}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:15,color:pendingReq?'var(--orange)':'var(--red)',marginBottom:4}}>
                  {pendingReq?'Plan Request Pending':'No Active Subscription'}
                </div>
                {pendingReq
                  ? <div style={{fontSize:13,color:'var(--text2)'}}>Your request for <strong>{pendingReq.planName}</strong> (₹{pendingReq.planPrice}) is waiting for Admin approval. Sent on {pendingReq.createdAt}.</div>
                  : <div style={{fontSize:13,color:'var(--text3)'}}>{expiredSub?`Subscription expired ${daysExpired} day${daysExpired!==1?'s':''} ago. Select a plan to continue.`:'Select a plan below to activate your account.'}</div>
                }
                {expiredSub&&!pendingReq&&<div style={{fontSize:11,color:'var(--text3)',marginTop:4,fontFamily:"'JetBrains Mono',monospace"}}>Last plan: {expiredSub.planName} · expired {expiredSub.expiryDate}</div>}
              </div>
            </div>

            {/* Plans */}
            <div style={{textAlign:'center',marginBottom:20}}>
              <div style={{fontSize:22,fontWeight:800,marginBottom:6}}>Choose Your Plan</div>
              <div style={{fontSize:14,color:'var(--text3)'}}>Select a plan and send a payment request to Admin</div>
            </div>

            <WorkerMyPlanPage state={state} dispatch={dispatch} user={currentUser} />
          </div>
        </div>
      );
    }
  }

  function renderPage() {
    switch(page) {
      case 'dashboard': return <AdminDashboard state={state} />;
      case 'workers': return <WorkersPage state={state} dispatch={dispatch} />;
      case 'complaints': return <ComplaintsPage state={state} dispatch={dispatch} />;
      case 'plansAdmin': return <PlansAdminPage state={state} dispatch={dispatch} />;
      case 'subscriptionsAdmin': return <SubscriptionsAdminPage state={state} dispatch={dispatch} />;
      case 'myPlan': return <WorkerMyPlanPage state={state} dispatch={dispatch} user={currentUser} />;
      case 'settings': return <SettingsPage state={state} dispatch={dispatch} user={currentUser} darkMode={darkMode} setDarkMode={setDarkMode} />;
      case 'workerComplaints': return <WorkerComplaintsPage state={state} dispatch={dispatch} user={currentUser} />;
      case 'billPaymentReport': return <BillPaymentReportPage state={state} user={currentUser} />;
      case 'swipeReport': return <SwipeReportPage state={state} user={currentUser} />;
      case 'transferReport': return <TransferReportPage state={state} user={currentUser} />;
      case 'closingReport': return <ClosingReportPage state={state} user={currentUser} />;
      case 'adminSearch': return <AdminSearchPage state={state} />;
      case 'allCustomers': return <AllCustomersAdmin state={state} dispatch={dispatch} />;
      case 'allTransactions': return <AllTransactionsPage state={state} />;
      case 'loginLogs': return <LoginLogsPage state={state} />;
      case 'wDashboard': return <WorkerDashboard state={state} user={currentUser} />;
      case 'customers': return <CustomersPage state={state} dispatch={dispatch} user={currentUser} />;
      case 'cards': return <CardsPage state={state} dispatch={dispatch} user={currentUser} />;
      case 'newTransaction': return <NewTransactionPage state={state} dispatch={dispatch} user={currentUser} />;
      case 'billPayment': return <BillPaymentPage state={state} dispatch={dispatch} user={currentUser} />;
      case 'transactions': return <AllTransactionsPage state={state} user={currentUser} />;
      case 'ledger': return <LedgerPage state={state} dispatch={dispatch} user={currentUser} />;
      case 'manualLedger': return <ManualLedgerPage state={state} dispatch={dispatch} user={currentUser} />;
      case 'adminBank': return <AdminBankPage state={state} dispatch={dispatch} user={currentUser} />;
      case 'dailyTasks': return <DailyTasksPage state={state} dispatch={dispatch} user={currentUser} />;
      case 'transfers': return <FundTransferPage state={state} dispatch={dispatch} user={currentUser} />;
      case 'myBanks': return <MyBanksPage state={state} dispatch={dispatch} user={currentUser} />;
      case 'bankStatement': return <BankStatementPage state={state} user={currentUser} />;
      case 'tracking': return <TrackingPage state={state} user={currentUser} />;
      default: return <div className="content"><div className="empty-state"><div className="empty-icon">🚧</div><div className="empty-text">Page coming soon</div></div></div>;
    }
  }

  return (
    <div className="app-layout">
      {/* Mobile overlay */}
      {sidebarOpen && <div className="sidebar-overlay" onClick={()=>setSidebarOpen(false)} />}
      <Sidebar user={currentUser} page={page} setPage={p=>{setPage(p);setSidebarOpen(false);}} onLogout={handleLogout} mobileOpen={sidebarOpen} />
      <div className="main">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div className="hamburger" onClick={()=>setSidebarOpen(o=>!o)}>
              <span/><span/><span/>
            </div>
            <div className="topbar-title">{PAGE_TITLES[page]||page}</div>
          </div>
          <div className="topbar-right">
            <div className="topbar-date">{now}</div>
            {/* Theme Toggle */}
            <div className="theme-toggle-wrap" onClick={()=>setDarkMode(d=>!d)} style={{cursor:'pointer'}}>
              <span style={{fontSize:13}}>{darkMode?'🌙':'☀️'}</span>
              <button className={`theme-toggle ${darkMode?'dark':''}`} onClick={e=>e.stopPropagation()} style={{pointerEvents:'none'}}>
                <div className="theme-toggle-knob">{darkMode?'🌙':'☀️'}</div>
              </button>
              <span className="theme-toggle-label">{darkMode?'Dark':'Light'}</span>
            </div>
            <div className="notif-btn">🔔<div className="notif-dot"/></div>
          </div>
        </div>
        {renderPage()}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
