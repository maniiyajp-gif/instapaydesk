th{padding:8px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
th:nth-child(3),th:nth-child(4),th:nth-child(5){text-align:right}
.totals{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:8px}
.total-box{border:1px solid #e2e8f0;border-radius:6px;padding:10px 14px;text-align:center}
.total-label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.total-val{font-size:18px;font-weight:800}
.footer{margin-top:20px;padding-top:10px;border-top:1px solid #e2e8f0;font-size:10px;color:#94a3b8;text-align:center}
@media print{body{padding:10px}}</style></head><body>
<div class="header">
  <div><div class="title">📓 CASH BOOK</div><div class="sub">NexusPay TMS • ${user.name} • Printed: ${new Date().toLocaleDateString('en-IN')}</div></div>
  <div class="party"><div class="party-name">${selName}</div><div class="party-mob">${selMob}</div></div>
</div>
<table>
  <thead><tr><th>Date</th><th>Description</th><th style="text-align:right">Debit (Dr)</th><th style="text-align:right">Credit (Cr)</th><th style="text-align:right">Balance</th></tr></thead>
  <tbody>${rows}</tbody>
</table>
<div class="totals">
  <div class="total-box"><div class="total-label">Total Debit</div><div class="total-val" style="color:#dc2626">₹${totalDebit.toFixed(2)}</div></div>
  <div class="total-box"><div class="total-label">Total Credit</div><div class="total-val" style="color:#059669">₹${totalCredit.toFixed(2)}</div></div>
  <div class="total-box"><div class="total-label">Net Balance</div><div class="total-val" style="color:${netBal>0?'#dc2626':'#059669'}">₹${Math.abs(netBal).toFixed(2)} ${netBal>0?'(Dr)':'(Cr)'}</div></div>
</div>
<div class="footer">NexusPay TMS • Cash Book Ledger • Confidential</div>
<script>window.onload=()=>window.print();<\/script></body></html>`;
    const w = window.open('','_blank','width=900,height=700');
    w.document.write(html); w.document.close();
  }

  return (
    <div className="content fade-in">
      <div style={{display:'flex',gap:16,height:'calc(100vh - 120px)',minHeight:500}}>

        {/* ── Left: Persons List ───────────────────────────────────────────── */}
        <div style={{width:260,flexShrink:0,display:'flex',flexDirection:'column',gap:10}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:14,fontWeight:700}}>📓 Accounts</div>
            <button onClick={()=>setShowAddPerson(true)} style={{padding:'6px 12px',background:'linear-gradient(135deg,var(--accent),var(--accent2))',border:'none',borderRadius:8,color:'#fff',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:"'Sora',sans-serif"}}>+ New</button>
          </div>
          <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:6}}>
            {persons.length===0 && <div style={{textAlign:'center',padding:'30px 10px',color:'var(--text3)',fontSize:13}}>No accounts yet.<br/>Click + New to add.</div>}
            {persons.map(p=>{
              const pes = myEntries.filter(e=>e.name===p.name&&e.mobile===p.mobile);
              const td  = pes.filter(e=>e.type==='debit').reduce((s,e)=>s+e.amount,0);
              const tc  = pes.filter(e=>e.type==='credit').reduce((s,e)=>s+e.amount,0);
              const net = td - tc;
              const isSelected = selPerson===p.name+'|'+p.mobile;
              return (
                <div key={p.name+'|'+p.mobile} onClick={()=>setSelPerson(p.name+'|'+p.mobile)} style={{padding:'11px 14px',borderRadius:10,cursor:'pointer',border:`1px solid ${isSelected?'var(--accent)':'var(--border)'}`,background:isSelected?'rgba(59,130,246,0.08)':'var(--surface)',transition:'all 0.15s'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:13}}>{p.name}</div>
                      <div style={{fontSize:11,color:'var(--text3)',fontFamily:"'JetBrains Mono',monospace",marginTop:1}}>{p.mobile}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:13,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:net>0?'var(--red)':net<0?'var(--green)':'var(--text3)'}}>
                        ₹{Math.abs(net).toLocaleString('en-IN',{maximumFractionDigits:0})}
                      </div>
                      <div style={{fontSize:10,color:net>0?'var(--red)':net<0?'var(--green)':'var(--text3)',fontWeight:600}}>{net>0?'Dr':net<0?'Cr':'Nil'}</div>
                    </div>
                  </div>
                  <div style={{marginTop:6,height:2,borderRadius:2,background:'var(--border)',overflow:'hidden'}}>
                    <div style={{height:'100%',width:td>0?Math.min((tc/td)*100,100)+'%':'0%',background:'var(--green)',transition:'width 0.4s'}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* ── Right: Ledger ───────────────────────────────────────────────── */}
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:0,overflow:'hidden'}}>
          {!selPerson
            ? <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'var(--text3)',background:'var(--surface)',borderRadius:14,border:'1px solid var(--border)'}}>
                <div style={{fontSize:48,marginBottom:12,opacity:0.4}}>📓</div>
                <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>Select an account</div>
                <div style={{fontSize:13}}>Choose from the left or create a new one</div>
              </div>
            : <div style={{display:'flex',flexDirection:'column',height:'100%',background:'var(--surface)',borderRadius:14,border:'1px solid var(--border)',overflow:'hidden'}}>

                {/* Ledger Header */}
                <div style={{background:'linear-gradient(135deg,#0f172a,#1e293b)',padding:'16px 20px',display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexShrink:0}}>
                  <div>
                    <div style={{fontSize:10,color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:4}}>Cash Book — Account Ledger</div>
                    <div style={{fontSize:20,fontWeight:800,color:'#fff'}}>{selName}</div>
                    <div style={{fontSize:12,color:'rgba(255,255,255,0.5)',fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{selMob}</div>
                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                    <div style={{textAlign:'right',marginRight:8}}>
                      <div style={{fontSize:10,color:'rgba(255,255,255,0.5)',textTransform:'uppercase',marginBottom:2}}>Net Balance</div>
                      <div style={{fontSize:22,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:netBal>0?'#fca5a5':netBal<0?'#86efac':'#94a3b8'}}>
                        ₹{Math.abs(netBal).toLocaleString('en-IN',{maximumFractionDigits:2})}
                      </div>
                      <div style={{fontSize:11,color:netBal>0?'#fca5a5':netBal<0?'#86efac':'#94a3b8',fontWeight:700}}>{netBal>0?'Debit (Dr)':netBal<0?'Credit (Cr)':'Balanced'}</div>
                    </div>
                    <div style={{display:'flex',gap:6}}>
                      <button onClick={()=>{setEForm({type:'debit',amount:'',desc:'',date:new Date().toISOString().slice(0,10)});setShowAddEntry(true);}} style={{padding:'8px 14px',background:'rgba(239,68,68,0.2)',border:'1px solid rgba(239,68,68,0.4)',borderRadius:8,color:'#fca5a5',cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:12}}>+ Dr</button>
                      <button onClick={()=>{setEForm({type:'credit',amount:'',desc:'',date:new Date().toISOString().slice(0,10)});setShowAddEntry(true);}} style={{padding:'8px 14px',background:'rgba(16,185,129,0.2)',border:'1px solid rgba(16,185,129,0.4)',borderRadius:8,color:'#86efac',cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:12}}>+ Cr</button>
                      <button onClick={printLedger} style={{padding:'8px 12px',background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:8,color:'rgba(255,255,255,0.7)',cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:12}}>🖨️</button>
                    </div>
                  </div>
                </div>

                {/* Summary strip */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',borderBottom:'1px solid var(--border)',flexShrink:0}}>
                  {[
                    {label:'Total Debit (Dr)',val:'₹'+totalDebit.toLocaleString('en-IN',{maximumFractionDigits:2}),col:'var(--red)',bg:'rgba(239,68,68,0.04)'},
                    {label:'Total Credit (Cr)',val:'₹'+totalCredit.toLocaleString('en-IN',{maximumFractionDigits:2}),col:'var(--green)',bg:'rgba(16,185,129,0.04)'},
                    {label:'Net Balance',val:'₹'+Math.abs(netBal).toLocaleString('en-IN',{maximumFractionDigits:2})+' '+(netBal>0?'Dr':netBal<0?'Cr':''),col:netBal>0?'var(--red)':netBal<0?'var(--green)':'var(--text3)',bg:'rgba(59,130,246,0.04)'},
                  ].map(s=>(
                    <div key={s.label} style={{padding:'12px 16px',textAlign:'center',background:s.bg}}>
                      <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3}}>{s.label}</div>
                      <div style={{fontSize:14,fontWeight:800,color:s.col,fontFamily:"'JetBrains Mono',monospace"}}>{s.val}</div>
                    </div>
                  ))}
                </div>

                {/* Ledger Table */}
                <div style={{overflowY:'auto',flex:1}}>
                  <table style={{width:'100%',borderCollapse:'collapse'}}>
                    <thead style={{position:'sticky',top:0,background:'var(--surface2)',zIndex:1}}>
                      <tr>
                        <th style={{padding:'9px 14px',textAlign:'left',fontSize:11,fontWeight:700,color:'var(--text3)',borderBottom:'1px solid var(--border)',width:90}}>Date</th>
                        <th style={{padding:'9px 14px',textAlign:'left',fontSize:11,fontWeight:700,color:'var(--text3)',borderBottom:'1px solid var(--border)'}}>Description</th>
                        <th style={{padding:'9px 14px',textAlign:'right',fontSize:11,fontWeight:700,color:'var(--red)',borderBottom:'1px solid var(--border)',width:110}}>Debit (Dr)</th>
                        <th style={{padding:'9px 14px',textAlign:'right',fontSize:11,fontWeight:700,color:'var(--green)',borderBottom:'1px solid var(--border)',width:110}}>Credit (Cr)</th>
                        <th style={{padding:'9px 14px',textAlign:'right',fontSize:11,fontWeight:700,color:'var(--text3)',borderBottom:'1px solid var(--border)',width:120}}>Balance</th>
                        <th style={{padding:'9px 14px',borderBottom:'1px solid var(--border)',width:40}}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {ledgerRows.length===0 && (
                        <tr><td colSpan={6} style={{textAlign:'center',padding:'40px',color:'var(--text3)',fontSize:13}}>No entries yet. Use + Dr or + Cr to add.</td></tr>
                      )}
                      {ledgerRows.map((r,i)=>(
                        <tr key={r.id} style={{borderBottom:'1px solid rgba(37,43,56,0.4)',background:i%2===0?'transparent':'rgba(255,255,255,0.01)'}}>
                          <td style={{padding:'10px 14px',fontSize:12,color:'var(--text3)',whiteSpace:'nowrap'}}>{r.date}</td>
                          <td style={{padding:'10px 14px',fontSize:13,color:'var(--text)'}}>{r.desc}</td>
                          <td style={{padding:'10px 14px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:'var(--red)',fontWeight:r.type==='debit'?700:400}}>
                            {r.type==='debit' && r.amount>0 ? '₹'+r.amount.toLocaleString('en-IN',{maximumFractionDigits:2}) : '—'}
                          </td>
                          <td style={{padding:'10px 14px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:'var(--green)',fontWeight:r.type==='credit'?700:400}}>
                            {r.type==='credit' && r.amount>0 ? '₹'+r.amount.toLocaleString('en-IN',{maximumFractionDigits:2}) : '—'}
                          </td>
                          <td style={{padding:'10px 14px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,whiteSpace:'nowrap'}}>
                            <span style={{color:r.bal>0?'var(--red)':r.bal<0?'var(--green)':'var(--text3)'}}>₹{Math.abs(r.bal).toLocaleString('en-IN',{maximumFractionDigits:2})}</span>
                            <span style={{fontSize:9,marginLeft:4,color:r.bal>0?'var(--red)':r.bal<0?'var(--green)':'var(--text3)',fontWeight:400}}>{r.bal>0?'Dr':r.bal<0?'Cr':''}</span>
                          </td>
                          <td style={{padding:'10px 8px',textAlign:'center'}}>
                            {r.amount>0 && <button onClick={()=>{if(window.confirm('Delete?'))dispatch({type:'DELETE_MANUAL_ENTRY',payload:r.id});}} style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:6,color:'var(--red)',cursor:'pointer',padding:'3px 7px',fontSize:11,fontFamily:"'Sora',sans-serif"}}>✕</button>}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                    {ledgerRows.length>0 && (
                      <tfoot>
                        <tr style={{borderTop:'2px solid var(--border2)',background:'var(--surface2)'}}>
                          <td colSpan={2} style={{padding:'10px 14px',fontWeight:700,fontSize:13}}>Total</td>
                          <td style={{padding:'10px 14px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",fontWeight:800,color:'var(--red)',fontSize:14}}>₹{totalDebit.toLocaleString('en-IN',{maximumFractionDigits:2})}</td>
                          <td style={{padding:'10px 14px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",fontWeight:800,color:'var(--green)',fontSize:14}}>₹{totalCredit.toLocaleString('en-IN',{maximumFractionDigits:2})}</td>
                          <td style={{padding:'10px 14px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",fontWeight:800,fontSize:14,color:netBal>0?'var(--red)':netBal<0?'var(--green)':'var(--text3)'}}>
                            ₹{Math.abs(netBal).toLocaleString('en-IN',{maximumFractionDigits:2})} {netBal>0?'Dr':netBal<0?'Cr':''}
                          </td>
                          <td/>
                        </tr>
                      </tfoot>
                    )}
                  </table>
                </div>
              </div>
          }
        </div>
      </div>

      {/* Add Person Modal */}
      {showAddPerson && (
        <div className="modal-overlay" onClick={()=>setShowAddPerson(false)}>
          <div className="modal" style={{width:420}} onClick={e=>e.stopPropagation()}>
            <div className="modal-title">📓 New Account</div>
            <div className="modal-sub">Add a person / party to the cash book.</div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Name *</label><input className="form-input" placeholder="Full name" value={pForm.name} onChange={e=>setPForm({...pForm,name:e.target.value})} autoFocus /></div>
              <div className="form-group"><label className="form-label">Mobile *</label><input className="form-input text-mono" placeholder="Mobile number" value={pForm.mobile} onChange={e=>setPForm({...pForm,mobile:e.target.value})} /></div>
            </div>
            <div style={{fontSize:12,fontWeight:600,color:'var(--text2)',marginBottom:8}}>Opening Balance (Optional)</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
              {[{id:'debit',label:'Debit (Dr)',col:'var(--red)'},{id:'credit',label:'Credit (Cr)',col:'var(--green)'}].map(t=>(
                <button key={t.id} onClick={()=>setPForm({...pForm,openingType:t.id})} style={{padding:'9px',border:`2px solid ${pForm.openingType===t.id?t.col:'var(--border)'}`,borderRadius:9,background:pForm.openingType===t.id?`rgba(${t.col==='var(--red)'?'239,68,68':'16,185,129'},0.07)`:'var(--surface2)',cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:12,color:pForm.openingType===t.id?t.col:'var(--text)'}}>
                  {t.label}
                </button>
              ))}
            </div>
            <div className="form-group"><label className="form-label">Opening Amount (₹)</label><input className="form-input text-mono" style={{fontSize:17}} placeholder="0.00 (leave blank for zero)" value={pForm.openingAmt} onChange={e=>setPForm({...pForm,openingAmt:e.target.value})} /></div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowAddPerson(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={addPerson}>Create Account</button>
            </div>
          </div>
        </div>
      )}

      {/* Add Entry Modal */}
      {showAddEntry && (
        <div className="modal-overlay" onClick={()=>setShowAddEntry(false)}>
          <div className="modal" style={{width:420}} onClick={e=>e.stopPropagation()}>
            <div className="modal-title" style={{color:eForm.type==='debit'?'var(--red)':'var(--green)'}}>
              {eForm.type==='debit'?'⬅️ Debit Entry (Dr)':'➡️ Credit Entry (Cr)'}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
              {[{id:'debit',label:'⬅️ Debit (Dr)',sub:'Amount to receive'},{id:'credit',label:'➡️ Credit (Cr)',sub:'Amount paid/given'}].map(t=>(
                <button key={t.id} onClick={()=>setEForm({...eForm,type:t.id})} style={{padding:'10px 8px',border:`2px solid ${eForm.type===t.id?(t.id==='debit'?'var(--red)':'var(--green)'):'var(--border)'}`,borderRadius:10,background:eForm.type===t.id?`rgba(${t.id==='debit'?'239,68,68':'16,185,129'},0.08)`:'var(--surface2)',cursor:'pointer',fontFamily:"'Sora',sans-serif",textAlign:'center'}}>
                  <div style={{fontSize:13,fontWeight:700,color:eForm.type===t.id?(t.id==='debit'?'var(--red)':'var(--green)'):'var(--text)'}}>{t.label}</div>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>{t.sub}</div>
                </button>
              ))}
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Amount (₹) *</label><input className="form-input text-mono" style={{fontSize:18}} placeholder="0.00" value={eForm.amount} onChange={e=>setEForm({...eForm,amount:e.target.value})} autoFocus /></div>
              <div className="form-group"><label className="form-label">Date *</label><input type="date" className="form-input" value={eForm.date} onChange={e=>setEForm({...eForm,date:e.target.value})} /></div>
            </div>
            <div className="form-group"><label className="form-label">Description *</label><input className="form-input" placeholder={eForm.type==='debit'?'e.g. Cash lent, Goods sold...':'e.g. Cash received, Payment made...'} value={eForm.desc} onChange={e=>setEForm({...eForm,desc:e.target.value})} onKeyDown={e=>e.key==='Enter'&&addEntry()} /></div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowAddEntry(false)}>Cancel</button>
              <button className="btn btn-primary" style={{background:eForm.type==='debit'?'linear-gradient(135deg,var(--red),#dc2626)':'linear-gradient(135deg,var(--green),#059669)'}} onClick={addEntry}>
                Add {eForm.type==='debit'?'Debit':'Credit'} Entry
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function FundTransferPage({ state, dispatch, user }) {
  const today = new Date().toISOString().slice(0,10);
  const [tab, setTab]     = useState('c2b');  // c2b=Customer→Bank, c2cash=Customer→Cash, b2c=Bank→Customer
  const [form, setForm]   = useState({ customerId:'', bankId:'', cashAccKey:'', amount:'', date:today, description:'' });
  const [success, setSuccess] = useState('');

  const myCustomers = state.customers.filter(c=>c.workerId===user.id&&c.status==='active');
  const myBanks     = (state.workerBanks||[]).filter(b=>b.workerId===user.id);
  const myTransfers = (state.transfers||[]).filter(t=>t.workerId===user.id);

  // Cash Book accounts (from ManualLedger)
  const cashPersons = [];
  const _seen = new Set();
  (state.manualEntries||[]).filter(e=>e.workerId===user.id).forEach(e=>{
    const k = e.name+'|'+e.mobile;
    if(!_seen.has(k)){ _seen.add(k); cashPersons.push({key:k, name:e.name, mobile:e.mobile}); }
  });

  const amt = parseFloat(form.amount)||0;

  // Customer outstanding using shared function
  const custBalance = form.customerId ? calcCustOutstanding(form.customerId, user.id, state) : 0;

  const selCust = state.customers.find(c=>c.id===form.customerId);
  const selBank = myBanks.find(b=>b.id===form.bankId);

  function doTransfer() {
    if (!form.customerId)           return alert('Select a customer');
    if (tab!=='c2cash' && !form.bankId) return alert('Select a bank');
    if (tab==='c2cash' && !form.cashAccKey) return alert('Select a Cash Book account');
    if (!amt || amt<=0)             return alert('Enter a valid amount');
    const ref  = 'TRF'+Math.floor(Math.random()*9000000+1000000);
    const bank = myBanks.find(b=>b.id===form.bankId);
    dispatch({ type:'ADD_TRANSFER', payload:{
      id:'TR'+Date.now(), workerId:user.id,
      customerId:form.customerId,
      bankId:   tab==='c2cash' ? 'CASH' : form.bankId,
      bankName: tab==='c2cash' ? ('Cash — '+(cashPersons.find(p=>p.key===form.cashAccKey)?.name||'Cash')) : (bank?.name||''),
      cashAccKey: tab==='c2cash' ? form.cashAccKey : null,
      amount:amt, date:form.date, description:form.description,
      direction:tab==='b2c' ? 'bank_to_customer' : 'customer_to_bank',
      isCash: tab==='c2cash',
      ref
    }});
    const msgs = { c2b:'✅ Customer payment received — credited to bank!', c2cash:'✅ Cash received from customer!', b2c:'✅ Amount transferred to customer!' };
    setSuccess(msgs[tab]);
    setForm(f=>({...f, amount:'', description:''}));
    setTimeout(()=>setSuccess(''),4000);
  }

  const tabs = [
    { id:'c2b',    label:'Customer → Bank',  icon:'🏦', color:'var(--green)',  desc:'Customer ne tame bank ma paise diya' },
    { id:'c2cash', label:'Customer → Cash',  icon:'💵', color:'var(--orange)', desc:'Customer ne tame haath ma cash diya' },
    { id:'b2c',    label:'Bank → Customer',  icon:'🔄', color:'var(--accent)',  desc:'Tame bank thi customer ne paise diya' },
  ];
  const activeTab = tabs.find(t=>t.id===tab);

  // Recent transfers
  const recentTrf = myTransfers.filter(t=> form.customerId ? t.customerId===form.customerId : true)
    .sort((a,b)=>b.date>a.date?1:-1).slice(0,10);

  return (
    <div className="content fade-in">
      {success && <div className="alert-banner alert-success">{success}</div>}

      {/* Tab selector */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:20}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);setForm(f=>({...f,bankId:'',cashAccKey:'',amount:'',description:''}));}}
            style={{padding:'12px',border:`2px solid ${tab===t.id?t.color:'var(--border)'}`,borderRadius:11,background:tab===t.id?`rgba(${t.color==='var(--green)'?'16,185,129':t.color==='var(--orange)'?'245,158,11':'59,130,246'},0.08)`:'var(--surface)',cursor:'pointer',fontFamily:"'Sora',sans-serif",textAlign:'center',transition:'all 0.15s'}}>
            <div style={{fontSize:18,marginBottom:4}}>{t.icon}</div>
            <div style={{fontSize:12,fontWeight:700,color:tab===t.id?t.color:'var(--text)'}}>{t.label}</div>
            <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>{t.desc}</div>
          </button>
        ))}
      </div>

      <div style={{maxWidth:560}}>
        {/* Form */}
        <div className="card-block">
          <div style={{fontSize:14,fontWeight:700,marginBottom:16,color:activeTab.color}}>
            {activeTab.icon} {activeTab.label}
          </div>

          <div className="form-group">
            <label className="form-label">Customer *</label>
            <select className="form-input" value={form.customerId} onChange={e=>setForm({...form,customerId:e.target.value})}>
              <option value="">Select Customer</option>
              {myCustomers.map(c=><option key={c.id} value={c.id}>{c.name} — {c.mobile}</option>)}
            </select>
            {form.customerId && (
              <div style={{marginTop:8,padding:'8px 12px',borderRadius:8,background:custBalance>0?'rgba(239,68,68,0.08)':'rgba(16,185,129,0.08)',border:`1px solid ${custBalance>0?'rgba(239,68,68,0.2)':'rgba(16,185,129,0.2)'}`,display:'flex',justifyContent:'space-between'}}>
                <span style={{fontSize:12,color:'var(--text3)'}}>Current Outstanding</span>
                <span className={'text-mono fw-600 '+(custBalance>0?'text-red':'text-green')} style={{fontSize:13}}>
                  {custBalance<0?'− ':''}₹{Math.abs(custBalance).toLocaleString('en-IN',{maximumFractionDigits:0})} {custBalance>0?'Dr':'Cr'}
                </span>
              </div>
            )}
          </div>

          {tab !== 'c2cash' && (
            <div className="form-group">
              <label className="form-label">{tab==='b2c'?'From Bank *':'To Bank *'}</label>
              {myBanks.length===0
                ? <div className="alert-banner alert-warn" style={{marginBottom:0}}>No banks added yet.</div>
                : <select className="form-input" value={form.bankId} onChange={e=>setForm({...form,bankId:e.target.value})}>
                    <option value="">Select Bank</option>
                    {myBanks.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
                  </select>
              }
            </div>
          )}

          {tab === 'c2cash' && (
            <div className="form-group">
              <label className="form-label">💵 Cash Book Account *</label>
              {cashPersons.length===0
                ? <div className="alert-banner alert-warn" style={{marginBottom:0}}>⚠️ No Cash Book accounts yet. Add one in <strong>Cash Book</strong> first.</div>
                : <select className="form-input" value={form.cashAccKey} onChange={e=>setForm({...form,cashAccKey:e.target.value})}>
                    <option value="">-- Select Cash Account --</option>
                    {cashPersons.map(p=>(
                      <option key={p.key} value={p.key}>{p.name} — {p.mobile}</option>
                    ))}
                  </select>
              }
            </div>
          )}

          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Amount (₹) *</label>
              <input className="form-input text-mono" style={{fontSize:18}} placeholder="0.00" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} />
            </div>
            <div className="form-group">
              <label className="form-label">Date *</label>
              <input type="date" className="form-input" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} />
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Description / Reason *</label>
            <input className="form-input" placeholder={tab==='c2cash'?'e.g. Cash received, SC collection...':tab==='c2b'?'e.g. Card bill payment...':'e.g. Cash given to customer...'} value={form.description} onChange={e=>setForm({...form,description:e.target.value})} onKeyDown={e=>e.key==='Enter'&&doTransfer()} />
          </div>

          {/* Preview */}
          {form.customerId && amt>0 && (
            <div style={{padding:'10px 14px',background:'rgba(59,130,246,0.07)',border:'1px solid rgba(59,130,246,0.2)',borderRadius:9,marginBottom:14,fontSize:12}}>
              <div style={{marginBottom:4,fontWeight:600,color:'var(--text2)'}}>Effect on Customer Outstanding:</div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--text3)'}}>Before</span>
                <span className={'text-mono '+(custBalance>0?'text-red':'text-green')}>{custBalance<0?'− ':''}₹{Math.abs(custBalance).toLocaleString('en-IN',{maximumFractionDigits:0})} {custBalance>0?'Dr':'Cr'}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
                <span style={{color:'var(--text3)'}}>After</span>
                {(()=>{
                  const after = tab==='b2c' ? custBalance+amt : custBalance-amt;
                  return <span className={'text-mono fw-600 '+(after>0?'text-red':'text-green')}>{after<0?'− ':''}₹{Math.abs(after).toLocaleString('en-IN',{maximumFractionDigits:0})} {after>0?'Dr':'Cr'}</span>;
                })()}
              </div>
            </div>
          )}

          <button className="btn btn-primary" style={{background:`linear-gradient(135deg,${activeTab.color},${activeTab.color}cc)`}} onClick={doTransfer}>
            {activeTab.icon} {activeTab.label}
          </button>
        </div>

      </div>
    </div>
  );
}

function LedgerPage({ state, dispatch, user }) {
  const myCustomers = state.customers.filter(c=>c.workerId===user.id);
  const [selectedCust, setSelectedCust] = useState(myCustomers[0]?.id||'');
  const [fromDate, setFromDate] = useState('');
  const [toDate, setToDate]     = useState('');

  // Manual entry form
  const [showManual, setShowManual] = useState(false);
  const [manualForm, setManualForm] = useState({ type:'debit', amount:'', desc:'', date:new Date().toISOString().slice(0,10) });
  const [manualSuccess, setManualSuccess] = useState('');

  // Reminder form
  const [showReminder, setShowReminder] = useState(false);
  const [reminderForm, setReminderForm] = useState({ reminderDate:new Date().toISOString().slice(0,10), reminderTime:'10:00', amount:'', note:'' });

  const selectedCustomer = state.customers.find(c=>c.id===selectedCust);
  const custCards = state.cards.filter(k=>k.customerId===selectedCust);

  function addDueReminder(card) {
    const today = new Date();
    const dueDay = parseInt(card.due)||1;
    // Next due date
    let dueDate = new Date(today.getFullYear(), today.getMonth(), dueDay);
    if (dueDate <= today) dueDate = new Date(today.getFullYear(), today.getMonth()+1, dueDay);
    const dueDateStr = dueDate.toISOString().slice(0,10);
    const custName = selectedCustomer?.name||'Customer';
    dispatch({ type:'ADD_TASK', payload:{
      id:'TK'+Date.now(), workerId:user.id, type:'reminder', taskType:'reminder',
      title:'💳 Bill Due — '+custName,
      desc:'Card ****'+card.last4+' ('+card.bank+') — Due on '+dueDay+'th every month',
      reminderDate:dueDateStr, reminderTime:'09:00',
      custIdR:selectedCust, amount:0, done:false,
      priority:'high', date:dueDateStr
    }});
    setManualSuccess('🔔 Reminder added for '+dueDateStr+'!');
    setTimeout(()=>setManualSuccess(''),3000);
  }

  // ── Build ALL ledger rows ─────────────────────────────────────────────────
  const custTxns     = state.transactions.filter(t=>t.customerId===selectedCust).sort((a,b)=>a.date>b.date?1:-1);
  const custTransfers = (state.transfers||[]).filter(tr=>tr.customerId===selectedCust&&tr.workerId===user.id);
  const custManual    = (state.ledgerEntries||[]).filter(e=>e.customerId===selectedCust&&e.workerId===user.id);
  const allEntries = [
    ...custTxns.map(t=>({...t,_type:'txn'})),
    ...custTransfers.map(tr=>({...tr,_type:'transfer'})),
    ...custManual.map(e=>({...e,_type:'manual'}))
  ].sort((a,b)=>a.date>b.date?1:-1);

  let runBal = 0;
  const allRows = [];
  allEntries.forEach(entry=>{
    if(entry._type==='manual'){
      if(entry.entryType==='debit'){ runBal+=entry.amount; allRows.push({date:entry.date,desc:'📝 '+entry.desc,debit:entry.amount,credit:0,bal:runBal,ref:entry.id,rowType:'manual',manualId:entry.id}); }
      else { runBal-=entry.amount; allRows.push({date:entry.date,desc:'📝 '+entry.desc,debit:0,credit:entry.amount,bal:runBal,ref:entry.id,rowType:'manual',manualId:entry.id}); }
      return;
    }
    if(entry._type==='transfer'){
      if(entry.direction==='customer_to_bank'){ runBal-=entry.amount; allRows.push({date:entry.date,desc:'Customer Payment — Bank: '+entry.bankName+(entry.description?' ('+entry.description+')':''),debit:0,credit:entry.amount,bal:runBal,ref:entry.ref}); }
      else { runBal+=entry.amount; allRows.push({date:entry.date,desc:'Amount Given — Bank: '+entry.bankName+(entry.description?' ('+entry.description+')':''),debit:entry.amount,credit:0,bal:runBal,ref:entry.ref}); }
      return;
    }
    const t = entry;
    if(t.isPayment){ runBal-=t.amount; allRows.push({date:t.date,desc:t.isOpeningBalance?'Opening Balance (Credit)':'Payment Received ('+(t.mode||t.paymentMode||'')+')',debit:0,credit:t.amount,bal:runBal,ref:t.txnRef,rowType:t.isOpeningBalance?'opening':'payment'}); return; }
    if(t.isOpeningBalance&&!t.isPayment){ runBal+=t.amount; allRows.push({date:t.date,desc:'Opening Balance (Debit)',debit:t.amount,credit:0,bal:runBal,ref:t.txnRef,rowType:'opening'}); return; }
    const card=state.cards.find(k=>k.id===t.cardId);
    const cardStr=card?(' — ****'+(card.last4||'')):'';
    const bankStr=t.swipeBankName?' ['+t.swipeBankName+']':'';
    if(t.isBillPayment){ runBal-=t.amount; allRows.push({date:t.date,desc:'Bill Payment'+cardStr+(t.billMonth?' — '+t.billMonth:'')+(t.notes?' ('+t.notes+')':''),debit:0,credit:t.amount,bal:runBal,ref:t.txnRef,rowType:'bill'}); }
    else {
      // Swipe amount — Debit (customer paise liya)
      runBal+=t.amount; allRows.push({date:t.date,desc:'Card Swipe'+cardStr+bankStr,debit:t.amount,credit:0,bal:runBal,ref:t.txnRef,rowType:'swipe'});
      // Service Charge — Credit (worker ka income, customer ke ledger mein credit)
      const svcChg=(t.amount*(t.serviceChargePct||0)/100)+(parseFloat(t.extraCharge)||0);
      if(svcChg>0){ runBal-=svcChg; allRows.push({date:t.date,desc:'  └ Service Charge'+cardStr,debit:0,credit:svcChg,bal:runBal,ref:t.txnRef,rowType:'svc'}); }
    }
  });

  // Use shared calculation — same as swipe form
  const trueOutstanding = calcCustOutstanding(selectedCust, user.id, state);

  const displayRows = allRows.filter(r=>{
    if(!r.date) return true;
    if(fromDate && r.date < fromDate) return false;
    if(toDate   && r.date > toDate)   return false;
    return true;
  });

  const filtDebit  = displayRows.reduce((s,r)=>s+r.debit,0);
  const filtCredit = displayRows.reduce((s,r)=>s+r.credit,0);

  function addManualEntry() {
    if (!manualForm.amount || parseFloat(manualForm.amount)<=0) return alert('Enter valid amount');
    if (!manualForm.desc.trim()) return alert('Enter description');
    if (!selectedCust) return alert('Select a customer');
    dispatch({ type:'ADD_LEDGER_ENTRY', payload:{
      id:'LE'+Date.now(), workerId:user.id, customerId:selectedCust,
      entryType:manualForm.type, amount:parseFloat(manualForm.amount),
      desc:manualForm.desc.trim(), date:manualForm.date
    }});
    setManualForm({ type:'debit', amount:'', desc:'', date:new Date().toISOString().slice(0,10) });
    setShowManual(false);
    setManualSuccess(manualForm.type==='debit'?'✅ Debit entry added!':'✅ Credit entry added!');
    setTimeout(()=>setManualSuccess(''),3000);
  }

  return (
    <div className="content fade-in">
      {manualSuccess && <div className="alert-banner alert-success">{manualSuccess}</div>}

      {/* Customer selector + Manual entry button */}
      <div style={{display:'flex',gap:12,marginBottom:20,alignItems:'flex-end',flexWrap:'wrap'}}>
        <div className="form-group" style={{marginBottom:0,flex:1,minWidth:200}}>
          <label className="form-label">Customer</label>
          <select className="form-input" value={selectedCust} onChange={e=>setSelectedCust(e.target.value)}>
            {myCustomers.map(c=><option key={c.id} value={c.id}>{c.name} — {c.mobile}</option>)}
          </select>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-sm" style={{background:'rgba(239,68,68,0.12)',border:'1px solid rgba(239,68,68,0.3)',color:'var(--red)',fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:12,padding:'9px 16px',borderRadius:9,cursor:'pointer',whiteSpace:'nowrap'}} onClick={()=>{setManualForm({type:'debit',amount:'',desc:'',date:new Date().toISOString().slice(0,10)});setShowManual(true);}}>
            ＋ Debit
          </button>
          <button className="btn btn-sm" style={{background:'rgba(16,185,129,0.12)',border:'1px solid rgba(16,185,129,0.3)',color:'var(--green)',fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:12,padding:'9px 16px',borderRadius:9,cursor:'pointer',whiteSpace:'nowrap'}} onClick={()=>{setManualForm({type:'credit',amount:'',desc:'',date:new Date().toISOString().slice(0,10)});setShowManual(true);}}>
            ＋ Credit
          </button>
          <button className="btn btn-sm" style={{background:'rgba(245,158,11,0.12)',border:'1px solid rgba(245,158,11,0.3)',color:'var(--orange)',fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:12,padding:'9px 14px',borderRadius:9,cursor:'pointer',whiteSpace:'nowrap'}} onClick={()=>{setReminderForm({reminderDate:new Date().toISOString().slice(0,10),reminderTime:'10:00',amount:trueOutstanding>0?trueOutstanding.toFixed(0):'',note:''});setShowReminder(true);}}>
            🔔 Reminder
          </button>
        </div>
      </div>

      {/* Manual Entry Modal */}
      {showManual && (
        <div className="modal-overlay" onClick={()=>setShowManual(false)}>
          <div className="modal" style={{width:440}} onClick={e=>e.stopPropagation()}>
            <div className="modal-title" style={{color:manualForm.type==='debit'?'var(--red)':'var(--green)'}}>
              {manualForm.type==='debit'?'⬅️ Add Debit Entry':'➡️ Add Credit Entry'}
            </div>
            <div className="modal-sub">
              {manualForm.type==='debit'?'Customer owes you this amount (increases outstanding)':'Customer paid or you gave credit (reduces outstanding)'}
            </div>
            {/* Type toggle */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:18}}>
              {[{id:'debit',label:'⬅️ Debit',sub:'They owe you',col:'var(--red)'},{id:'credit',label:'➡️ Credit',sub:'They paid / discount',col:'var(--green)'}].map(t=>(
                <button key={t.id} onClick={()=>setManualForm({...manualForm,type:t.id})} style={{padding:'11px',border:`2px solid ${manualForm.type===t.id?t.col:'var(--border)'}`,borderRadius:10,background:manualForm.type===t.id?`rgba(${t.col==='var(--red)'?'239,68,68':'16,185,129'},0.08)`:'var(--surface2)',cursor:'pointer',fontFamily:"'Sora',sans-serif",textAlign:'center'}}>
                  <div style={{fontSize:15,fontWeight:700,color:manualForm.type===t.id?t.col:'var(--text)'}}>{t.label}</div>
                  <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{t.sub}</div>
                </button>
              ))}
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Amount (₹) *</label><input className="form-input text-mono" style={{fontSize:18}} placeholder="0.00" value={manualForm.amount} onChange={e=>setManualForm({...manualForm,amount:e.target.value})} autoFocus /></div>
              <div className="form-group"><label className="form-label">Date *</label><input type="date" className="form-input" value={manualForm.date} onChange={e=>setManualForm({...manualForm,date:e.target.value})} /></div>
            </div>
            <div className="form-group"><label className="form-label">Description *</label><input className="form-input" placeholder={manualForm.type==='debit'?'e.g. Cash given to customer, Extra charge...':'e.g. Cash received, Discount given...'} value={manualForm.desc} onChange={e=>setManualForm({...manualForm,desc:e.target.value})} onKeyDown={e=>e.key==='Enter'&&addManualEntry()} /></div>
            {manualForm.amount>0 && (
              <div style={{padding:'10px 14px',background:manualForm.type==='debit'?'rgba(239,68,68,0.07)':'rgba(16,185,129,0.07)',border:`1px solid ${manualForm.type==='debit'?'rgba(239,68,68,0.2)':'rgba(16,185,129,0.2)'}`,borderRadius:9,marginBottom:14,fontSize:13}}>
                {manualForm.type==='debit'
                  ? <span style={{color:'var(--red)'}}>⬅️ Outstanding will <strong>increase</strong> by ₹{parseFloat(manualForm.amount||0).toLocaleString('en-IN')}</span>
                  : <span style={{color:'var(--green)'}}>➡️ Outstanding will <strong>decrease</strong> by ₹{parseFloat(manualForm.amount||0).toLocaleString('en-IN')}</span>
                }
              </div>
            )}
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowManual(false)}>Cancel</button>
              <button className="btn btn-primary" style={{background:manualForm.type==='debit'?'linear-gradient(135deg,var(--red),#dc2626)':'linear-gradient(135deg,var(--green),#059669)'}} onClick={addManualEntry}>
                {manualForm.type==='debit'?'Add Debit Entry':'Add Credit Entry'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 🔔 Set Payment Reminder Modal */}
      {showReminder && selectedCustomer && (
        <div className="modal-overlay" onClick={()=>setShowReminder(false)}>
          <div className="modal" style={{width:440}} onClick={e=>e.stopPropagation()}>
            <div className="modal-title" style={{color:'var(--orange)'}}>🔔 Set Payment Reminder</div>
            <div className="modal-sub">Customer: <strong>{selectedCustomer.name}</strong> ({selectedCustomer.mobile})</div>
            {trueOutstanding!==0&&(
              <div style={{padding:'8px 12px',background:trueOutstanding>0?'rgba(239,68,68,0.07)':'rgba(16,185,129,0.07)',border:`1px solid ${trueOutstanding>0?'rgba(239,68,68,0.2)':'rgba(16,185,129,0.2)'}`,borderRadius:8,marginBottom:14,fontSize:13}}>
                Outstanding: <span className={'text-mono fw-600 '+(trueOutstanding>0?'text-red':'text-green')}>{trueOutstanding<0?'− ':''}₹{Math.abs(trueOutstanding).toLocaleString('en-IN',{maximumFractionDigits:0})} {trueOutstanding>0?'Dr':'Cr'}</span>
              </div>
            )}
            <div className="form-row">
              <div className="form-group"><label className="form-label">Reminder Date *</label><input type="date" className="form-input" value={reminderForm.reminderDate} onChange={e=>setReminderForm({...reminderForm,reminderDate:e.target.value})} autoFocus /></div>
              <div className="form-group"><label className="form-label">Time</label><input type="time" className="form-input" value={reminderForm.reminderTime} onChange={e=>setReminderForm({...reminderForm,reminderTime:e.target.value})} /></div>
            </div>
            <div className="form-group">
              <label className="form-label">Amount to Collect (₹)</label>
              <input className="form-input text-mono" style={{fontSize:16}} placeholder="0.00" value={reminderForm.amount} onChange={e=>setReminderForm({...reminderForm,amount:e.target.value})} />
            </div>
            <div className="form-group">
              <label className="form-label">Note (Optional)</label>
              <input className="form-input" placeholder="e.g. Customer said will pay by this date..." value={reminderForm.note} onChange={e=>setReminderForm({...reminderForm,note:e.target.value})} />
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowReminder(false)}>Cancel</button>
              <button className="btn btn-primary" style={{background:'linear-gradient(135deg,var(--orange),var(--yellow))'}} onClick={()=>{
                dispatch({ type:'ADD_TASK', payload:{
                  id:'TK'+Date.now(), workerId:user.id, type:'reminder', taskType:'reminder',
                  title:'💰 Collect Payment — '+selectedCustomer.name,
                  desc:reminderForm.note||(trueOutstanding>0?'Outstanding: ₹'+Math.abs(trueOutstanding).toLocaleString('en-IN',{maximumFractionDigits:0}):''),
                  reminderDate:reminderForm.reminderDate, reminderTime:reminderForm.reminderTime,
                  amount:parseFloat(reminderForm.amount)||0,
                  custIdR:selectedCust, done:false, date:reminderForm.reminderDate
                }});
                setManualSuccess('🔔 Reminder set for '+reminderForm.reminderDate+'!');
                setShowReminder(false);
                setTimeout(()=>setManualSuccess(''),3000);
              }}>Set Reminder</button>
            </div>
          </div>
        </div>
      )}

      {/* Stats */}
      {selectedCustomer && (
        <div className="stats-grid" style={{marginBottom:20}}>
          <div className="stat-card blue"><div className="stat-label">Customer</div><div style={{fontSize:15,fontWeight:700}}>{selectedCustomer.name}</div><div className="stat-sub">{selectedCustomer.mobile}</div></div>
          <div className="stat-card red"><div className="stat-label">Total Debit {fromDate||toDate?'(filtered)':''}</div><div className="stat-value mono" style={{fontSize:16}}>₹{filtDebit.toLocaleString('en-IN',{maximumFractionDigits:2})}</div></div>
          <div className="stat-card green"><div className="stat-label">Total Credit {fromDate||toDate?'(filtered)':''}</div><div className="stat-value mono" style={{fontSize:16}}>₹{filtCredit.toLocaleString('en-IN',{maximumFractionDigits:2})}</div></div>
          <div className={`stat-card ${trueOutstanding>0?'red':'green'}`}><div className="stat-label">Outstanding Balance (All Time)</div><div className="stat-value mono" style={{fontSize:16,color:trueOutstanding>0?'var(--red)':'var(--green)'}}>{trueOutstanding<0?'− ':''}₹{Math.abs(trueOutstanding).toLocaleString('en-IN',{maximumFractionDigits:2})}</div><div className="stat-sub">{trueOutstanding>0?'Dr (Amount Due)':trueOutstanding<0?'Cr (Worker Owes)':'Balanced'}</div></div>
        </div>
      )}

      {/* Date filter */}
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{fontSize:12,fontWeight:600,color:'var(--text3)',whiteSpace:'nowrap'}}>📅 Date Filter:</div>
        <input type="date" className="form-input" style={{width:140,fontSize:12}} value={fromDate} onChange={e=>setFromDate(e.target.value)} />
        <span style={{fontSize:12,color:'var(--text3)'}}>to</span>
        <input type="date" className="form-input" style={{width:140,fontSize:12}} value={toDate} onChange={e=>setToDate(e.target.value)} />
        {(fromDate||toDate)&&<button className="btn btn-sm btn-outline" style={{fontSize:11}} onClick={()=>{setFromDate('');setToDate('');}}>✕ Clear</button>}
      </div>

      {/* Ledger table */}
      <div className="ledger-wrap">
        <div className="ledger-header">
          <div>
            <div style={{fontSize:10,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3}}>Customer Ledger</div>
            <div style={{fontWeight:700,fontSize:16}}>{selectedCustomer?.name||'—'}</div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{selectedCustomer?.mobile||''}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',marginBottom:3}}>Outstanding</div>
            <div className={`ledger-balance ${trueOutstanding>0?'text-red':'text-green'}`}>{trueOutstanding<0?'− ':''}₹{Math.abs(trueOutstanding).toLocaleString('en-IN',{maximumFractionDigits:2})}</div>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Date</th><th>Description</th><th>Reference</th>
              <th style={{textAlign:'right',color:'var(--red)'}}>Debit — Swipe (₹)</th>
              <th style={{textAlign:'right',color:'var(--green)'}}>Credit — SC / Payment (₹)</th>
              <th style={{textAlign:'right'}}>Balance (₹)</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {displayRows.length===0 && <tr><td colSpan={7} style={{textAlign:'center',padding:'30px',color:'var(--text3)'}}>No transactions yet</td></tr>}
            {displayRows.map((r,i)=>(
              <tr key={i} style={{background:r.rowType==='manual'?'rgba(139,92,246,0.04)':undefined}}>
                <td className="text-sm">{r.date||'—'}</td>
                <td style={{fontSize:13,color:r.rowType==='manual'?'var(--accent3)':undefined}}>{r.desc}</td>
                <td className="text-mono text-accent" style={{fontSize:10}}>{r.ref||'—'}</td>
                <td style={{textAlign:'right'}} className="debit-col">{r.debit>0?'₹'+r.debit.toLocaleString('en-IN',{maximumFractionDigits:2}):'—'}</td>
                <td style={{textAlign:'right'}} className="credit-col">{r.credit>0?'₹'+r.credit.toLocaleString('en-IN',{maximumFractionDigits:2}):'—'}</td>
                <td style={{textAlign:'right',fontFamily:"'JetBrains Mono',monospace",fontWeight:600,color:r.bal>0?'var(--red)':r.bal<0?'var(--green)':'var(--text3)'}}>{r.bal<0?'− ':''}₹{Math.abs(r.bal).toLocaleString('en-IN',{maximumFractionDigits:2})}</td>
                <td>
                  {r.rowType==='manual' && (
                    <button onClick={()=>{if(window.confirm('Delete this entry?'))dispatch({type:'DELETE_LEDGER_ENTRY',payload:r.manualId});}} style={{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:6,color:'var(--red)',cursor:'pointer',padding:'3px 8px',fontSize:11,fontFamily:"'Sora',sans-serif"}}>🗑️</button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function AllCustomersAdmin({ state, dispatch }) {
  const [search, setSearch] = useState('');
  const [expandedWorker, setExpandedWorker] = useState(null);
  const [viewKycCust, setViewKycCust] = useState(null);
  const [cardDetailCust, setCardDetailCust] = useState(null);
  const [bankModalWorker, setBankModalWorker] = useState(null); // worker obj for bank detail modal

  // Calculate real bank balance for a specific bank of a worker
  function calcWorkerBankBal(b, workerId) {
    const opening = parseFloat(b.openingBalance||0);
    const wTxns   = (state.transactions||[]).filter(t=>t.workerId===workerId&&!t.isPayment);
    const inflow  = wTxns.reduce((s,t)=>{
      if(t.isBillPayment) return s;
      if(t.splitParts){ const p=t.splitParts.find(p=>p.bankId===b.id); return s+(p?p.netAmt||p.amount:0); }
      if(t.swipeBankId===b.id) return s+(t.swipeNetAmt||t.amount);
      return s;
    },0);
    const billOut = wTxns.reduce((s,t)=>{
      if(!t.isBillPayment) return s;
      if(t.splitParts){ const p=t.splitParts.find(p=>p.bankId===b.id); return s+(p?p.amount:0); }
      if(t.swipeBankId===b.id) return s+(t.amount+(parseFloat(t.extraCharge)||0));
      return s;
    },0);
    const trfIn  = (state.transfers||[]).filter(tr=>tr.bankId===b.id&&tr.workerId===workerId&&tr.direction==='customer_to_bank').reduce((s,tr)=>s+tr.amount,0);
    const trfOut = (state.transfers||[]).filter(tr=>tr.bankId===b.id&&tr.workerId===workerId&&tr.direction==='bank_to_customer').reduce((s,tr)=>s+tr.amount,0);
    return opening + inflow - billOut + trfIn - trfOut;
  }
  // Group customers by worker
  const workerGroups = state.workers.map(w => {
    const clients   = state.customers.filter(c => c.workerId === w.id);
    const txns      = state.transactions.filter(t => t.workerId === w.id);
    const swipeTxns = txns.filter(t => !t.isBillPayment && !t.isPayment && !t.isManualEntry);
    const bankTotal = swipeTxns.reduce((s,t) => s + t.amount, 0);
    const cashEntries = (state.manualEntries||[]).filter(e => e.workerId === w.id);
    const cashIn    = cashEntries.filter(e=>e.type==='debit').reduce((s,e)=>s+e.amount,0);
    const cashOut   = cashEntries.filter(e=>e.type==='credit').reduce((s,e)=>s+e.amount,0);
    const cashTotal = cashIn - cashOut;
    // Real bank balance = opening + settlements - bills - transfers
    const wBanks    = (state.workerBanks||[]).filter(b=>b.workerId===w.id);
    const realBankBalance = wBanks.reduce((s,b)=>s+calcWorkerBankBal(b,w.id),0);
    return { ...w, clients, txnCount:txns.length, bankTotal, cashTotal, cashIn, cashOut, realBankBalance, wBanks };
  }).sort((a,b) => b.clients.length - a.clients.length);

  // Also show customers with no worker assigned
  const orphanCusts = state.customers.filter(c => !state.workers.find(w => w.id === c.workerId));

  // Search filters customers
  const searchQ = search.trim().toLowerCase();
  function custMatches(c) {
    if (!searchQ) return true;
    return c.name.toLowerCase().includes(searchQ) ||
           c.mobile.includes(searchQ) ||
           (c.ref||'').toLowerCase().includes(searchQ);
  }

  // If searching, show flat table; else show worker-grouped view
  const flatFiltered = searchQ
    ? state.customers.filter(custMatches)
    : null;

  return (
    <div className="content fade-in">

      {/* Bank Detail Modal */}
      {bankModalWorker && (
        <div className="modal-overlay" onClick={()=>setBankModalWorker(null)}>
          <div className="modal" style={{width:560,maxWidth:'95vw'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
              <div>
                <div className="modal-title" style={{marginBottom:4}}>🏦 {bankModalWorker.name} — Banks</div>
                <div style={{fontSize:12,color:'var(--text3)'}}>{bankModalWorker.email} · {bankModalWorker.mobile||'—'}</div>
              </div>
              <button onClick={()=>setBankModalWorker(null)} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text2)',cursor:'pointer',padding:'6px 10px',fontSize:14,fontFamily:"'Sora',sans-serif"}}>✕</button>
            </div>
            {(()=>{
              const wBanks = (state.workerBanks||[]).filter(b=>b.workerId===bankModalWorker.id);
              if(wBanks.length===0) return (
                <div style={{textAlign:'center',padding:'30px',color:'var(--text3)',fontSize:13}}>
                  <div style={{fontSize:32,marginBottom:8}}>🏦</div>
                  No bank accounts added yet.
                </div>
              );
              const totalBal = wBanks.reduce((s,b)=>s+calcWorkerBankBal(b,bankModalWorker.id),0);
              return (
                <>
                  {wBanks.map(b=>{
                    const bal = calcWorkerBankBal(b, bankModalWorker.id);
                    const opening = parseFloat(b.openingBalance||0);
                    const wTxns = (state.transactions||[]).filter(t=>t.workerId===bankModalWorker.id&&!t.isPayment);
                    const swipeIn = wTxns.filter(t=>!t.isBillPayment&&t.swipeBankId===b.id).reduce((s,t)=>s+(t.swipeNetAmt||t.amount),0);
                    const billOut = wTxns.filter(t=>t.isBillPayment&&t.swipeBankId===b.id).reduce((s,t)=>s+(t.amount+(parseFloat(t.extraCharge)||0)),0);
                    const trfIn  = (state.transfers||[]).filter(tr=>tr.bankId===b.id&&tr.workerId===bankModalWorker.id&&tr.direction==='customer_to_bank').reduce((s,tr)=>s+tr.amount,0);
                    const trfOut = (state.transfers||[]).filter(tr=>tr.bankId===b.id&&tr.workerId===bankModalWorker.id&&tr.direction==='bank_to_customer').reduce((s,tr)=>s+tr.amount,0);
                    return (
                      <div key={b.id} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:12,padding:'14px 16px',marginBottom:12}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                          <div>
                            <div style={{fontWeight:700,fontSize:15}}>{b.name}</div>
                            <div style={{fontSize:11,color:'var(--text3)',fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>
                              {b.account||'—'} {b.ifsc?'· '+b.ifsc:''} {b.mdrRate?'· MDR '+b.mdrRate+'%':''}
                            </div>
                          </div>
                          <div style={{textAlign:'right'}}>
                            <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',marginBottom:2}}>Current Balance</div>
                            <div style={{fontSize:20,fontWeight:800,color:bal>=0?'var(--green)':'var(--red)',fontFamily:"'JetBrains Mono',monospace"}}>
                              ₹{bal.toLocaleString('en-IN',{maximumFractionDigits:0})}
                            </div>
                          </div>
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8}}>
                          {[
                            {label:'Opening',val:'₹'+opening.toLocaleString('en-IN',{maximumFractionDigits:0}),col:'var(--text2)'},
                            {label:'Swipe In',val:'₹'+swipeIn.toLocaleString('en-IN',{maximumFractionDigits:0}),col:'var(--green)'},
                            {label:'Bills Out',val:'₹'+billOut.toLocaleString('en-IN',{maximumFractionDigits:0}),col:'var(--red)'},
                            {label:'Transfers',val:(trfIn-trfOut>=0?'+':'')+'₹'+(trfIn-trfOut).toLocaleString('en-IN',{maximumFractionDigits:0}),col:trfIn-trfOut>=0?'var(--orange)':'var(--red)'},
                          ].map(s=>(
                            <div key={s.label} style={{background:'var(--surface)',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
                              <div style={{fontSize:12,fontWeight:700,color:s.col,fontFamily:"'JetBrains Mono',monospace"}}>{s.val}</div>
                              <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>{s.label}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                  {/* Total */}
                  <div style={{background:'linear-gradient(135deg,rgba(16,185,129,0.12),rgba(5,150,105,0.08))',border:'1px solid rgba(16,185,129,0.3)',borderRadius:12,padding:'14px 18px',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
                    <span style={{fontWeight:700,fontSize:14}}>Total Across All Banks</span>
                    <span style={{fontSize:22,fontWeight:800,color:'var(--green)',fontFamily:"'JetBrains Mono',monospace"}}>
                      ₹{totalBal.toLocaleString('en-IN',{maximumFractionDigits:0})}
                    </span>
                  </div>
                </>
              );
            })()}
          </div>
        </div>
      )}

      {/* KYC Modal */}
      {viewKycCust && (
        <div className="modal-overlay" onClick={()=>setViewKycCust(null)}>
          <div className="modal modal-lg" style={{maxWidth:680}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
              <div>
                <div className="modal-title" style={{marginBottom:4}}>📂 KYC — {viewKycCust.name}</div>
                <div style={{fontSize:12,color:'var(--text3)'}}>{viewKycCust.mobile}</div>
              </div>
              <div style={{display:'flex',gap:8}}>
                <span className={`chip ${[viewKycCust.docs?.aadharFront,viewKycCust.docs?.aadharBack,viewKycCust.docs?.pan].filter(Boolean).length===3?'chip-green':'chip-yellow'}`}>
                  {[viewKycCust.docs?.aadharFront,viewKycCust.docs?.aadharBack,viewKycCust.docs?.pan].filter(Boolean).length}/3 Docs
                </span>
                <button className="btn btn-sm btn-outline" onClick={()=>{
                  const docs=viewKycCust.docs||{};
                  [['aadharFront','Aadhar_Front'],['aadharBack','Aadhar_Back'],['pan','PAN_Card']].forEach(([k,l],i)=>{
                    if(!docs[k]) return;
                    setTimeout(()=>{
                      const a=document.createElement('a');
                      a.href=docs[k];
                      a.download=viewKycCust.name.replace(/\s+/g,'_')+'_'+l+(docs[k].includes('pdf')?'.pdf':'.jpg');
                      a.click();
                    },i*600);
                  });
                }}>⬇️ All</button>
                <button className="btn btn-sm btn-secondary" onClick={()=>setViewKycCust(null)}>✕</button>
              </div>
            </div>
            <div className="doc-viewer-grid">
              {[{key:'aadharFront',label:'Aadhar Card – Front'},{key:'aadharBack',label:'Aadhar Card – Back'},{key:'pan',label:'PAN Card'}].map(d=>{
                const doc = (viewKycCust.docs||{})[d.key];
                return (
                  <div key={d.key} className="doc-viewer-item">
                    <div className="doc-viewer-label">{d.key==='pan'?'📋':'🪪'} {d.label}</div>
                    {doc
                      ? (doc.startsWith('data:application/pdf')
                          ? <div className="doc-viewer-empty" style={{flexDirection:'column',gap:6}}><span style={{fontSize:24}}>📄</span><a href={doc} download={viewKycCust.name+'_'+d.label+'.pdf'} style={{color:'var(--accent)',fontSize:12,fontWeight:600}}>⬇️ Download PDF</a></div>
                          : <div style={{position:'relative'}}>
                              <img src={doc} className="doc-viewer-img" alt={d.label} style={{cursor:'pointer'}} onClick={()=>window.open(doc,'_blank')} />
                              <a href={doc} download={viewKycCust.name.replace(/\s+/g,'_')+'_'+d.key+'.jpg'} style={{position:'absolute',bottom:6,right:6,background:'rgba(0,0,0,0.6)',color:'#fff',fontSize:11,padding:'3px 9px',borderRadius:6,textDecoration:'none',fontWeight:600}}>⬇️ Download</a>
                            </div>)
                      : <div className="doc-viewer-empty">Not Uploaded</div>
                    }
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* Card Detail Modal */}
      {cardDetailCust && (()=>{
        const custCards = state.cards.filter(k=>k.customerId===cardDetailCust.id);
        const todayDay = new Date().getDate();
        return (
          <div className="modal-overlay" onClick={()=>setCardDetailCust(null)}>
            <div className="modal modal-lg" style={{maxWidth:700}} onClick={e=>e.stopPropagation()}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
                <div>
                  <div className="modal-title" style={{marginBottom:4}}>💳 Cards — {cardDetailCust.name}</div>
                  <div style={{fontSize:12,color:'var(--text3)'}}>{cardDetailCust.mobile} &nbsp;|&nbsp; {custCards.length} card(s)</div>
                </div>
                <button className="btn btn-sm btn-secondary" onClick={()=>setCardDetailCust(null)}>✕</button>
              </div>
              {custCards.length===0
                ? <div className="empty-state" style={{padding:'30px 0'}}><div className="empty-icon">💳</div><div className="empty-text">No cards added for this customer yet.</div></div>
                : <div style={{display:'flex',flexDirection:'column',gap:12}}>
                    {custCards.map(k=>{
                      const display = k.cardNumber?maskCard(k.cardNumber):('**** **** **** '+k.last4);
                      const due = parseInt(k.due)||31;
                      let daysLeft = due - todayDay;
                      if(daysLeft<0) daysLeft+=30;
                      const isOverdue=daysLeft<=0, isUrgent=daysLeft>0&&daysLeft<=3, isSoon=daysLeft>3&&daysLeft<=7;
                      const badgeLabel = isOverdue?'OVERDUE':isUrgent?daysLeft+'d left':isSoon?daysLeft+'d left':'Due '+k.due+'th';
                      const badgeColor = isOverdue?'chip-red':isUrgent||isSoon?'chip-yellow':'chip-green';
                      const txns = state.transactions.filter(t=>t.cardId===k.id);
                      const txnTotal = txns.reduce((s,t)=>s+calcTotal(t),0);
                      return (
                        <div key={k.id} style={{border:'1px solid var(--border)',borderRadius:12,overflow:'hidden'}}>
                          {/* Mini card visual */}
                          <div className={`credit-card ${k.color||'blue'}`} style={{margin:0,borderRadius:0,aspectRatio:'initial',padding:'14px 18px',minHeight:'auto'}}>
                            <div className="card-bank" style={{fontSize:12}}>{k.bank}</div>
                            <div className="card-number" style={{fontSize:13,letterSpacing:'0.18em',margin:'8px 0 6px'}}>{display}</div>
                            <div className="card-meta">
                              <div><div className="card-meta-label">Holder</div><div className="card-meta-value" style={{fontSize:12}}>{k.holder}</div></div>
                              <div><div className="card-meta-label">Due</div><div className="card-meta-value" style={{fontSize:12}}>{k.due}th</div></div>
                              <div><div className="card-meta-label">Limit</div><div className="card-meta-value" style={{fontSize:12}}>₹{(Number(k.limit)/1000).toFixed(0)}K</div></div>
                            </div>
                          </div>
                          {/* Stats row */}
                          <div style={{padding:'10px 14px',display:'flex',gap:16,flexWrap:'wrap',alignItems:'center',background:'var(--surface2)'}}>
                            <span className={`chip ${badgeColor}`} style={{fontSize:10}}>{badgeLabel}</span>
                            <span style={{fontSize:12,color:'var(--text3)'}}>{txns.length} transactions</span>
                            <span className="text-mono text-red" style={{fontSize:12,fontWeight:600}}>₹{txnTotal.toLocaleString('en-IN',{maximumFractionDigits:0})} total used</span>
                            <span style={{fontSize:11,color:'var(--text3)',marginLeft:'auto'}}>Billing: {k.billing}th</span>
                          </div>
                        </div>
                      );
                    })}
                    {/* Summary */}
                    <div style={{display:'flex',gap:12,padding:'10px 0',borderTop:'1px solid var(--border)'}}>
                      <div style={{flex:1,textAlign:'center',background:'var(--surface2)',borderRadius:8,padding:'8px'}}>
                        <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',marginBottom:3}}>Total Cards</div>
                        <div style={{fontSize:18,fontWeight:700,color:'var(--accent)'}}>{custCards.length}</div>
                      </div>
                      <div style={{flex:1,textAlign:'center',background:'var(--surface2)',borderRadius:8,padding:'8px'}}>
                        <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',marginBottom:3}}>Total Used</div>
                        <div className="text-mono text-red" style={{fontSize:15,fontWeight:700}}>₹{state.transactions.filter(t=>custCards.some(k=>k.id===t.cardId)).reduce((s,t)=>s+calcTotal(t),0).toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
                      </div>
                    </div>
                  </div>
              }
            </div>
          </div>
        );
      })()}

      {/* Search bar */}
      <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:20,flexWrap:'wrap'}}>
        <input className="search-input" style={{flex:1,minWidth:220}} placeholder="Search customer name / mobile / reference..." value={search} onChange={e=>setSearch(e.target.value)} />
        {search && <button className="btn btn-sm btn-outline" onClick={()=>setSearch('')}>✕ Clear</button>}
        <div style={{fontSize:12,color:'var(--text3)'}}>
          {state.workers.length} workers &nbsp;|&nbsp; {state.customers.length} customers total
        </div>
      </div>

      {/* ── SEARCH RESULT FLAT VIEW ──────────────────────────────────── */}
      {flatFiltered && (
        <div className="table-wrap">
          <div className="table-header">
            <div className="table-title">🔍 Search Results ({flatFiltered.length})</div>
          </div>
          {flatFiltered.length===0
            ? <div className="empty-state"><div className="empty-icon">🔍</div><div className="empty-text">No customers match "{search}"</div></div>
            : <table>
                <thead><tr><th>Customer</th><th>Mobile</th><th>Worker</th><th>Address</th><th>Docs</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>
                  {flatFiltered.map(c=>{
                    const w = state.workers.find(x=>x.id===c.workerId);
                    const dc= [c.docs?.aadharFront,c.docs?.aadharBack,c.docs?.pan].filter(Boolean).length;
                    return <tr key={c.id}>
                      <td><div className="flex-center"><div className="avatar avatar-green">{c.name[0]}</div><div><div className="fw-600">{c.name}</div><div className="text-sm">{c.ref||''}</div></div></div></td>
                      <td className="text-mono">{c.mobile}</td>
                      <td><span className="chip chip-blue" style={{fontSize:11}}>{w?.name||'—'}</span></td>
                      <td className="text-sm">{c.address||'—'}</td>
                      <td><span className={`chip ${dc===3?'chip-green':dc>0?'chip-yellow':'chip-red'}`} style={{fontSize:10}}>{dc}/3 docs</span></td>
                      <td><span className={`status-badge status-${c.status==='blocked'?'fraud':c.status}`}>{c.status}</span>{(c.status==='blocked')&&c.inactiveReason&&<div style={{fontSize:10,color:'var(--red)',marginTop:2}}>⚠️ {c.inactiveReason}</div>}</td>
                      <td>{c.status!=='blocked'
                        ?<button className="btn btn-sm btn-danger" onClick={()=>{const r=window.prompt('Reason:','');if(r===null)return;dispatch({type:'BLOCK_CUSTOMER',payload:{id:c.id,reason:r||'Blocked by Admin',date:new Date().toISOString().slice(0,10),by:'Admin'}});}}>Block</button>
                        :<button className="btn btn-sm btn-success" onClick={()=>dispatch({type:'UNBLOCK_CUSTOMER',payload:c.id})}>Unblock</button>
                      }</td>
                    </tr>;
                  })}
                </tbody>
              </table>
          }
        </div>
      )}

      {/* ── WORKER-GROUPED VIEW ──────────────────────────────────────── */}
      {!flatFiltered && (
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {workerGroups.map(w=>{
            const isExpanded = expandedWorker===w.id;
            const docOk = c => [c.docs?.aadharFront,c.docs?.aadharBack,c.docs?.pan].filter(Boolean).length;
            return (
              <div key={w.id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,overflow:'hidden'}}>

                {/* ── Worker Header Row ──────────────────────────────── */}
                <div
                  onClick={()=>setExpandedWorker(isExpanded?null:w.id)}
                  style={{display:'flex',alignItems:'center',gap:14,padding:'16px 20px',cursor:'pointer',transition:'background 0.15s',background:isExpanded?'rgba(59,130,246,0.05)':'transparent'}}
                >
                  {/* Avatar */}
                  <div style={{width:44,height:44,borderRadius:'50%',background:w.status==='active'?'linear-gradient(135deg,var(--accent),var(--accent2))':'var(--surface2)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:18,color:'#fff',flexShrink:0,border:w.status!=='active'?'1px solid var(--border)':'none'}}>
                    {w.name[0]}
                  </div>

                  {/* Worker details */}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                      <span style={{fontWeight:700,fontSize:15}}>{w.name}</span>
                      <span className={`status-badge status-${w.status}`} style={{fontSize:10}}>{w.status}</span>
                    </div>
                    <div style={{fontSize:11,color:'var(--text3)',fontFamily:"'JetBrains Mono',monospace"}}>{w.email} &nbsp;|&nbsp; {w.mobile||'—'}</div>
                    {(w.area||w.city) && <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>📍 {[w.area,w.city].filter(Boolean).join(', ')}</div>}
                  </div>

                  {/* Stats — Clients · This Month Swipe */}
                  <div style={{display:'flex',gap:0,flexShrink:0,alignItems:'center',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden'}}>
                    <div style={{textAlign:'center',padding:'8px 16px',minWidth:72}}>
                      <div style={{fontSize:20,fontWeight:800,color:'var(--accent)',fontFamily:"'Space Grotesk',sans-serif",lineHeight:1.2}}>{w.clients.length}</div>
                      <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.05em',marginTop:2}}>Clients</div>
                    </div>
                    <div style={{textAlign:'center',padding:'8px 16px',borderLeft:'1px solid var(--border)',minWidth:90}}>
                      {(()=>{
                        const monthStr = new Date().toISOString().slice(0,7);
                        const mVol = state.transactions.filter(t=>t.workerId===w.id&&!t.isBillPayment&&!t.isPayment&&(t.date||'').startsWith(monthStr)).reduce((s,t)=>s+t.amount,0);
                        return <>
                          <div style={{fontSize:14,fontWeight:800,color:'var(--green)',fontFamily:"'JetBrains Mono',monospace",lineHeight:1.2}}>
                            {mVol>=100000?'₹'+(mVol/100000).toFixed(1)+'L':mVol>=1000?'₹'+(mVol/1000).toFixed(0)+'K':'₹'+mVol.toFixed(0)}
                          </div>
                          <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.05em',marginTop:2}}>This Month</div>
                        </>;
                      })()}
                    </div>
                  </div>

                  {/* Expand arrow */}
                  <div style={{fontSize:18,color:'var(--text3)',transition:'transform 0.25s',transform:isExpanded?'rotate(180deg)':'rotate(0)',marginLeft:8,flexShrink:0}}>⌄</div>
                </div>

                {/* ── Client List Dropdown ────────────────────────────── */}
                {isExpanded && (
                  <div style={{borderTop:'1px solid var(--border)',background:'var(--bg)'}}>
                    {w.clients.length===0
                      ? <div style={{padding:'24px',textAlign:'center',color:'var(--text3)',fontSize:13}}>No customers assigned to this worker yet.</div>
                      : <>
                          {/* Mini stats for this worker's clients */}
                          <div style={{padding:'10px 20px',background:'rgba(59,130,246,0.04)',borderBottom:'1px solid var(--border)',display:'flex',gap:20,flexWrap:'wrap'}}>

                            <span style={{fontSize:12,color:'var(--text3)'}}>Blocked: <span style={{color:'var(--red)',fontWeight:700}}>{w.clients.filter(c=>c.status==='blocked').length}</span></span>

                                ))}

                                return (
