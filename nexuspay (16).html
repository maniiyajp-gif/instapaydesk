<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusPay – Transaction Management System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --surface: #111318;
  --surface2: #181c24;
  --surface3: #1e2330;
  --border: #252b38;
  --border2: #2e3650;
  --accent: #3b82f6;
  --accent2: #6366f1;
  --accent3: #8b5cf6;
  --green: #10b981;
  --red: #ef4444;
  --orange: #f59e0b;
  --yellow: #eab308;
  --text: #e8eaf2;
  --text2: #9ca3af;
  --text3: #6b7280;
  --card-blue: linear-gradient(135deg, #1e3a8a 0%, #3730a3 50%, #1e1b4b 100%);
  --card-gold: linear-gradient(135deg, #78350f 0%, #b45309 50%, #92400e 100%);
  --card-dark: linear-gradient(135deg, #111827 0%, #1f2937 50%, #0f172a 100%);
  --glow: 0 0 40px rgba(59,130,246,0.15);
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
body.light-mode {
  --bg: #f5f6fa;
  --surface: #ffffff;
  --surface2: #f0f2f9;
  --surface3: #e6eaf6;
  --border: #e2e5f0;
  --border2: #cbd2e8;
  --accent: #2563eb;
  --accent2: #4f46e5;
  --accent3: #7c3aed;
  --green: #059669;
  --red: #dc2626;
  --orange: #d97706;
  --yellow: #ca8a04;
  --text: #111827;
  --text2: #374151;
  --text3: #6b7280;
  --card-blue: linear-gradient(135deg,#1e3a8a,#3730a3);
  --card-gold: linear-gradient(135deg,#78350f,#b45309);
  --card-dark: linear-gradient(135deg,#111827,#1f2937);
  --glow: 0 0 30px rgba(37,99,235,0.08);
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
}
body.light-mode body { background:var(--bg); }
body.light-mode .sidebar { background:#fff; border-right:1px solid var(--border); box-shadow:2px 0 12px rgba(0,0,0,0.04); }
body.light-mode .topbar { background:#fff; border-bottom:1px solid var(--border); box-shadow:0 1px 8px rgba(0,0,0,0.04); }
body.light-mode .card-block { background:#fff; border-color:var(--border); box-shadow:0 1px 6px rgba(0,0,0,0.05); }
body.light-mode .table-wrap { background:#fff; border-color:var(--border); }
body.light-mode table thead { background:var(--surface2); }
body.light-mode table tr:hover { background:#f8faff; }
body.light-mode .modal { background:#fff; box-shadow:0 8px 40px rgba(0,0,0,0.15); }
body.light-mode .sidebar-nav-item { color:var(--text2); }
body.light-mode .sidebar-nav-item:hover { background:var(--surface2); color:var(--accent); }
body.light-mode .sidebar-nav-item.active { background:rgba(37,99,235,0.08); color:var(--accent); }
body.light-mode input, body.light-mode select, body.light-mode textarea { background:#fff; border-color:var(--border); color:var(--text); }
body.light-mode input:focus, body.light-mode select:focus, body.light-mode textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,0.10); }
body.light-mode .stat-card { background:#fff; border-color:var(--border); box-shadow:0 1px 6px rgba(0,0,0,0.05); }
.theme-toggle { width:40px; height:22px; background:var(--border2); border-radius:11px; position:relative; cursor:pointer; transition:background 0.3s; border:none; flex-shrink:0; }
.theme-toggle.dark  { background:var(--accent2); }
.theme-toggle-knob { position:absolute; top:3px; left:3px; width:16px; height:16px; background:#fff; border-radius:50%; transition:transform 0.25s; font-size:10px; display:flex; align-items:center; justify-content:center; }
body.light-mode .theme-toggle-knob { transform:translateX(18px); }
.theme-toggle-wrap { display:flex; align-items:center; gap:7px; }
.theme-toggle-label { font-size:11px; font-weight:600; color:var(--text3); white-space:nowrap; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Sora',sans-serif; min-height:100vh; overflow-x:hidden; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }

/* Animations */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── Mobile Hamburger ──────────────────────────────────────────── */
.hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:8px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); }
.hamburger span { display:block; width:20px; height:2px; background:var(--text); border-radius:2px; transition:all 0.3s; }
.sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; }

/* ── Mobile Responsive ─────────────────────────────────────────── */
@media (max-width: 768px) {
  .hamburger { display:flex; }
  .sidebar-overlay { display:block; }

  .app-layout { flex-direction:column; }

  .sidebar {
    position:fixed; left:-260px; top:0; bottom:0; z-index:100;
    width:260px; min-width:260px;
    transition:left 0.3s ease;
    box-shadow:none;
  }
  .sidebar.mobile-open {
    left:0;
    box-shadow:4px 0 24px rgba(0,0,0,0.4);
  }

  .main { width:100%; }

  .topbar {
    padding:10px 14px !important;
    position:sticky; top:0; z-index:50;
  }

  .content { padding:12px !important; }

  .grid-2 { grid-template-columns:1fr !important; }
  .stats-grid { grid-template-columns:1fr 1fr !important; }

  .form-row { flex-direction:column !important; }
  .form-row .form-group { width:100% !important; }

  .table-wrap { overflow-x:auto; }
  table { min-width:500px; }

  .modal { width:calc(100vw - 24px) !important; max-width:100% !important; margin:12px; max-height:90vh; overflow-y:auto; }
  .modal-overlay { padding:0; align-items:flex-end; }

  .credit-card { margin:0 !important; }

  .ledger-wrap { overflow-x:auto; }
  .ledger-wrap table { min-width:600px; }

  .topbar-date { display:none; }
}

@media (max-width: 480px) {
  .stats-grid { grid-template-columns:1fr 1fr !important; }
  .stat-value { font-size:18px !important; }
  .content { padding:8px !important; }
}
@keyframes slideIn { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes ripple { 0%{transform:scale(0);opacity:1} 100%{transform:scale(4);opacity:0} }
@keyframes glow { 0%,100%{box-shadow:0 0 20px rgba(59,130,246,0.3)} 50%{box-shadow:0 0 40px rgba(99,102,241,0.5)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes cardFlip { 0%{transform:rotateY(0)} 50%{transform:rotateY(90deg)} 100%{transform:rotateY(0)} }
@keyframes countUp { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
@keyframes checkmark { 0%{stroke-dashoffset:50} 100%{stroke-dashoffset:0} }
@keyframes progress { 0%{width:0} 100%{width:100%} }

.fade-in { animation:fadeIn 0.35s ease forwards; }
.slide-in { animation:slideIn 0.3s ease forwards; }

/* Login Page */
.login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.login-bg { position:absolute; inset:0; background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59,130,246,0.12) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 80%, rgba(99,102,241,0.08) 0%, transparent 50%); }
.login-grid { position:absolute; inset:0; background-image:linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size:40px 40px; opacity:0.3; }
.login-card { background:var(--surface); border:1px solid var(--border2); border-radius:20px; padding:48px; width:420px; position:relative; z-index:1; box-shadow:var(--shadow), var(--glow); animation:fadeIn 0.5s ease; }
.login-logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
.login-logo-icon { width:44px; height:44px; background:linear-gradient(135deg,var(--accent),var(--accent3)); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; animation:glow 3s ease-in-out infinite; }
.login-logo-text { font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; background:linear-gradient(135deg,#e8eaf2,#9ca3af); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.login-title { font-size:26px; font-weight:700; margin-bottom:6px; }
.login-sub { color:var(--text2); font-size:14px; margin-bottom:32px; }
.role-tabs { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:28px; }
.role-tab { padding:10px; border:1px solid var(--border2); border-radius:10px; background:transparent; color:var(--text2); cursor:pointer; font-family:'Sora',sans-serif; font-size:13px; font-weight:500; transition:all 0.2s; }
.role-tab.active { background:linear-gradient(135deg,var(--accent),var(--accent2)); border-color:transparent; color:#fff; }
.form-group { margin-bottom:18px; }
.form-label { display:block; font-size:12px; font-weight:600; color:var(--text2); margin-bottom:8px; letter-spacing:0.05em; text-transform:uppercase; }
.form-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 16px; color:var(--text); font-family:'Sora',sans-serif; font-size:14px; outline:none; transition:all 0.2s; }
.form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
.form-input::placeholder { color:var(--text3); }
select.form-input option { background:var(--surface2); }
.btn { width:100%; padding:13px; border:none; border-radius:10px; cursor:pointer; font-family:'Sora',sans-serif; font-size:14px; font-weight:600; transition:all 0.2s; position:relative; overflow:hidden; }
.btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 25px rgba(59,130,246,0.35); }
.btn-secondary { background:var(--surface2); border:1px solid var(--border2); color:var(--text); }
.btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
.btn-sm { width:auto; padding:7px 14px; font-size:12px; border-radius:8px; }
.btn-danger { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:var(--red); }
.btn-success { background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.3); color:var(--green); }
.btn-outline { background:transparent; border:1px solid var(--border2); color:var(--text2); }
.btn-outline:hover { border-color:var(--accent); color:var(--accent); }
.forgot-link { text-align:center; margin-top:16px; color:var(--text2); font-size:13px; cursor:pointer; }
.forgot-link span { color:var(--accent); }
.otp-row { display:flex; gap:10px; }
.otp-input { flex:1; text-align:center; font-size:20px; font-family:'JetBrains Mono',monospace; letter-spacing:0.1em; }
.quick-btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:14px; }
.quick-btn { padding:11px 10px; border:none; border-radius:10px; cursor:pointer; font-family:'Sora',sans-serif; font-size:12px; font-weight:700; display:flex; flex-direction:column; align-items:center; gap:3px; transition:all 0.2s; }
.quick-btn:hover { transform:translateY(-2px); }
.quick-btn-admin { background:linear-gradient(135deg,rgba(59,130,246,0.18),rgba(99,102,241,0.18)); border:1px solid rgba(59,130,246,0.35); color:#60a5fa; }
.quick-btn-admin:hover { background:linear-gradient(135deg,rgba(59,130,246,0.3),rgba(99,102,241,0.3)); box-shadow:0 4px 16px rgba(59,130,246,0.3); }
.quick-btn-worker { background:linear-gradient(135deg,rgba(16,185,129,0.18),rgba(5,150,105,0.18)); border:1px solid rgba(16,185,129,0.35); color:#34d399; }
.quick-btn-worker:hover { background:linear-gradient(135deg,rgba(16,185,129,0.3),rgba(5,150,105,0.3)); box-shadow:0 4px 16px rgba(16,185,129,0.3); }
.quick-btn-icon { font-size:20px; }
.quick-btn-label { font-size:12px; font-weight:700; }
.quick-btn-sub { font-size:10px; opacity:0.7; font-family:'JetBrains Mono',monospace; }

/* Layout */
.app-layout { display:flex; height:100vh; overflow:hidden; }
.sidebar { width:240px; min-width:240px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; }
.sidebar-logo { padding:20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.sidebar-logo-icon { width:34px; height:34px; background:linear-gradient(135deg,var(--accent),var(--accent3)); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; }
.sidebar-logo-text { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; }
.sidebar-user { padding:16px 20px; border-bottom:1px solid var(--border); }
.sidebar-user-name { font-weight:600; font-size:14px; }
.sidebar-user-role { font-size:11px; color:var(--text3); margin-top:2px; text-transform:uppercase; letter-spacing:0.08em; }
.sidebar-badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:600; margin-top:6px; }
.badge-admin { background:rgba(139,92,246,0.2); color:#a78bfa; }
.badge-worker { background:rgba(59,130,246,0.2); color:#60a5fa; }
.sidebar-nav { padding:12px 10px; flex:1; }
.nav-section { font-size:10px; font-weight:700; color:var(--text3); letter-spacing:0.1em; text-transform:uppercase; padding:8px 10px 6px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; cursor:pointer; color:var(--text2); font-size:13px; font-weight:500; transition:all 0.15s; margin-bottom:2px; }
.nav-item:hover { background:var(--surface2); color:var(--text); }
.nav-item.active { background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(99,102,241,0.2)); color:var(--accent); border:1px solid rgba(59,130,246,0.25); }
.nav-icon { font-size:15px; width:20px; text-align:center; }
.nav-badge { margin-left:auto; background:var(--red); color:#fff; border-radius:10px; padding:1px 6px; font-size:10px; font-weight:700; }
.sidebar-bottom { padding:16px; border-top:1px solid var(--border); }
.logout-btn { display:flex; align-items:center; gap:8px; color:var(--text3); cursor:pointer; font-size:13px; padding:8px 10px; border-radius:8px; transition:all 0.15s; }
.logout-btn:hover { background:rgba(239,68,68,0.1); color:var(--red); }

/* Main content */
.main { flex:1; overflow-y:auto; background:var(--bg); }
.topbar { height:60px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 28px; position:sticky; top:0; z-index:10; }
.topbar-title { font-size:16px; font-weight:700; }
.topbar-right { display:flex; align-items:center; gap:12px; }
.topbar-date { font-size:12px; color:var(--text2); font-family:'JetBrains Mono',monospace; }
.notif-btn { width:36px; height:36px; background:var(--surface2); border:1px solid var(--border); border-radius:9px; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; font-size:15px; }
.notif-dot { position:absolute; top:6px; right:6px; width:7px; height:7px; background:var(--red); border-radius:50%; border:2px solid var(--surface); }
.content { padding:28px; animation:fadeIn 0.35s ease; }

/* Cards / Stats */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; margin-bottom:28px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; position:relative; overflow:hidden; transition:all 0.2s; }
.stat-card:hover { border-color:var(--border2); transform:translateY(-2px); box-shadow:var(--shadow); }
.stat-card::before { content:''; position:absolute; top:0; right:0; width:80px; height:80px; border-radius:50%; filter:blur(30px); opacity:0.3; }
.stat-card.blue::before { background:var(--accent); }
.stat-card.purple::before { background:var(--accent3); }
.stat-card.green::before { background:var(--green); }
.stat-card.orange::before { background:var(--orange); }
.stat-card.red::before { background:var(--red); }
.stat-label { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px; }
.stat-value { font-size:26px; font-weight:700; font-family:'Space Grotesk',sans-serif; animation:countUp 0.5s ease; }
.stat-value.mono { font-family:'JetBrains Mono',monospace; font-size:20px; }
.stat-sub { font-size:12px; color:var(--text3); margin-top:6px; }
.stat-icon { position:absolute; top:18px; right:18px; font-size:24px; opacity:0.6; }
.stat-trend { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; margin-top:8px; }
.trend-up { background:rgba(16,185,129,0.15); color:var(--green); }
.trend-down { background:rgba(239,68,68,0.15); color:var(--red); }

/* Tables */
.table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
.table-header { padding:18px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.table-title { font-size:14px; font-weight:700; }
.table-actions { display:flex; gap:8px; align-items:center; }
.search-input { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:7px 12px; color:var(--text); font-size:13px; font-family:'Sora',sans-serif; outline:none; width:200px; }
.search-input:focus { border-color:var(--accent); }
table { width:100%; border-collapse:collapse; }
th { padding:10px 16px; text-align:left; font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.06em; border-bottom:1px solid var(--border); }
td { padding:12px 16px; font-size:13px; border-bottom:1px solid rgba(37,43,56,0.5); }
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(255,255,255,0.02); }
.status-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.status-badge::before { content:''; width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.status-active { background:rgba(16,185,129,0.15); color:var(--green); }
.status-active::before { background:var(--green); }
.status-inactive { background:rgba(107,114,128,0.15); color:var(--text3); }
.status-inactive::before { background:var(--text3); }
.status-pending { background:rgba(245,158,11,0.15); color:var(--orange); }
.status-pending::before { background:var(--orange); }
.status-fraud { background:rgba(239,68,68,0.15); color:var(--red); }
.status-fraud::before { background:var(--red); }
.status-success { background:rgba(16,185,129,0.15); color:var(--green); }
.status-success::before { background:var(--green); }
.action-btns { display:flex; gap:6px; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; animation:fadeIn 0.2s ease; }
.modal { background:var(--surface); border:1px solid var(--border2); border-radius:18px; padding:32px; width:520px; max-width:90vw; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow),var(--glow); animation:fadeIn 0.3s ease; }
.modal-lg { width:680px; }
.modal-title { font-size:18px; font-weight:700; margin-bottom:6px; }
.modal-sub { font-size:13px; color:var(--text2); margin-bottom:24px; }
.modal-footer { display:flex; gap:10px; margin-top:24px; }
.modal-footer .btn { flex:1; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
select.form-input { cursor:pointer; }
textarea.form-input { resize:vertical; min-height:80px; }

/* Credit Cards Visual */
.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; margin-bottom:28px; }
.credit-card { width:100%; aspect-ratio:1.586; border-radius:16px; padding:24px; position:relative; overflow:hidden; cursor:pointer; transition:all 0.3s; box-shadow:0 10px 30px rgba(0,0,0,0.4); }
.credit-card:hover { transform:translateY(-4px) scale(1.02); box-shadow:0 20px 40px rgba(0,0,0,0.5); }
.credit-card.blue { background:var(--card-blue); }
.credit-card.gold { background:var(--card-gold); }
.credit-card.dark { background:var(--card-dark); border:1px solid var(--border2); }
.card-chip { width:38px; height:30px; background:linear-gradient(135deg,#d4a017,#f5c842,#d4a017); border-radius:5px; margin-bottom:20px; position:relative; overflow:hidden; }

function calcTotal(txn) {
  const sc = (txn.amount * txn.serviceChargePct / 100);
  return txn.amount + sc + txn.extraCharge;
}

// Shared: calculates customer outstanding — same logic as LedgerPage trueOutstanding
function calcCustOutstanding(customerId, workerId, state) {
  const txns      = state.transactions.filter(t=>t.customerId===customerId);
  const transfers = (state.transfers||[]).filter(tr=>tr.customerId===customerId&&tr.workerId===workerId);
  const manual    = (state.ledgerEntries||[]).filter(e=>e.customerId===customerId&&e.workerId===workerId);
  const entries = [
    ...txns.map(t=>({...t,_et:'txn'})),
    ...transfers.map(tr=>({...tr,_et:'transfer'})),
    ...manual.map(e=>({...e,_et:'manual'}))
  ].sort((a,b)=>a.date>b.date?1:-1);
  let bal = 0;
  entries.forEach(e=>{
    if(e._et==='manual'){
      bal += e.entryType==='debit' ? e.amount : -e.amount; return;
    }
    if(e._et==='transfer'){
      bal += e.direction==='customer_to_bank' ? -e.amount : e.amount; return;
    }
    if(e.isPayment){ bal -= e.amount; return; }
    if(e.isOpeningBalance && !e.isPayment){ bal += e.amount; return; }
    if(e.isBillPayment){ bal -= e.amount; return; }
    // Swipe: Debit (+amount), SC: Credit (-svcChg)
    bal += e.amount;
    const svcChg = (e.amount*(e.serviceChargePct||0)/100)+(parseFloat(e.extraCharge)||0);
    if(svcChg>0) bal -= svcChg;
  });
  return bal;
}

// Mask card: show first 4 + **** **XX + last 4  (first4 + last6 visible, middle 6 hidden)
function maskCard(num) {
  const d = (num||'').replace(/\D/g,'');
  if (d.length < 6) return d;
  if (d.length <= 10) return d.slice(0,4) + ' ****' + d.slice(-4);
  // For 16-digit: XXXX **** **XX XXXX  (first4 visible + 6 masked + last6 visible)
  const first4 = d.slice(0,4);
  const mid    = '*'.repeat(d.length - 10);  // digits 5 to (len-6) masked
  const last6  = d.slice(-6);
  // format in card-style groups
  const raw = first4 + mid + last6;
  return raw.match(/.{1,4}/g).join(' ');
}

// Format card number input with spaces every 4 digits
function fmtCardInput(v) {
  return v.replace(/\D/g,'').slice(0,16).replace(/(.{4})(?=.)/g,'$1 ');
}

// ─── BANK LEDGER MODAL ───────────────────────────────────────────────────────
function BankLedgerModal({ bank:b, worker:w, state, onClose }) {
  const today = new Date().toISOString().slice(0,10);
  const [fromDate, setFrom] = useState(today);
  const [toDate,   setTo]   = useState(today);

  const opening = parseFloat(b.openingBalance||0);
  const allTxns = (state.transactions||[]).filter(t=>t.workerId===w.id&&!t.isPayment);
  const bankTxns = allTxns.filter(t=>(t.swipeBankId===b.id)||(t.splitParts&&t.splitParts.some(p=>p.bankId===b.id)));
  const bankTrfs = (state.transfers||[]).filter(tr=>tr.bankId===b.id&&tr.workerId===w.id);

  // Build ALL rows first (running balance always from beginning)
  const allEntries = [
    ...bankTxns.map(t=>({...t,_type:t.isBillPayment?'bill':'swipe'})),
    ...bankTrfs.map(tr=>({...tr,_type:'transfer'}))
  ].sort((a,b)=>a.date>b.date?1:-1);

  const allRows = [];
  let bal = opening;
  if(opening!==0) allRows.push({date:'',desc:'Opening Balance',in:opening>0?opening:0,out:opening<0?Math.abs(opening):0,bal});
  allEntries.forEach(e=>{
    if(e._type==='transfer'){
      if(e.direction==='customer_to_bank'){ bal+=e.amount; allRows.push({date:e.date,desc:'Transfer IN — '+(e.description||e.bankName||''),in:e.amount,out:0,bal}); }
      else { bal-=e.amount; allRows.push({date:e.date,desc:'Transfer OUT — '+(e.description||e.bankName||''),in:0,out:e.amount,bal}); }
    } else if(e._type==='bill'){
      const amt=e.amount+(parseFloat(e.extraCharge)||0);
      bal-=amt;
      const cust=state.customers.find(c=>c.id===e.customerId);
      allRows.push({date:e.date,desc:'Bill Payment'+(cust?' — '+cust.name:'')+(e.billMonth?' ('+e.billMonth+')':''),in:0,out:amt,bal,ref:e.txnRef});
    } else {
      const net=e.swipeNetAmt||e.amount;
      bal+=net;
      const cust=state.customers.find(c=>c.id===e.customerId);
      const card=state.cards.find(k=>k.id===e.cardId);
      allRows.push({date:e.date,desc:'Swipe'+(cust?' — '+cust.name:'')+(card?' ****'+card.last4:''),in:net,out:0,bal,ref:e.txnRef});
    }
  });

  // Apply date filter (only on dated rows, keep Opening Balance always)
  const filteredRows = allRows.filter(r=>{
    if(!r.date) return true; // Opening Balance
    if(fromDate && r.date < fromDate) return false;
    if(toDate   && r.date > toDate)   return false;
    return true;
  });

  const totalIn  = filteredRows.reduce((s,r)=>s+r.in,0);
  const totalOut = filteredRows.reduce((s,r)=>s+r.out,0);
  const finalBal = allRows.length>0 ? allRows[allRows.length-1].bal : opening;

  const hasFilter = fromDate||toDate;

  function resetFilter(){ setFrom(''); setTo(''); }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal modal-lg" style={{width:700,maxWidth:'95vw',maxHeight:'92vh',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div style={{flexShrink:0,marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
            <div>
              <div style={{fontSize:18,fontWeight:800,marginBottom:3}}>🏦 {b.name}</div>
              <div style={{fontSize:11,color:'var(--text3)',fontFamily:"'JetBrains Mono',monospace"}}>
                {b.account||'—'}{b.ifsc?' · '+b.ifsc:''}{b.mdrRate?' · MDR '+b.mdrRate+'%':''}
              </div>
              <div style={{fontSize:12,color:'var(--text2)',marginTop:3}}>Worker: <strong>{w.name}</strong></div>
            </div>
            <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.05em'}}>Current Balance</div>
                <div style={{fontSize:24,fontWeight:800,color:finalBal>=0?'var(--green)':'var(--red)',fontFamily:"'JetBrains Mono',monospace"}}>₹{finalBal.toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
              </div>
              <button onClick={onClose} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text2)',cursor:'pointer',padding:'6px 10px',fontSize:14,fontFamily:"'Sora',sans-serif",marginTop:2}}>✕</button>
            </div>
          </div>

          {/* Date Filter */}
          <div style={{display:'flex',gap:8,alignItems:'center',padding:'10px 14px',background:'var(--surface2)',borderRadius:10,border:'1px solid var(--border)'}}>
            <span style={{fontSize:12,color:'var(--text3)',fontWeight:600,whiteSpace:'nowrap'}}>📅 Filter:</span>
            <input type="date" className="form-input" style={{width:140,fontSize:12,padding:'7px 10px'}} value={fromDate} onChange={e=>setFrom(e.target.value)} />
            <span style={{fontSize:12,color:'var(--text3)'}}>to</span>
            <input type="date" className="form-input" style={{width:140,fontSize:12,padding:'7px 10px'}} value={toDate} onChange={e=>setTo(e.target.value)} />
            {hasFilter && <button onClick={resetFilter} style={{padding:'7px 12px',background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.25)',borderRadius:8,color:'var(--red)',cursor:'pointer',fontSize:11,fontWeight:600,fontFamily:"'Sora',sans-serif",whiteSpace:'nowrap'}}>✕ Clear</button>}
            {hasFilter && <span style={{fontSize:11,color:'var(--accent)',fontWeight:600,marginLeft:4}}>{filteredRows.filter(r=>r.date).length} records</span>}
          </div>

          {/* Summary */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginTop:10}}>
            {[
              {label:'Total In',  val:'₹'+totalIn.toLocaleString('en-IN',{maximumFractionDigits:0}),  col:'var(--green)', bg:'rgba(16,185,129,0.08)'},
              {label:'Total Out', val:'₹'+totalOut.toLocaleString('en-IN',{maximumFractionDigits:0}), col:'var(--red)',   bg:'rgba(239,68,68,0.08)'},
              {label:hasFilter?'Period Balance':'Net Balance', val:'₹'+finalBal.toLocaleString('en-IN',{maximumFractionDigits:0}), col:finalBal>=0?'var(--green)':'var(--red)', bg:'rgba(59,130,246,0.08)'},
            ].map(s=>(
              <div key={s.label} style={{background:s.bg,border:'1px solid var(--border)',borderRadius:8,padding:'9px 12px',textAlign:'center'}}>
                <div style={{fontSize:15,fontWeight:800,color:s.col,fontFamily:"'JetBrains Mono',monospace"}}>{s.val}</div>
                <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Ledger Table */}
        <div style={{overflowY:'auto',flex:1,border:'1px solid var(--border)',borderRadius:10}}>
          {filteredRows.length===0
            ? <div style={{textAlign:'center',padding:'40px',color:'var(--text3)',fontSize:13}}>
                <div style={{fontSize:28,marginBottom:8}}>📄</div>
                No records{hasFilter?' for selected date range':' yet'}.
              </div>
            : <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead style={{position:'sticky',top:0,background:'var(--surface2)',zIndex:1}}>
                  <tr>
                    <th style={{padding:'9px 14px',textAlign:'left',fontSize:11,fontWeight:700,color:'var(--text3)',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'}}>Date</th>
                    <th style={{padding:'9px 14px',textAlign:'left',fontSize:11,fontWeight:700,color:'var(--text3)',borderBottom:'1px solid var(--border)'}}>Description</th>
                    <th style={{padding:'9px 14px',textAlign:'right',fontSize:11,fontWeight:700,color:'var(--green)',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'}}>In (₹)</th>
                    <th style={{padding:'9px 14px',textAlign:'right',fontSize:11,fontWeight:700,color:'var(--red)',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'}}>Out (₹)</th>
                    <th style={{padding:'9px 14px',textAlign:'right',fontSize:11,fontWeight:700,color:'var(--text3)',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'}}>Balance (₹)</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredRows.map((r,i)=>(
                    <tr key={i} style={{borderBottom:'1px solid rgba(37,43,56,0.4)',background:r.in>0?'rgba(16,185,129,0.02)':r.out>0?'rgba(239,68,68,0.02)':undefined}}>
                      <td style={{padding:'9px 14px',fontSize:12,color:'var(--text3)',whiteSpace:'nowrap'}}>{r.date||'—'}</td>
                      <td style={{padding:'9px 14px',fontSize:13,color:'var(--text)'}}>{r.desc}</td>
                      <td style={{padding:'9px 14px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:'var(--green)',fontWeight:r.in>0?700:400}}>{r.in>0?'₹'+r.in.toLocaleString('en-IN',{maximumFractionDigits:0}):'—'}</td>
                      <td style={{padding:'9px 14px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:'var(--red)',fontWeight:r.out>0?700:400}}>{r.out>0?'₹'+r.out.toLocaleString('en-IN',{maximumFractionDigits:0}):'—'}</td>
                      <td style={{padding:'9px 14px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:r.bal>=0?'var(--green)':'var(--red)',whiteSpace:'nowrap'}}>₹{r.bal.toLocaleString('en-IN',{maximumFractionDigits:0})}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
          }
        </div>
      </div>
    </div>
  );
}

function WorkersPage({ state, dispatch }) {
  const emptyForm = {
    name:'', email:'', mobile:'', password:'',
    address:'', area:'', city:'', mapUrl:'',
    docs:{ aadharFront:null, aadharBack:null, pan:null }
  };
  const [showModal, setShowModal] = useState(false);
  const [editWorker, setEditWorker] = useState(null);
  const [form, setForm] = useState(emptyForm);
  const [showPass, setShowPass] = useState(false);
  const [viewWorker, setViewWorker] = useState(null);
  const [bankDetailWorker, setBankDetailWorker] = useState(null);
  const [bankLedgerModal, setBankLedgerModal] = useState(null); // {bank, worker}
  const [search, setSearch] = useState('');
  const [success, setSuccess] = useState('');

  const filtered = state.workers.filter(w=>
    w.name.toLowerCase().includes(search.toLowerCase()) ||
    w.email.toLowerCase().includes(search.toLowerCase()) ||
    (w.mobile||'').includes(search) ||
    (w.city||'').toLowerCase().includes(search.toLowerCase())
  );

  function openAdd() { setEditWorker(null); setForm(emptyForm); setShowPass(false); setShowModal(true); }
  function openEdit(w) {
    setEditWorker(w);
    setForm({ name:w.name, email:w.email, mobile:w.mobile||'', password:'', address:w.address||'', area:w.area||'', city:w.city||'', mapUrl:w.mapUrl||'', docs:w.docs||{aadharFront:null,aadharBack:null,pan:null} });
    setShowPass(false); setShowModal(true);
  }

  function handleDocUpload(key, dataUrl) { setForm(f=>({...f, docs:{...f.docs,[key]:dataUrl}})); }
  function handleDocRemove(key) { setForm(f=>({...f, docs:{...f.docs,[key]:null}})); }

  function save() {
    if (!form.name.trim())   return alert('Full name is required');
    if (!form.mobile.trim()) return alert('Mobile number is required');
    if (!form.email.trim())  return alert('Email address is required');
    if (!form.city.trim())   return alert('City is required');
    if (!editWorker && !form.password.trim()) return alert('Password is required for new worker');
    if (!editWorker && !form.docs.aadharFront) return alert('Aadhar Front is required');
    if (!editWorker && !form.docs.aadharBack)  return alert('Aadhar Back is required');
    if (!editWorker && !form.docs.pan)         return alert('PAN Card is required');

    if (!editWorker) {
      dispatch({ type:'ADD_WORKER', payload:{ ...form, id:'W'+Date.now(), status:'active', transactions:0, charges:0, lastLogin:'Never' } });
      setSuccess('Worker created successfully!');
    } else {
      const payload = { ...editWorker, ...form };
      if (!form.password.trim()) delete payload.password;
      dispatch({ type:'EDIT_WORKER', payload });
      setSuccess('Worker updated successfully!');
    }
    setShowModal(false); setForm(emptyForm);
    setTimeout(()=>setSuccess(''), 3000);
  }

  function toggleStatus(id) { dispatch({ type:'TOGGLE_WORKER', payload:id }); }

  const docCount = w => { const d=w.docs||{}; return [d.aadharFront,d.aadharBack,d.pan].filter(Boolean).length; };

  // ── Worker KYC View Modal ─────────────────────────────────────────────────
  const ViewModal = ({w, onClose}) => {
    if(!w) return null;
    const docs=w.docs||{};
    return (
      <div className="modal-overlay" onClick={onClose}>
        <div className="modal modal-lg" style={{maxWidth:700}} onClick={e=>e.stopPropagation()}>

              <div className="modal-title" style={{marginBottom:4}}>👤 {w.name}</div>

              <div key={l} style={{padding:'8px 12px',background:'var(--surface2)',borderRadius:8}}>
                <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3}}>{l}</div>
                <div style={{fontSize:13,fontWeight:600}}>{v}</div>
              </div>
            ))}
          </div>

          {w.mapUrl && <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6}}>Map Location</div>
            <a href={w.mapUrl} target="_blank" rel="noreferrer" style={{display:'inline-flex',alignItems:'center',gap:6,padding:'7px 14px',background:'rgba(59,130,246,0.1)',border:'1px solid rgba(59,130,246,0.3)',borderRadius:8,color:'var(--accent)',fontSize:13,textDecoration:'none',fontWeight:600}}>
              📍 Open in Google Maps
            </a>
          </div>}

          {/* KYC Documents */}
          <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10}}>KYC Documents ({docCount(w)}/3)</div>
          <div className="doc-viewer-grid">
            {[{key:'aadharFront',label:'Aadhar Front'},{key:'aadharBack',label:'Aadhar Back'},{key:'pan',label:'PAN Card'}].map(d=>(
              <div key={d.key} className="doc-viewer-item">
                <div className="doc-viewer-label">{d.key==='pan'?'📋':'🪪'} {d.label}</div>
                {docs[d.key]
                  ? (docs[d.key].startsWith('data:application/pdf')
                    ? <div className="doc-viewer-empty" style={{flexDirection:'column',gap:4}}><span style={{fontSize:24}}>📄</span><a href={docs[d.key]} download style={{color:'var(--accent)',fontSize:12}}>Download PDF</a></div>
                    : <img src={docs[d.key]} className="doc-viewer-img" alt={d.label} style={{cursor:'pointer'}} onClick={()=>window.open(docs[d.key],'_blank')} />)
                  : <div className="doc-viewer-empty">Not Uploaded</div>
                }
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  };

  return (
    <div className="content fade-in">
      {viewWorker && <ViewModal w={viewWorker} onClose={()=>setViewWorker(null)} />}
      {success && <div className="alert-banner alert-success">✅ {success}</div>}

      {/* Bank Ledger Modal */}
      {bankLedgerModal && <BankLedgerModal bank={bankLedgerModal.bank} worker={bankLedgerModal.worker} state={state} onClose={()=>setBankLedgerModal(null)} />}

      <div className="table-wrap">
        <div className="table-header">
          <div className="table-title">👥 Workers ({state.workers.length})</div>
          <div className="table-actions">
            <input className="search-input" placeholder="Search name / email / mobile / city..." value={search} onChange={e=>setSearch(e.target.value)} />
            <button className="btn btn-sm btn-primary" onClick={openAdd}>+ Add Worker</button>
          </div>
        </div>
        {filtered.length===0
          ? <div className="empty-state"><div className="empty-icon">👥</div><div className="empty-text">No workers yet.</div></div>
          : <table>
              <thead><tr><th>Worker</th><th>Mobile</th><th>City / Area</th><th>KYC</th><th>Balance</th><th>Last Login</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                {filtered.map(w=>(
                  <React.Fragment key={w.id}>
                  <tr>
                    <td>
                      <div className="flex-center">
                        <div className="avatar avatar-blue">{w.name[0]}</div>
                        <div><div className="fw-600">{w.name}</div><div className="text-sm">{w.email}</div></div>
                      </div>
                    </td>
                    <td className="text-mono">{w.mobile||'—'}</td>
                    <td className="text-sm">{[w.area,w.city].filter(Boolean).join(', ')||'—'}</td>
                    <td>
                      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                        <span className={`chip ${(w.docs?.aadharFront)?'chip-green':'chip-red'}`} style={{fontSize:9}}>AadF {(w.docs?.aadharFront)?'✓':'✗'}</span>
                        <span className={`chip ${(w.docs?.aadharBack)?'chip-green':'chip-red'}`} style={{fontSize:9}}>AadB {(w.docs?.aadharBack)?'✓':'✗'}</span>
                        <span className={`chip ${(w.docs?.pan)?'chip-green':'chip-red'}`} style={{fontSize:9}}>PAN {(w.docs?.pan)?'✓':'✗'}</span>
                      </div>
                    </td>
                    <td>
                      {(()=>{
                        const wBanks = (state.workerBanks||[]).filter(b=>b.workerId===w.id);
                        const wTxns  = (state.transactions||[]).filter(t=>t.workerId===w.id && !t.isPayment);
                        // Net inflow per bank = sum of net settlement amounts
                        const totalBal = wBanks.reduce((sum,b)=>{
                          const bTxns = wTxns.filter(t=>t.swipeBankId===b.id||(t.splitParts&&t.splitParts.some(p=>p.bankId===b.id)));
                          const inflow = bTxns.reduce((s,t)=>{
                            if(t.splitParts){const p=t.splitParts.find(p=>p.bankId===b.id);return s+(p?p.netAmt||p.amount:0);}
                            return s+(t.swipeNetAmt||t.amount);
                          },0);
                          // minus fund transfers out
                          const trfOut = (state.transfers||[]).filter(tr=>tr.bankId===b.id&&tr.workerId===w.id&&tr.direction==='bank_to_customer').reduce((s,tr)=>s+tr.amount,0);
                          const trfIn  = (state.transfers||[]).filter(tr=>tr.bankId===b.id&&tr.workerId===w.id&&tr.direction==='customer_to_bank').reduce((s,tr)=>s+tr.amount,0);
                          return sum + inflow + trfIn - trfOut;
                        },0);
                        return (
                          <div
                            onClick={()=>setBankDetailWorker(bankDetailWorker===w.id?null:w.id)}
                            style={{cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6,padding:'5px 10px',borderRadius:8,background:'rgba(16,185,129,0.1)',border:'1px solid rgba(16,185,129,0.2)',transition:'all 0.15s'}}
                          >
                            <span className="text-mono text-green fw-600" style={{fontSize:13}}>₹{totalBal.toLocaleString('en-IN',{maximumFractionDigits:0})}</span>
                            <span style={{fontSize:11,color:'var(--text3)'}}>{bankDetailWorker===w.id?'▲':'▼'}</span>
                          </div>
                        );
                      })()}
                    </td>
                    <td className="text-sm">{w.lastLogin||'Never'}</td>
                    <td><span className={`status-badge status-${w.status}`}>{w.status}</span></td>
                    <td>
                      <div className="action-btns">
                        <button className="btn btn-sm btn-outline" onClick={()=>setViewWorker(w)}>👁️ View</button>
                        <button className="btn btn-sm btn-outline" onClick={()=>openEdit(w)}>✏️ Edit</button>
                        <button className={`btn btn-sm ${w.status==='active'?'btn-danger':'btn-success'}`} onClick={()=>toggleStatus(w.id)}>
                          {w.status==='active'?'Deactivate':'Activate'}
                        </button>
                      </div>
                    </td>
                  </tr>
                  {bankDetailWorker===w.id && (()=>{
                    const wBanks = (state.workerBanks||[]).filter(b=>b.workerId===w.id);
                    const calcBal = b => {
                      const opening = parseFloat(b.openingBalance||0);
                      const bTxns = (state.transactions||[]).filter(t=>t.workerId===w.id&&!t.isPayment);
                      const inflow = bTxns.reduce((s,t)=>{ if(t.isBillPayment) return s; if(t.splitParts){const p=t.splitParts.find(p=>p.bankId===b.id);return s+(p?p.netAmt||p.amount:0);} if(t.swipeBankId===b.id) return s+(t.swipeNetAmt||t.amount); return s; },0);
                      const billOut = bTxns.reduce((s,t)=>{ if(!t.isBillPayment) return s; if(t.splitParts){const p=t.splitParts.find(p=>p.bankId===b.id);return s+(p?p.amount:0);} if(t.swipeBankId===b.id) return s+(t.amount+(parseFloat(t.extraCharge)||0)); return s; },0);
                      const trfIn  = (state.transfers||[]).filter(tr=>tr.bankId===b.id&&tr.workerId===w.id&&tr.direction==='customer_to_bank').reduce((s,tr)=>s+tr.amount,0);
                      const trfOut = (state.transfers||[]).filter(tr=>tr.bankId===b.id&&tr.workerId===w.id&&tr.direction==='bank_to_customer').reduce((s,tr)=>s+tr.amount,0);
                      return opening + inflow - billOut + trfIn - trfOut;
                    };
                    const totalBal = wBanks.reduce((s,b)=>s+calcBal(b),0);
                    return (
                      <tr>
                        <td colSpan={8} style={{padding:0,background:'rgba(16,185,129,0.03)'}}>
                          <div style={{padding:'12px 20px',borderTop:'1px solid rgba(16,185,129,0.15)'}}>
                            {wBanks.length===0
                              ? <div style={{fontSize:13,color:'var(--text3)',padding:'8px 0'}}>No bank accounts added yet.</div>
                              : <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
                                  {wBanks.map(b=>{
                                    const bal = calcBal(b);
                                    return (
                                      <div
                                        key={b.id}
                                        onClick={()=>setBankLedgerModal({bank:b,worker:w})}
                                        style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 16px',cursor:'pointer',transition:'all 0.2s',minWidth:150}}
                                        onMouseOver={e=>{e.currentTarget.style.borderColor='var(--green)';e.currentTarget.style.background='rgba(16,185,129,0.08)';}}
                                        onMouseOut={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--surface2)';}}
                                      >
                                        <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{b.name}</div>
                                        {b.account&&<div style={{fontSize:10,color:'var(--text3)',fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>****{b.account.slice(-4)}</div>}
                                        <div style={{fontSize:17,fontWeight:800,color:bal>=0?'var(--green)':'var(--red)',fontFamily:"'JetBrains Mono',monospace"}}>
                                          ₹{bal.toLocaleString('en-IN',{maximumFractionDigits:0})}
                                        </div>
                                        <div style={{fontSize:9,color:'var(--text3)',marginTop:3}}>tap for ledger →</div>
                                      </div>
                                    );
                                  })}
                                </div>
                            }
                          </div>
                        </td>
                      </tr>
                    );
                  })()}
                  </React.Fragment>
                ))}
              </tbody>
            </table>
        }
      </div>

      {/* ── Add / Edit Modal ─────────────────────────────────────────────── */}
      {showModal && <div className="modal-overlay" onClick={()=>setShowModal(false)}>
        <div className="modal modal-lg" style={{maxWidth:660}} onClick={e=>e.stopPropagation()}>
          <div className="modal-title">{editWorker?'✏️ Edit Worker':'Add New Worker'}</div>
          <div className="modal-sub">{editWorker?'Update details. Leave password blank to keep existing.':'Fill all required fields to create worker account.'}</div>

          {editWorker && (
            <div style={{background:'rgba(59,130,246,0.07)',border:'1px solid rgba(59,130,246,0.2)',borderRadius:10,padding:'10px 14px',marginBottom:16,display:'flex',gap:10,alignItems:'center'}}>
              <div className="avatar avatar-blue">{editWorker.name[0]}</div>
              <div><div style={{fontWeight:700,fontSize:13}}>{editWorker.name}</div><div style={{fontSize:11,color:'var(--text3)'}}>ID: {editWorker.id} | Status: <span style={{color:editWorker.status==='active'?'var(--green)':'var(--red)',fontWeight:600}}>{editWorker.status}</span></div></div>
            </div>
          )}

          {/* ── Personal Info ─── */}
          <div style={{fontSize:12,fontWeight:700,color:'var(--accent)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10}}>Personal Information</div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Full Name *</label><input className="form-input" placeholder="Full Name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} /></div>
            <div className="form-group"><label className="form-label">Mobile Number *</label><input className="form-input text-mono" placeholder="10-digit mobile" value={form.mobile} onChange={e=>setForm({...form,mobile:e.target.value})} /></div>
          </div>
          <div className="form-group"><label className="form-label">Email Address *</label><input className="form-input" placeholder="worker@email.com" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} /></div>

          {/* ── Address ─── */}
          <div style={{fontSize:12,fontWeight:700,color:'var(--accent)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10,marginTop:8}}>Address Details</div>
          <div className="form-group"><label className="form-label">Full Address</label><input className="form-input" placeholder="Street / Flat / Building" value={form.address} onChange={e=>setForm({...form,address:e.target.value})} /></div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Area / Locality</label><input className="form-input" placeholder="e.g. Adajan, Vesu" value={form.area} onChange={e=>setForm({...form,area:e.target.value})} /></div>
            <div className="form-group"><label className="form-label">City *</label><input className="form-input" placeholder="e.g. Surat" value={form.city} onChange={e=>setForm({...form,city:e.target.value})} /></div>
          </div>
          <div className="form-group">
            <label className="form-label">Google Maps URL</label>
            <input className="form-input" placeholder="https://maps.google.com/..." value={form.mapUrl} onChange={e=>setForm({...form,mapUrl:e.target.value})} />
            <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>Paste Google Maps share link for exact location</div>
          </div>

          {/* ── Password ─── */}
          <div style={{fontSize:12,fontWeight:700,color:'var(--accent)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10,marginTop:8}}>Login Credentials</div>
          <div className="form-group">
            <label className="form-label">{editWorker?'New Password (leave blank to keep current)':'Password *'}</label>
            <div style={{position:'relative'}}>
              <input className="form-input" type={showPass?'text':'password'} placeholder={editWorker?'Enter new password to change...':'Set password'} value={form.password} onChange={e=>setForm({...form,password:e.target.value})} style={{paddingRight:44}} />
              <span onClick={()=>setShowPass(!showPass)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',cursor:'pointer',fontSize:16,color:'var(--text3)',userSelect:'none'}}>{showPass?'🙈':'👁️'}</span>
            </div>
            {editWorker && <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>Blank = no change.</div>}
          </div>

          {/* ── KYC Documents ─── */}
          <div style={{fontSize:12,fontWeight:700,color:'var(--accent)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6,marginTop:8}}>
            KYC Documents {!editWorker && <span style={{color:'var(--red)',fontWeight:600}}>— All 3 mandatory</span>}
          </div>
          <div className="doc-upload-grid">
            <DocUploadBox label="Aadhar Card – Front" docKey="aadharFront" docs={form.docs} onUpload={handleDocUpload} onRemove={handleDocRemove} />
            <DocUploadBox label="Aadhar Card – Back"  docKey="aadharBack"  docs={form.docs} onUpload={handleDocUpload} onRemove={handleDocRemove} />
            <DocUploadBox label="PAN Card"             docKey="pan"         docs={form.docs} onUpload={handleDocUpload} onRemove={handleDocRemove} />
          </div>
          <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
            {[{k:'aadharFront',l:'Aadhar Front'},{k:'aadharBack',l:'Aadhar Back'},{k:'pan',l:'PAN Card'}].map(d=>(
              <span key={d.k} className={`chip ${form.docs[d.k]?'chip-green':'chip-red'}`} style={{fontSize:11}}>{d.l}: {form.docs[d.k]?'✓ Ready':'✗ Missing'}</span>
            ))}
          </div>

          <div className="modal-footer">
            <button className="btn btn-secondary" onClick={()=>setShowModal(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={save}>{editWorker?'Save Changes':'Create Worker'}</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

function AllTransactionsPage({ state, user }) {
  // user prop is passed for worker view (filter by workerId); null/undefined = admin (all)
  const isWorkerView = !!user;

  const today = new Date().toISOString().slice(0,10);
  const thisMonth = today.slice(0,7);

  // ── filters state ─────────────────────────────────────────────────────────
  const [search,       setSearch]      = useState('');
  const [fromDate,     setFrom]        = useState('');
  const [toDate,       setTo]          = useState('');
  const [typeFilter,   setType]        = useState('all');   // all | swipe | bill | payment
  const [workerFilter, setWorkerF]     = useState('all');   // admin only
  const [statusFilter, setStatus]      = useState('all');   // all | success | pending | failed
  const [quickDate,    setQuickDate]   = useState('all');   // all | today | week | month
  const [sortBy,       setSort]        = useState('date_desc');
  const [page,         setPage]        = useState(1);
  const PER_PAGE = 25;

  // Apply quick date preset
  function applyQuick(q) {
    setQuickDate(q);
    setPage(1);
    if (q==='today')  { setFrom(today); setTo(today); }
    else if (q==='week') {
      const d = new Date(); d.setDate(d.getDate()-6);
      setFrom(d.toISOString().slice(0,10)); setTo(today);
    }
    else if (q==='month') { setFrom(thisMonth+'-01'); setTo(today); }
    else { setFrom(''); setTo(''); }
  }

  // ── base pool ─────────────────────────────────────────────────────────────
  const baseTxns = isWorkerView
    ? state.transactions.filter(t=>t.workerId===user.id)
    : state.transactions;

  // ── filter ────────────────────────────────────────────────────────────────
  const q = search.trim().toLowerCase();
  const filtered = baseTxns.filter(t=>{
    const cust  = state.customers.find(c=>c.id===t.customerId);
    const wrkr  = state.workers.find(w=>w.id===t.workerId);
    const card  = state.cards.find(k=>k.id===t.cardId);

    // Search
    if (q) {
      const hay = [
        t.txnRef, cust?.name, cust?.mobile, wrkr?.name,
        card?.last4, (card?.cardNumber||'').slice(-4),
        t.date, t.billMonth, t.notes
      ].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    // Date range
    if (fromDate && t.date < fromDate) return false;
    if (toDate   && t.date > toDate)   return false;
    // Type
    if (typeFilter==='swipe'   && (t.isBillPayment||t.isPayment||t.isManualEntry)) return false;
    if (typeFilter==='bill'    && !t.isBillPayment) return false;
    if (typeFilter==='payment' && !t.isPayment)     return false;
    // Worker (admin only)
    if (!isWorkerView && workerFilter!=='all' && t.workerId!==workerFilter) return false;
    // Status
    if (statusFilter!=='all' && (t.status||'success')!==statusFilter) return false;
    return true;
  });

  // ── sort ──────────────────────────────────────────────────────────────────
  const sorted = [...filtered].sort((a,b)=>{
    if (sortBy==='date_desc') return b.date>a.date?1:-1;
    if (sortBy==='date_asc')  return a.date>b.date?1:-1;
    if (sortBy==='amt_desc')  return b.amount-a.amount;
    if (sortBy==='amt_asc')   return a.amount-b.amount;
    return 0;
  });

  // ── pagination ────────────────────────────────────────────────────────────
  const totalPages = Math.ceil(sorted.length / PER_PAGE);
  const paginated  = sorted.slice((page-1)*PER_PAGE, page*PER_PAGE);

  // ── summary stats ─────────────────────────────────────────────────────────
  const swipeTxns   = filtered.filter(t=>!t.isBillPayment&&!t.isPayment);
  const billTxns    = filtered.filter(t=>t.isBillPayment);
  const payTxns     = filtered.filter(t=>t.isPayment);
  const totalVolume = swipeTxns.reduce((s,t)=>s+t.amount,0);
  const totalBill   = billTxns.reduce((s,t)=>s+t.amount,0);
  const totalPaid   = payTxns.reduce((s,t)=>s+t.amount,0);
  const totalCharge = swipeTxns.reduce((s,t)=>s+(t.amount*(t.serviceChargePct||0)/100)+(parseFloat(t.extraCharge)||0),0);
  const totalMdr    = swipeTxns.reduce((s,t)=>s+(t.swipeMdrAmt||0),0);
  const netProfit   = totalCharge - totalMdr;

  function resetFilters() {
    setSearch(''); setFrom(''); setTo('');
    setType('all'); setWorkerF('all'); setStatus('all');
    setQuickDate('all'); setSort('date_desc'); setPage(1);
  }
  const hasFilters = search||fromDate||toDate||typeFilter!=='all'||workerFilter!=='all'||statusFilter!=='all'||quickDate!=='all';

  return (
    <div className="content fade-in">

      {/* ── Summary Stats ───────────────────────────────────────────────── */}
      <div className="stats-grid" style={{marginBottom:20}}>
        <div className="stat-card green">
          <div className="stat-icon">💰</div>
          <div className="stat-label">Swipe Volume</div>
          <div className="stat-value mono" style={{fontSize:17}}>₹{totalVolume.toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
          <div className="stat-sub">{swipeTxns.length} swipe transactions</div>
        </div>
        <div className="stat-card red">
          <div className="stat-icon">🧾</div>
          <div className="stat-label">Bill Payments</div>
          <div className="stat-value mono" style={{fontSize:17}}>₹{totalBill.toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
          <div className="stat-sub">{billTxns.length} records</div>
        </div>
      </div>

      {/* ── Filter Panel ────────────────────────────────────────────────── */}
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,padding:'16px 20px',marginBottom:20}}>

        {/* Row 1: Search + Quick dates */}
        <div style={{display:'flex',gap:10,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
          <div style={{flex:1,minWidth:200,position:'relative'}}>
            <input className="form-input" style={{paddingLeft:36,fontSize:13}} placeholder="Search: name, mobile, ref, card last4, notes..." value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} />
            <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',fontSize:14,opacity:0.4}}>🔍</span>
          </div>
          <div style={{display:'flex',gap:4}}>
            {[{id:'all',label:'All Time'},{id:'today',label:'Today'},{id:'week',label:'7 Days'},{id:'month',label:'This Month'}].map(q=>(
              <button key={q.id} onClick={()=>applyQuick(q.id)} style={{padding:'8px 12px',border:`1px solid ${quickDate===q.id?'var(--accent)':'var(--border)'}`,borderRadius:8,background:quickDate===q.id?'rgba(59,130,246,0.15)':'transparent',color:quickDate===q.id?'var(--accent)':'var(--text2)',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:"'Sora',sans-serif",whiteSpace:'nowrap'}}>
                {q.label}
              </button>
            ))}
          </div>
        </div>

        {/* Row 2: Date range + Type + Worker + Status + Sort */}
        <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end'}}>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input type="date" className="form-input" style={{width:140,fontSize:12}} value={fromDate} onChange={e=>{setFrom(e.target.value);setQuickDate('custom');setPage(1);}} />
            <span style={{color:'var(--text3)',fontSize:12}}>to</span>
            <input type="date" className="form-input" style={{width:140,fontSize:12}} value={toDate} onChange={e=>{setTo(e.target.value);setQuickDate('custom');setPage(1);}} />
          </div>

          {/* Type */}
          <div style={{display:'flex',gap:4}}>
            {[{id:'all',label:'All Types'},{id:'swipe',label:'💳 Swipe'},{id:'bill',label:'🧾 Bill'},{id:'payment',label:'✅ Payment'}].map(f=>(

            <option value="date_asc">Date: Oldest First</option>
            <option value="amt_desc">Amount: High to Low</option>
            <option value="amt_asc">Amount: Low to High</option>

          {hasFilters && <button className="btn btn-sm btn-outline" onClick={resetFilters} style={{whiteSpace:'nowrap',fontSize:11}}>✕ Reset</button>}
        </div>

        {/* Active filter summary */}
        {hasFilters && (
          <div style={{marginTop:10,fontSize:11,color:'var(--text3)',display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
            <span>Active filters:</span>
            {search && <span style={{padding:'2px 8px',background:'rgba(59,130,246,0.12)',borderRadius:10,color:'var(--accent)'}}>🔍 "{search}"</span>}
            {(fromDate||toDate) && <span style={{padding:'2px 8px',background:'rgba(59,130,246,0.12)',borderRadius:10,color:'var(--accent)'}}>📅 {fromDate||'...'} → {toDate||'...'}</span>}
            {typeFilter!=='all' && <span style={{padding:'2px 8px',background:'rgba(59,130,246,0.12)',borderRadius:10,color:'var(--accent)'}}>Type: {typeFilter}</span>}
            {workerFilter!=='all' && <span style={{padding:'2px 8px',background:'rgba(59,130,246,0.12)',borderRadius:10,color:'var(--accent)'}}>Worker: {state.workers.find(w=>w.id===workerFilter)?.name}</span>}
            {statusFilter!=='all' && <span style={{padding:'2px 8px',background:'rgba(59,130,246,0.12)',borderRadius:10,color:'var(--accent)'}}>Status: {statusFilter}</span>}
            <span style={{marginLeft:'auto',fontWeight:700,color:'var(--text2)'}}>{filtered.length} results</span>
          </div>
        )}
      </div>

      {/* ── Table ────────────────────────────────────────────────────────── */}
      <div className="table-wrap">
        <div className="table-header">
          <div className="table-title">💱 Transactions ({filtered.length}){totalPages>1&&<span style={{fontSize:11,color:'var(--text3)',fontWeight:400,marginLeft:8}}>Page {page}/{totalPages}</span>}</div>
          <div style={{fontSize:11,color:'var(--text3)'}}>Showing {(page-1)*PER_PAGE+1}–{Math.min(page*PER_PAGE,filtered.length)} of {filtered.length}</div>
        </div>

        {filtered.length===0
          ? <div className="empty-state"><div className="empty-icon">💱</div><div className="empty-text">No transactions match the selected filters.</div></div>
          : <>
              <div style={{overflowX:'auto'}}>
                <table style={{minWidth:900}}>
                  <thead>
                    <tr>
                      <th style={{cursor:'pointer'}} onClick={()=>setSort(s=>s==='date_desc'?'date_asc':'date_desc')}>Date {sortBy.startsWith('date')?sortBy==='date_desc'?'↓':'↑':''}</th>
                      <th>Ref</th>
                      <th>Customer</th>
                      {!isWorkerView && <th>Worker</th>}
                      <th>Card</th>
                      <th>Bank</th>
                      <th style={{cursor:'pointer'}} onClick={()=>setSort(s=>s==='amt_desc'?'amt_asc':'amt_desc')}>Amount {sortBy.startsWith('amt')?sortBy==='amt_desc'?'↓':'↑':''}</th>
                      <th>Svc Charge</th>
                      <th>MDR</th>
                      <th>Total Debit</th>
                      <th>Bill Month</th>
                      <th>Bank Used</th>
                      <th>Type</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    {paginated.map(t=>{
                      const cust  = state.customers.find(x=>x.id===t.customerId);
                      const wrkr  = state.workers.find(x=>x.id===t.workerId);
                      const card  = state.cards.find(x=>x.id===t.cardId);
                      const bank  = (state.workerBanks||[]).find(b=>b.id===t.swipeBankId);
                      const sc    = t.isBillPayment ? 0 : (t.amount*(t.serviceChargePct||0)/100)+(parseFloat(t.extraCharge)||0);
                      const total = t.amount + (t.isBillPayment?parseFloat(t.extraCharge||0):sc);
                      const mdr   = t.swipeMdrAmt||0;
                      const raw   = (card?.cardNumber||'').replace(/\s/g,'');
                      const cardDisplay = raw.length>=10 ? raw.slice(0,4)+' **** **** '+raw.slice(-4) : (card?'**** **** **** '+card.last4:'—');
                      const txnType = t.isPayment?'payment':t.isBillPayment?'bill':'swipe';
                      return (
                        <tr key={t.id} style={{background:t.isPayment?'rgba(16,185,129,0.03)':t.isBillPayment?'rgba(239,68,68,0.03)':undefined}}>
                          <td className="text-sm">{t.date}</td>
                          <td className="text-mono text-accent" style={{fontSize:10,whiteSpace:'nowrap'}}>{t.txnRef||'—'}</td>
                          <td>
                            <div className="fw-600" style={{fontSize:13}}>{cust?.name||'—'}</div>
                            <div className="text-mono text-sm">{cust?.mobile||''}</div>
                          </td>
                          {!isWorkerView && <td><span className="chip chip-blue" style={{fontSize:10}}>{wrkr?.name||'—'}</span></td>}
                          <td className="text-mono" style={{fontSize:11,letterSpacing:'0.08em',color:'var(--accent)',whiteSpace:'nowrap'}}>{cardDisplay}</td>
                          <td style={{fontSize:12}}>{card?.bank||'—'}</td>
                          <td className="debit-col fw-600" style={{whiteSpace:'nowrap',textAlign:'right'}}>₹{t.amount.toLocaleString('en-IN',{maximumFractionDigits:0})}</td>
                          <td className="credit-col" style={{fontSize:12,textAlign:'right'}}>{sc>0?'₹'+sc.toLocaleString('en-IN',{maximumFractionDigits:0}):'—'}</td>
                          <td className="debit-col" style={{fontSize:12,textAlign:'right'}}>{mdr>0?'₹'+mdr.toFixed(0):'—'}</td>
                          <td className="debit-col fw-600" style={{whiteSpace:'nowrap',textAlign:'right'}}>₹{total.toLocaleString('en-IN',{maximumFractionDigits:0})}</td>
                          <td style={{fontSize:12,color:'var(--text2)'}}>{t.billMonth||'—'}</td>
                          <td style={{fontSize:12}}>{bank?.name||t.swipeBankName||'—'}</td>
                          <td>
                            <span className={`chip ${txnType==='payment'?'chip-green':txnType==='bill'?'chip-red':'chip-blue'}`} style={{fontSize:10,whiteSpace:'nowrap'}}>
                              {txnType==='payment'?'✅ Payment':txnType==='bill'?'🧾 Bill':'💳 Swipe'}
                            </span>
                          </td>
                          <td>
                            <span className={`status-badge ${(t.status||'success')==='success'?'status-success':(t.status)==='pending'?'status-pending':'status-fraud'}`} style={{fontSize:10}}>
                              {t.status||'success'}
                            </span>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>

              {/* Pagination */}
              {totalPages>1 && (
                <div style={{padding:'14px 20px',borderTop:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,flexWrap:'wrap'}}>
                  <div style={{fontSize:12,color:'var(--text3)'}}>
                    Showing <strong style={{color:'var(--text)'}}>{(page-1)*PER_PAGE+1}–{Math.min(page*PER_PAGE,filtered.length)}</strong> of <strong style={{color:'var(--text)'}}>{filtered.length}</strong>
                  </div>
                  <div style={{display:'flex',gap:4,alignItems:'center'}}>
                    <button onClick={()=>setPage(1)} disabled={page===1} style={{padding:'5px 9px',border:'1px solid var(--border)',borderRadius:6,background:'transparent',color:page===1?'var(--text3)':'var(--text)',cursor:page===1?'default':'pointer',fontSize:12,fontFamily:"'Sora',sans-serif"}}>«</button>
                    <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1} style={{padding:'5px 10px',border:'1px solid var(--border)',borderRadius:6,background:'transparent',color:page===1?'var(--text3)':'var(--text)',cursor:page===1?'default':'pointer',fontSize:12,fontFamily:"'Sora',sans-serif"}}>‹ Prev</button>
                    {Array.from({length:Math.min(5,totalPages)},(_,i)=>{
                      let p; if(totalPages<=5) p=i+1; else if(page<=3) p=i+1; else if(page>=totalPages-2) p=totalPages-4+i; else p=page-2+i;
                      return <button key={p} onClick={()=>setPage(p)} style={{padding:'5px 10px',border:`1px solid ${page===p?'var(--accent)':'var(--border)'}`,borderRadius:6,background:page===p?'rgba(59,130,246,0.15)':'transparent',color:page===p?'var(--accent)':'var(--text)',cursor:'pointer',fontSize:12,fontWeight:page===p?700:400,fontFamily:"'Sora',sans-serif"}}>{p}</button>;
                    })}
                    <button onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={page===totalPages} style={{padding:'5px 10px',border:'1px solid var(--border)',borderRadius:6,background:'transparent',color:page===totalPages?'var(--text3)':'var(--text)',cursor:page===totalPages?'default':'pointer',fontSize:12,fontFamily:"'Sora',sans-serif"}}>Next ›</button>
                    <button onClick={()=>setPage(totalPages)} disabled={page===totalPages} style={{padding:'5px 9px',border:'1px solid var(--border)',borderRadius:6,background:'transparent',color:page===totalPages?'var(--text3)':'var(--text)',cursor:page===totalPages?'default':'pointer',fontSize:12,fontFamily:"'Sora',sans-serif"}}>»</button>
                  </div>
                </div>
              )}
            </>
        }
      </div>
    </div>
  );
}
