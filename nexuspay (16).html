                                    <td style={{padding:'10px 14px'}}>
                                      <div className="flex-center">
                                        <div className="avatar avatar-green" style={{width:28,height:28,fontSize:12}}>{c.name[0]}</div>
                                        <div><div style={{fontWeight:600,fontSize:13}}>{c.name}</div><div style={{fontSize:10,color:'var(--text3)'}}>{c.remarks||''}</div></div>
                                      </div>
                                    </td>
                                    <td style={{padding:'10px 14px',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>{c.mobile}</td>
                                    <td style={{padding:'10px 14px',fontSize:12,fontWeight:600}}>{c.ref||'—'}</td>
                                    <td style={{padding:'10px 14px',fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:'var(--text3)'}}>{c.refNumber||'—'}</td>
                                    <td style={{padding:'10px 14px',fontSize:11,color:'var(--text3)'}}>{c.address||'—'}</td>
                                    <td style={{padding:'10px 14px'}}>
                                      <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
                                        <span className={`chip ${c.docs?.aadharFront?'chip-green':'chip-red'}`} style={{fontSize:8}}>AadF{c.docs?.aadharFront?'✓':'✗'}</span>
                                        <span className={`chip ${c.docs?.aadharBack?'chip-green':'chip-red'}`} style={{fontSize:8}}>AadB{c.docs?.aadharBack?'✓':'✗'}</span>
                                        <span className={`chip ${c.docs?.pan?'chip-green':'chip-red'}`} style={{fontSize:8}}>PAN{c.docs?.pan?'✓':'✗'}</span>
                                      </div>
                                      <button className="btn btn-sm btn-outline" style={{fontSize:9,padding:'2px 7px',marginTop:4}} onClick={()=>setViewKycCust(c)}>👁️ View KYC</button>
                                    </td>
                                    <td style={{padding:'10px 14px'}}>
                                      {(()=>{
                                        const custCards = state.cards.filter(k=>k.customerId===c.id);
                                        return custCards.length===0
                                          ? <span style={{fontSize:12,color:'var(--text3)'}}>0 cards</span>
                                          : <span
                                              onClick={()=>setCardDetailCust(c)}
                                              style={{cursor:'pointer',display:'inline-flex',alignItems:'center',gap:5,padding:'3px 9px',borderRadius:8,background:'rgba(59,130,246,0.1)',border:'1px solid rgba(59,130,246,0.25)',color:'var(--accent)',fontSize:12,fontWeight:700,transition:'all 0.15s'}}
                                            >
                                              💳 {custCards.length} {custCards.length===1?'card':'cards'}
                                            </span>;
                                      })()}
                                    </td>
                                    <td style={{padding:'10px 14px'}}>
                                      <span className={`status-badge status-${c.status==='blocked'?'fraud':c.status}`}>{c.status}</span>
                                      {c.inactiveReason && <div style={{fontSize:9,color:'var(--red)',marginTop:2}}>⚠️ {c.inactiveReason}</div>}
                                    </td>
                                    <td style={{padding:'10px 14px'}}>
                                      {c.status!=='blocked'
                                        ?<button className="btn btn-sm btn-danger" style={{fontSize:10,padding:'3px 8px'}} onClick={()=>{const r=window.prompt('Reason:','');if(r===null)return;dispatch({type:'BLOCK_CUSTOMER',payload:{id:c.id,reason:r||'Blocked by Admin',date:new Date().toISOString().slice(0,10),by:'Admin'}});}}>Block</button>
                                        :<button className="btn btn-sm btn-success" style={{fontSize:10,padding:'3px 8px'}} onClick={()=>dispatch({type:'UNBLOCK_CUSTOMER',payload:c.id})}>Unblock</button>
                                      }
                                    </td>
                                  </tr>
                                );
                              })}
                            </tbody>
                          </table>
                        </>
                    }
                  </div>
                )}
              </div>
            );
          })}

          {/* Unassigned customers */}
          {orphanCusts.length>0 && (
            <div style={{background:'var(--surface)',border:'1px solid rgba(245,158,11,0.3)',borderRadius:14,overflow:'hidden'}}>
              <div style={{padding:'14px 20px',background:'rgba(245,158,11,0.06)',display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:18}}>⚠️</span>
                <div style={{fontWeight:700}}>Unassigned Customers ({orphanCusts.length})</div>
                <div style={{fontSize:12,color:'var(--text3)'}}>— No worker assigned</div>
              </div>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr>{['Customer','Mobile','Address','Status'].map(h=><th key={h} style={{padding:'8px 14px',fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',borderBottom:'1px solid var(--border)',textAlign:'left'}}>{h}</th>)}</tr></thead>
                <tbody>
                  {orphanCusts.map(c=><tr key={c.id} style={{borderBottom:'1px solid rgba(37,43,56,0.4)'}}>
                    <td style={{padding:'10px 14px'}}><div className="fw-600" style={{fontSize:13}}>{c.name}</div></td>
                    <td style={{padding:'10px 14px',fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>{c.mobile}</td>
                    <td style={{padding:'10px 14px',fontSize:11,color:'var(--text3)'}}>{c.address||'—'}</td>
                    <td style={{padding:'10px 14px'}}><span className={`status-badge status-${c.status==='blocked'?'fraud':c.status}`}>{c.status}</span></td>
                  </tr>)}
                </tbody>
              </table>
            </div>
          )}

          {state.workers.length===0 && state.customers.length===0 && (
            <div className="empty-state"><div className="empty-icon">🗂️</div><div className="empty-text">No workers or customers yet.</div></div>
          )}
        </div>
      )}
    </div>
  );
}

function AdminSearchPage({ state }) {
  const [query, setQuery] = useState('');
  const [searched, setSearched] = useState(false);
  const [filterType, setFilterType] = useState('all');

  const q = query.trim().toLowerCase();
  const qDigits = q.replace(/\D/g, '');

  function highlight(text, q) {
    if (!q || !text) return text;
    const idx = text.toLowerCase().indexOf(q.toLowerCase());
    if (idx < 0) return text;
    return (
      <span>
        {text.slice(0, idx)}
        <mark style={{background:'rgba(59,130,246,0.35)',color:'var(--text)',borderRadius:3,padding:'0 2px'}}>{text.slice(idx, idx+q.length)}</mark>
        {text.slice(idx+q.length)}
      </span>
    );
  }

  // ── Match Workers ──────────────────────────────────────────────────────────
  const matchWorkers = q ? state.workers.filter(w =>
    (w.name||'').toLowerCase().includes(q) ||
    (w.mobile||'').includes(q) ||
    (w.email||'').toLowerCase().includes(q) ||
    (w.area||'').toLowerCase().includes(q) ||
    (w.city||'').toLowerCase().includes(q)
  ) : [];

  // ── Match Customers ────────────────────────────────────────────────────────
  const matchCusts = q ? state.customers.filter(c => {
    // name, mobile, email
    if ((c.name||'').toLowerCase().includes(q)) return true;
    if ((c.mobile||'').includes(q)) return true;
    if ((c.email||'').toLowerCase().includes(q)) return true;
    // aadhaar — stored in doc filename or aadharNumber field
    if ((c.aadharNumber||'').replace(/\s/g,'').includes(qDigits)) return true;
    // PAN
    if ((c.panNumber||'').toLowerCase().includes(q)) return true;
    // reference
    if ((c.ref||'').toLowerCase().includes(q)) return true;
    if ((c.refNumber||'').includes(q)) return true;
    return false;
  }) : [];

  // ── Match Cards ────────────────────────────────────────────────────────────
  const matchCards = q ? state.cards.filter(k => {
    const raw = (k.cardNumber||'').replace(/\s/g,'');
    // 16-digit full match
    if (qDigits.length >= 4 && raw.includes(qDigits)) return true;
    // last 4
    if (qDigits.length === 4 && (k.last4||'') === qDigits) return true;
    // holder name
    if ((k.holder||'').toLowerCase().includes(q)) return true;
    // bank name
    if ((k.bank||'').toLowerCase().includes(q)) return true;
    return false;
  }) : [];

  // ── Match Transactions ─────────────────────────────────────────────────────
  const matchTxns = q ? state.transactions.filter(t => {
    const cust = state.customers.find(c => c.id === t.customerId);
    const card = state.cards.find(k => k.id === t.cardId);
    if ((t.txnRef||'').toLowerCase().includes(q)) return true;
    if ((cust?.name||'').toLowerCase().includes(q)) return true;
    if ((cust?.mobile||'').includes(q)) return true;
    if (qDigits.length >= 4 && (card?.cardNumber||'').replace(/\s/g,'').includes(qDigits)) return true;
    if (qDigits.length === 4 && (card?.last4||'') === qDigits) return true;
    return false;
  }) : [];

  const filterCounts = {
    all: matchWorkers.length + matchCusts.length + matchCards.length + matchTxns.length,
    workers: matchWorkers.length,
    customers: matchCusts.length,
    cards: matchCards.length,
    transactions: matchTxns.length,
  };
  const totalResults = filterCounts.all;

  function getQueryHint() {
    if (!q) return '';
    if (/^\d{16}$/.test(qDigits)) return '💳 16-digit Card Number';
    if (/^\d{12}$/.test(qDigits)) return '🪪 Aadhaar Number';
    if (/^\d{10}$/.test(q)) return '📱 Mobile Number';
    if (/^\d{4}$/.test(q)) return '💳 Card Last 4 Digits';
    if (/^[A-Z]{5}[0-9]{4}[A-Z]$/i.test(q)) return '📋 PAN Card';
    if (/^[A-Za-z0-9._%+-]+@/.test(q)) return '📧 Email Address';
    if (/^TXN|^BILL|^PAY/i.test(q)) return '💱 Transaction Ref';
    return '🔤 Name / Keyword';
  }

  const showWorkers   = (filterType==='all'||filterType==='workers')   && matchWorkers.length>0;
  const showCusts     = (filterType==='all'||filterType==='customers') && matchCusts.length>0;
  const showCards     = (filterType==='all'||filterType==='cards')     && matchCards.length>0;
  const showTxns      = (filterType==='all'||filterType==='transactions') && matchTxns.length>0;

  return (
    <div className="content fade-in">
      {/* ── Search Bar ───────────────────────────────────────────────────── */}
      <div style={{maxWidth:720,margin:'0 auto 24px'}}>
        <div style={{textAlign:'center',marginBottom:18}}>
          <div style={{fontSize:30,marginBottom:6}}>🔎</div>
          <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>Search & Track</div>
          <div style={{fontSize:13,color:'var(--text3)'}}>Search across all workers, customers, cards & transactions</div>
        </div>

        {/* Search input */}
        <div style={{display:'flex',gap:10,marginBottom:10}}>
          <div style={{flex:1,position:'relative'}}>
            <input
              className="form-input"
              style={{paddingLeft:46,fontSize:15,height:52,borderRadius:14,border:'1px solid var(--border2)'}}
              placeholder="Name / Mobile / Email / Aadhaar / PAN / Card No..."
              value={query}
              onChange={e=>{ setQuery(e.target.value); setSearched(false); }}
              onKeyDown={e=>e.key==='Enter'&&(setSearched(true))}
              autoFocus
            />
            <span style={{position:'absolute',left:15,top:'50%',transform:'translateY(-50%)',fontSize:19,opacity:0.5}}>🔎</span>
            {query && <span onClick={()=>{setQuery('');setSearched(false);setFilterType('all');}} style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',cursor:'pointer',fontSize:16,color:'var(--text3)',padding:'4px'}}>✕</span>}
          </div>
          <button className="btn btn-primary" style={{width:'auto',padding:'0 28px',borderRadius:12,fontSize:14,fontWeight:700}} onClick={()=>setSearched(true)}>Search</button>
        </div>

        {/* Search type hint */}
        {query && (
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:12,color:'var(--text3)',padding:'0 4px'}}>
            <span>Searching as: <span style={{color:'var(--accent)',fontWeight:600}}>{getQueryHint()}</span></span>
            {searched && <span style={{color:totalResults>0?'var(--green)':'var(--red)',fontWeight:600}}>{totalResults>0?totalResults+' results found':'No results found'}</span>}
          </div>
        )}

        {/* Search category chips */}
        {!query && (
          <div style={{marginTop:14}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10,textAlign:'center'}}>Search By</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}}>
              {[
                {icon:'👤',label:'Customer Name',ex:'Suresh Patel'},
                {icon:'📱',label:'Mobile Number',ex:'9876543210'},
                {icon:'📧',label:'Email Address',ex:'worker@email.com'},
                {icon:'🪪',label:'Aadhaar Number',ex:'1234 5678 9012'},
                {icon:'📋',label:'PAN Card',ex:'ABCDE1234F'},
                {icon:'💳',label:'Card Number',ex:'4532 **** **** 4521'},
              ].map(h=>(
                <div key={h.label} style={{padding:'8px 14px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:10,fontSize:12,cursor:'pointer',transition:'all 0.2s',textAlign:'center',minWidth:130}} onClick={()=>setQuery(h.ex)} onMouseOver={e=>e.currentTarget.style.borderColor='var(--accent)'} onMouseOut={e=>e.currentTarget.style.borderColor='var(--border)'}>
                  <div style={{fontSize:18,marginBottom:3}}>{h.icon}</div>
                  <div style={{fontWeight:600,color:'var(--text2)'}}>{h.label}</div>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>{h.ex}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* ── Filter Tabs ──────────────────────────────────────────────────── */}
      {searched && totalResults>0 && (
        <div style={{display:'flex',gap:6,marginBottom:20,flexWrap:'wrap'}}>
          {[
            {id:'all',label:'All',count:filterCounts.all,icon:'🔎'},
            {id:'workers',label:'Workers',count:filterCounts.workers,icon:'👥'},
            {id:'customers',label:'Customers',count:filterCounts.customers,icon:'👤'},
            {id:'cards',label:'Cards',count:filterCounts.cards,icon:'💳'},
            {id:'transactions',label:'Transactions',count:filterCounts.transactions,icon:'💱'},
          ].filter(f=>f.id==='all'||f.count>0).map(f=>(
            <button key={f.id} onClick={()=>setFilterType(f.id)} style={{padding:'7px 14px',border:`1px solid ${filterType===f.id?'var(--accent)':'var(--border)'}`,borderRadius:20,background:filterType===f.id?'rgba(59,130,246,0.15)':'var(--surface)',color:filterType===f.id?'var(--accent)':'var(--text2)',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:"'Sora',sans-serif",display:'flex',gap:6,alignItems:'center'}}>
              <span>{f.icon}</span>
              <span>{f.label}</span>
              <span style={{background:filterType===f.id?'var(--accent)':'var(--border2)',color:filterType===f.id?'#fff':'var(--text3)',borderRadius:10,padding:'1px 6px',fontSize:10,fontWeight:700}}>{f.count}</span>
            </button>
          ))}
        </div>
      )}

      {/* ── No results ───────────────────────────────────────────────────── */}
      {searched && totalResults===0 && (
        <div className="empty-state">
          <div className="empty-icon">🔍</div>
          <div className="empty-text">No records found for "{query}"</div>
          <div style={{fontSize:12,color:'var(--text3)',marginTop:8}}>Try: full name, 10-digit mobile, email, 12-digit aadhaar, PAN (ABCDE1234F), or 16-digit card number</div>
        </div>
      )}

      {searched && totalResults>0 && (
        <div style={{display:'flex',flexDirection:'column',gap:20}}>

          {/* ── Workers ──────────────────────────────────────────────────── */}
          {showWorkers && (
            <div className="table-wrap">
              <div className="table-header">
                <div className="table-title">👥 Workers ({matchWorkers.length})</div>
              </div>
              <table>
                <thead><tr><th>Worker</th><th>Mobile</th><th>Email</th><th>Area / City</th><th>Status</th><th>Customers</th></tr></thead>
                <tbody>
                  {matchWorkers.map(w=>{
                    const wCusts = state.customers.filter(c=>c.workerId===w.id);
                    return (
                      <tr key={w.id}>
                        <td>
                          <div className="flex-center">
                            <div className="avatar avatar-blue">{w.name[0]}</div>
                            <div>
                              <div className="fw-600">{highlight(w.name,q)}</div>
                              <div className="text-sm">{w.id}</div>
                            </div>
                          </div>
                        </td>
                        <td className="text-mono">{highlight(w.mobile||'—',q)}</td>
                        <td className="text-sm">{highlight(w.email||'—',q)}</td>
                        <td className="text-sm">{[w.area,w.city].filter(Boolean).join(', ')||'—'}</td>
                        <td><span className={`status-badge status-${w.status==='active'?'active':'inactive'}`}>{w.status}</span></td>
                        <td><span className="chip chip-blue">{wCusts.length} customers</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {/* ── Customers ──────────────────────────────────────────────── */}
          {showCusts && (
            <div className="table-wrap">
              <div className="table-header">
                <div className="table-title">👤 Customers ({matchCusts.length})</div>
              </div>
              <table>
                <thead><tr><th>Customer</th><th>Mobile</th><th>Email</th><th>Worker</th><th>Aadhaar</th><th>PAN</th><th>KYC Docs</th><th>Status</th></tr></thead>
                <tbody>
                  {matchCusts.map(c=>{
                    const worker = state.workers.find(w=>w.id===c.workerId);
                    const custCards = state.cards.filter(k=>k.customerId===c.id);
                    return (
                      <tr key={c.id}>
                        <td>
                          <div className="flex-center">
                            <div className="avatar avatar-green">{c.name[0]}</div>
                            <div>
                              <div className="fw-600">{highlight(c.name,q)}</div>
                              <div className="text-sm">{custCards.length} card{custCards.length!==1?'s':''}</div>
                            </div>
                          </div>
                        </td>
                        <td className="text-mono">{highlight(c.mobile||'—',q)}</td>
                        <td className="text-sm">{highlight(c.email||'—',q)}</td>
                        <td><span className="chip chip-blue" style={{fontSize:11}}>{worker?.name||'—'}</span></td>
                        <td className="text-mono" style={{fontSize:11}}>
                          {c.aadharNumber
                            ? <span style={{color:'var(--green)'}}>{highlight(c.aadharNumber,q)} ✓</span>
                            : <span style={{color:'var(--text3)'}}>—</span>}
                        </td>
                        <td className="text-mono" style={{fontSize:11}}>
                          {c.panNumber
                            ? <span style={{color:'var(--green)'}}>{highlight(c.panNumber.toUpperCase(),q)} ✓</span>
                            : <span style={{color:'var(--text3)'}}>—</span>}
                        </td>
                        <td>
                          <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
                            <span className={`chip ${c.docs?.aadharFront?'chip-green':'chip-red'}`} style={{fontSize:9}}>AadF {c.docs?.aadharFront?'✓':'✗'}</span>
                            <span className={`chip ${c.docs?.aadharBack?'chip-green':'chip-red'}`} style={{fontSize:9}}>AadB {c.docs?.aadharBack?'✓':'✗'}</span>
                            <span className={`chip ${c.docs?.pan?'chip-green':'chip-red'}`} style={{fontSize:9}}>PAN {c.docs?.pan?'✓':'✗'}</span>
                          </div>
                        </td>
                        <td>
                          <span className={`status-badge status-${c.status==='blocked'?'fraud':c.status}`}>{c.status}</span>
                          {c.inactiveReason&&<div style={{fontSize:10,color:'var(--red)',marginTop:2}}>⚠️ {c.inactiveReason}</div>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {/* ── Cards ─────────────────────────────────────────────────── */}
          {showCards && (
            <div className="table-wrap">
              <div className="table-header">
                <div className="table-title">💳 Cards ({matchCards.length})</div>
              </div>
              <table>
                <thead><tr><th>Customer</th><th>Worker</th><th>Bank</th><th>Card Number</th><th>Holder</th><th>Added By</th><th>Due</th><th>Limit</th></tr></thead>
                <tbody>
                  {matchCards.map(k=>{
                    const cust   = state.customers.find(c=>c.id===k.customerId);
                    const worker = state.workers.find(w=>w.id===cust?.workerId);
                    const addedBy = k.addedByWorkerId ? state.workers.find(w=>w.id===k.addedByWorkerId) : null;
                    const raw    = (k.cardNumber||'').replace(/\s/g,'');
                    const display = raw.length>=10
                      ? raw.slice(0,4)+' **** **** '+raw.slice(-4)
                      : ('**** **** **** '+(k.last4||''));
                    return (
                      <tr key={k.id}>
                        <td>
                          <div className="fw-600" style={{fontSize:13}}>{cust?.name||'—'}</div>
                          <div className="text-mono text-sm">{cust?.mobile||''}</div>
                        </td>
                        <td><span className="chip chip-blue" style={{fontSize:11}}>{worker?.name||'—'}</span></td>
                        <td>{k.bank}</td>
                        <td className="text-mono" style={{fontSize:12,letterSpacing:'0.12em',color:'var(--accent)'}}>
                          {display}
                        </td>
                        <td style={{fontSize:13}}>{k.holder}</td>
                        <td>
                          {addedBy
                            ? <div>
                                <div style={{fontSize:12,fontWeight:600,color:'var(--green)'}}>{addedBy.name}</div>
                                <div style={{fontSize:10,color:'var(--text3)'}}>{k.addedDate||'—'}</div>
                              </div>
                            : <span style={{color:'var(--text3)',fontSize:12}}>—</span>
                          }
                        </td>
                        <td><span className="chip chip-orange" style={{fontSize:10}}>{k.due?k.due+'th':'—'}</span></td>
                        <td className="text-mono text-green fw-600">₹{Number(k.limit||0).toLocaleString('en-IN')}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {/* ── Transactions ─────────────────────────────────────────── */}
          {showTxns && (
            <div className="table-wrap">
              <div className="table-header">
                <div className="table-title">💱 Transactions ({matchTxns.length})</div>
              </div>
              <table>
                <thead><tr><th>Date</th><th>Ref</th><th>Customer</th><th>Worker</th><th>Card</th><th>Amount</th><th>Type</th></tr></thead>
                <tbody>
                  {matchTxns.sort((a,b)=>b.date>a.date?1:-1).map(t=>{
                    const cust   = state.customers.find(c=>c.id===t.customerId);
                    const worker = state.workers.find(w=>w.id===t.workerId);
                    const card   = state.cards.find(k=>k.id===t.cardId);
                    const raw    = (card?.cardNumber||'').replace(/\s/g,'');
                    const display = raw.length>=10
                      ? raw.slice(0,4)+' **** **** '+raw.slice(-4)
                      : (card?'**** **** **** '+card.last4:'—');
                    return (
                      <tr key={t.id}>
                        <td className="text-sm">{t.date}</td>
                        <td className="text-mono text-accent" style={{fontSize:11}}>{t.txnRef}</td>
                        <td>
                          <div className="fw-600" style={{fontSize:13}}>{cust?.name||'—'}</div>
                          <div className="text-mono text-sm">{cust?.mobile||''}</div>
                        </td>
                        <td><span className="chip chip-blue" style={{fontSize:11}}>{worker?.name||'—'}</span></td>
                        <td className="text-mono" style={{fontSize:11}}>{display}</td>
                        <td className="debit-col fw-600">₹{t.amount.toLocaleString('en-IN')}</td>
                        <td><span className={`chip ${t.isBillPayment?'chip-red':'chip-green'}`} style={{fontSize:10}}>{t.isBillPayment?'🧾 Bill':'💳 Swipe'}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

        </div>
      )}
    </div>
  );
}

// ─── WORKER TRACKING PAGE ────────────────────────────────────────────────────
function TrackingPage({ state, user }) {
  const [query, setQuery] = useState('');
  const [searched, setSearched] = useState(false);

  const q = query.trim().toLowerCase();
  const qDigits = q.replace(/\D/g, '');

  function search() { if (!q) return; setSearched(true); }

  const matchCusts = q ? state.customers.filter(c=>c.workerId===user.id&&(
    c.name.toLowerCase().includes(q)||c.mobile.includes(q)||(c.email||'').toLowerCase().includes(q)||(c.aadharNumber||'').replace(/\s/g,'').includes(qDigits)||(c.panNumber||'').toLowerCase().includes(q)
  )) : [];
  const matchCards = q ? state.cards.filter(k=>{
    const cust=state.customers.find(c=>c.id===k.customerId);
    if(!cust||cust.workerId!==user.id) return false;
    const raw=(k.cardNumber||'').replace(/\s/g,'');
    return (qDigits.length>=4&&raw.includes(qDigits))||(qDigits.length===4&&k.last4===qDigits)||(k.holder||'').toLowerCase().includes(q)||(k.bank||'').toLowerCase().includes(q);
  }) : [];
  const matchTxns = q ? state.transactions.filter(t=>{
    if(t.workerId!==user.id) return false;
    const cust=state.customers.find(c=>c.id===t.customerId);
    const card=state.cards.find(k=>k.id===t.cardId);
    return (t.txnRef||'').toLowerCase().includes(q)||(cust?.name||'').toLowerCase().includes(q)||(cust?.mobile||'').includes(q)||(qDigits.length>=4&&(card?.cardNumber||'').replace(/\s/g,'').includes(qDigits));
  }) : [];
  const totalResults = matchCusts.length+matchCards.length+matchTxns.length;

  function getQueryType() {
    if (!q) return '';
    if (/^\d{16}$/.test(qDigits)) return '💳 16-digit Card Number';
    if (/^\d{12}$/.test(qDigits)) return '🪪 Aadhaar';
    if (/^\d{10}$/.test(q)) return '📱 Mobile';
    if (/^\d{4}$/.test(q)) return '💳 Card Last 4';
    if (/^[A-Z]{5}[0-9]{4}[A-Z]$/i.test(q)) return '📋 PAN';
    return '🔤 Name';
  }

  return (
    <div className="content fade-in">
      <div style={{maxWidth:680,margin:'0 auto 28px'}}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:28,marginBottom:8}}>🔎</div>
          <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>Track & Search</div>
          <div style={{fontSize:13,color:'var(--text3)'}}>Search by name, mobile, email, aadhaar, PAN or card number</div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <div style={{flex:1,position:'relative'}}>
            <input className="form-input" style={{paddingLeft:44,fontSize:15,height:50,borderRadius:12}} placeholder="Name / Mobile / Aadhaar / PAN / Card No..." value={query} onChange={e=>{setQuery(e.target.value);setSearched(false);}} onKeyDown={e=>e.key==='Enter'&&search()} autoFocus />
            <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',fontSize:18,opacity:0.5}}>🔎</span>
            {query&&<span onClick={()=>{setQuery('');setSearched(false);}} style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',cursor:'pointer',fontSize:16,color:'var(--text3)'}}>✕</span>}
          </div>
          <button className="btn btn-primary" style={{width:'auto',padding:'0 24px',borderRadius:12,fontSize:14}} onClick={search}>Search</button>
        </div>
        {query&&<div style={{marginTop:8,fontSize:11,color:'var(--text3)',textAlign:'center'}}>
          Searching as: <span style={{color:'var(--accent)',fontWeight:600}}>{getQueryType()}</span>
          {searched&&totalResults>0&&<span style={{marginLeft:8,color:'var(--green)',fontWeight:600}}>{totalResults} results</span>}
          {searched&&totalResults===0&&<span style={{marginLeft:8,color:'var(--red)',fontWeight:600}}>No results</span>}
        </div>}
      </div>
      {searched&&totalResults===0&&<div className="empty-state"><div className="empty-icon">🔍</div><div className="empty-text">No records found for "{query}"</div></div>}
      {searched&&totalResults>0&&<div style={{display:'flex',flexDirection:'column',gap:20}}>
        {matchCusts.length>0&&<div className="table-wrap">
          <div className="table-header"><div className="table-title">👤 Customers ({matchCusts.length})</div></div>
          <table><thead><tr><th>Customer</th><th>Mobile</th><th>Aadhaar</th><th>PAN</th><th>Address</th><th>Status</th></tr></thead>
          <tbody>{matchCusts.map(c=><tr key={c.id}>
            <td><div className="fw-600">{c.name}</div></td>
            <td className="text-mono">{c.mobile}</td>
            <td className="text-mono text-sm">{c.aadharNumber||<span style={{color:'var(--text3)'}}>—</span>}</td>
            <td className="text-mono text-sm">{c.panNumber||<span style={{color:'var(--text3)'}}>—</span>}</td>
            <td className="text-sm">{c.address||'—'}</td>
            <td><span className={`status-badge status-${c.status==='blocked'?'fraud':c.status}`}>{c.status}</span></td>
          </tr>)}</tbody></table>
        </div>}
        {matchCards.length>0&&<div className="table-wrap">
          <div className="table-header"><div className="table-title">💳 Cards ({matchCards.length})</div></div>
          <table><thead><tr><th>Customer</th><th>Bank</th><th>Card Number</th><th>Holder</th><th>Due</th><th>Limit</th></tr></thead>
          <tbody>{matchCards.map(k=>{
            const cust=state.customers.find(c=>c.id===k.customerId);
            const raw=(k.cardNumber||'').replace(/\s/g,'');
            const display=raw.length>=10?raw.slice(0,4)+' **** **** '+raw.slice(-4):'**** **** **** '+(k.last4||'');
            return <tr key={k.id}>
              <td><div className="fw-600">{cust?.name||'—'}</div><div className="text-mono text-sm">{cust?.mobile||''}</div></td>
              <td>{k.bank}</td>
              <td className="text-mono text-accent" style={{fontSize:12,letterSpacing:'0.1em'}}>{display}</td>
              <td>{k.holder}</td>
              <td><span className="chip chip-orange" style={{fontSize:10}}>{k.due?k.due+'th':'—'}</span></td>
              <td className="text-mono text-green fw-600">₹{Number(k.limit||0).toLocaleString('en-IN')}</td>
            </tr>;
          })}</tbody></table>
        </div>}
        {matchTxns.length>0&&<div className="table-wrap">
          <div className="table-header"><div className="table-title">💱 Transactions ({matchTxns.length})</div></div>
          <table><thead><tr><th>Date</th><th>Ref</th><th>Customer</th><th>Card</th><th>Amount</th><th>Type</th></tr></thead>
          <tbody>{matchTxns.sort((a,b)=>b.date>a.date?1:-1).map(t=>{
            const cust=state.customers.find(c=>c.id===t.customerId);
            const card=state.cards.find(k=>k.id===t.cardId);
            const raw=(card?.cardNumber||'').replace(/\s/g,'');
            const display=raw.length>=10?raw.slice(0,4)+' **** **** '+raw.slice(-4):(card?'**** **** **** '+card.last4:'—');
            return <tr key={t.id}>
              <td className="text-sm">{t.date}</td>
              <td className="text-mono text-accent" style={{fontSize:11}}>{t.txnRef}</td>
              <td><div className="fw-600" style={{fontSize:13}}>{cust?.name||'—'}</div><div className="text-mono text-sm">{cust?.mobile||''}</div></td>
              <td className="text-mono" style={{fontSize:11}}>{display}</td>
              <td className="debit-col fw-600">₹{t.amount.toLocaleString('en-IN')}</td>
              <td><span className={`chip ${t.isBillPayment?'chip-red':'chip-green'}`} style={{fontSize:10}}>{t.isBillPayment?'🧾 Bill':'💳 Swipe'}</span></td>
            </tr>;
          })}</tbody></table>
        </div>}
      </div>}
    </div>
  );
}


// ─── COMPLAINTS PAGE (Admin) ──────────────────────────────────────────────────

// ─── COMPLAINT CHAT COMPONENT ────────────────────────────────────────────────
function ComplaintChat({ complaint, currentUser, dispatch, onClose }) {
  const messages = complaint.messages || [];
  const [text, setText] = useState('');
  const bottomRef = React.useRef(null);

  React.useEffect(() => {
    if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior:'smooth' });
  }, [messages.length]);

  function sendMsg() {
    if (!text.trim()) return;
    dispatch({ type:'ADD_COMPLAINT_MSG', payload:{
      complaintId: complaint.id,
      msg: {
        id: 'MSG'+Date.now(),
        sender: currentUser.role === 'admin' ? 'admin' : 'worker',
        senderName: currentUser.role === 'admin' ? 'Admin' : currentUser.name,
        text: text.trim(),
        time: new Date().toLocaleString('en-IN',{dateStyle:'short',timeStyle:'short'}),
        ts: Date.now()
      }
    }});
    setText('');
  }

  const typeMeta = {
    cyber:      { icon:'🛡️', label:'Cyber Fraud',   col:'var(--red)' },
    chargeback: { icon:'↩️', label:'Chargeback',     col:'var(--orange)' },
    outstanding:{ icon:'💰', label:'Outstanding',    col:'var(--yellow)' },
  };
  const meta = typeMeta[complaint.complaintType] || { icon:'🚨', label:'General', col:'var(--accent)' };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div style={{
        background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:20,
        width:560, maxWidth:'95vw', maxHeight:'90vh', display:'flex', flexDirection:'column',
        boxShadow:'0 20px 60px rgba(0,0,0,0.5)', overflow:'hidden'
      }} onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div style={{padding:'16px 20px', background:'linear-gradient(135deg,var(--surface2),var(--surface3))', borderBottom:'1px solid var(--border)', flexShrink:0}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <span style={{fontSize:18}}>{meta.icon}</span>
                <span style={{fontWeight:700,fontSize:15}}>{meta.label}</span>
                <span className={`status-badge ${complaint.status==='pending'?'status-pending':'status-active'}`} style={{fontSize:10}}>{complaint.status}</span>
              </div>
              <div style={{fontSize:12,color:'var(--text2)'}}>
                <span style={{fontWeight:600}}>Customer:</span> {complaint.customerName}
                {complaint.cardInfo && <span style={{marginLeft:10,fontFamily:"'JetBrains Mono',monospace",color:meta.col}}> {meta.icon} ****{complaint.cardInfo.last4} {complaint.cardInfo.bank}</span>}
                {complaint.outstandingAmount!=null && <span style={{marginLeft:10,color:'var(--red)',fontWeight:600}}>₹{complaint.outstandingAmount.toLocaleString('en-IN',{maximumFractionDigits:0})} due</span>}
              </div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>
                Reported by <span style={{color:'var(--accent)',fontWeight:600}}>{complaint.workerName}</span> on {complaint.date}
              </div>
            </div>
            <button onClick={onClose} style={{background:'rgba(255,255,255,0.07)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text2)',cursor:'pointer',padding:'6px 10px',fontSize:14,fontFamily:"'Sora',sans-serif"}}>✕</button>
          </div>
          {/* Original complaint text */}
          <div style={{marginTop:10,padding:'10px 12px',background:'rgba(255,255,255,0.04)',borderRadius:10,borderLeft:'3px solid '+meta.col,fontSize:13,color:'var(--text2)',lineHeight:1.5}}>
            {complaint.text}
          </div>
        </div>

        {/* Chat messages */}
        <div style={{flex:1,overflowY:'auto',padding:'16px 20px',display:'flex',flexDirection:'column',gap:10,minHeight:200,maxHeight:360}}>
          {messages.length===0 && (
            <div style={{textAlign:'center',padding:'30px 0',color:'var(--text3)',fontSize:13}}>
              <div style={{fontSize:30,marginBottom:8}}>💬</div>
              No messages yet. Start the conversation.
            </div>
          )}
          {messages.map(msg => {
            const isAdmin   = msg.sender==='admin';
            const isMe = (currentUser.role==='admin' && isAdmin) || (currentUser.role==='worker' && !isAdmin);
            return (
              <div key={msg.id} style={{display:'flex',flexDirection:'column',alignItems:isMe?'flex-end':'flex-start'}}>
                <div style={{
                  maxWidth:'78%', padding:'10px 14px', borderRadius: isMe?'16px 16px 4px 16px':'16px 16px 16px 4px',
                  background: isMe
                    ? 'linear-gradient(135deg,var(--accent),var(--accent2))'
                    : 'var(--surface2)',
                  border: isMe ? 'none' : '1px solid var(--border)',
                  fontSize:13, lineHeight:1.5, color: isMe?'#fff':'var(--text)',
                  boxShadow: isMe?'0 2px 12px rgba(59,130,246,0.3)':'none'
                }}>
                  {msg.text}
                </div>
                <div style={{fontSize:10,color:'var(--text3)',marginTop:3,display:'flex',gap:6,alignItems:'center'}}>
                  <span style={{fontWeight:600,color:isAdmin?'var(--accent3)':'var(--green)'}}>{isAdmin?'🛡️ Admin':'👤 '+msg.senderName}</span>
                  <span>{msg.time}</span>
                </div>
              </div>
            );
          })}
          <div ref={bottomRef} />
        </div>

        {/* Input */}
        <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',background:'var(--surface2)',flexShrink:0}}>
          {complaint.status==='resolved'
            ? <div style={{textAlign:'center',fontSize:12,color:'var(--text3)',padding:'8px 0'}}>✅ This complaint is resolved. Reopen to continue chatting.</div>
            : <div style={{display:'flex',gap:10,alignItems:'flex-end'}}>
                <textarea
                  className="form-input"
                  rows={2}
                  placeholder="Type your message..."
                  value={text}
                  onChange={e=>setText(e.target.value)}
                  onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }}
                  style={{flex:1,resize:'none',fontSize:13,minHeight:44,borderRadius:10}}
                />
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  <button onClick={sendMsg} disabled={!text.trim()} style={{padding:'10px 16px',background:'linear-gradient(135deg,var(--accent),var(--accent2))',border:'none',borderRadius:10,color:'#fff',cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:13,opacity:text.trim()?1:0.5,whiteSpace:'nowrap'}}>
                    Send ↑
                  </button>
                  {currentUser.role==='admin' && complaint.status==='pending' && (
                    <button onClick={()=>{ dispatch({type:'RESOLVE_COMPLAINT',payload:complaint.id}); onClose(); }} style={{padding:'6px 10px',background:'rgba(16,185,129,0.15)',border:'1px solid rgba(16,185,129,0.3)',borderRadius:10,color:'var(--green)',cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:600,fontSize:11,whiteSpace:'nowrap'}}>
                      ✅ Resolve
                    </button>
                  )}
                </div>
              </div>
          }
        </div>
      </div>
    </div>
  );
}

// ─── COMPLAINTS PAGE (Admin) ──────────────────────────────────────────────────
function ComplaintsPage({ state, dispatch }) {
  const currentUser = { role:'admin', name:'Admin' };

  const complaints = (state.complaints||[]).sort((a,b)=>b.date>a.date?1:-1);
  const filtered = complaints
    .filter(c=>filter==='all'||c.status===filter)
    .filter(c=>typeFilter==='all'||c.complaintType===typeFilter);
  const typeMeta = {
    cyber:      { icon:'🛡️', label:'Cyber Fraud',  col:'chip-red' },
    chargeback: { icon:'↩️', label:'Chargeback',    col:'chip-orange' },
    outstanding:{ icon:'💰', label:'Outstanding',   col:'chip-yellow' },

        <div className="stat-card blue"><div className="stat-icon">↩️</div><div className="stat-label">Chargeback</div><div className="stat-value">{complaints.filter(c=>c.complaintType==='chargeback').length}</div></div>

        <div className="table-header">
          <div className="table-title">🚨 Complaints ({filtered.length})</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>

                        <td><div className="fw-600" style={{fontSize:13}}>{c.workerName||'—'}</div><div style={{fontSize:10,color:'var(--text3)'}}>Worker</div></td>

                          <div className="fw-600" style={{fontSize:13}}>{c.customerName||'—'}</div>
                          <div style={{fontSize:10,color:'var(--text3)',fontFamily:"'JetBrains Mono',monospace"}}>{(state.customers.find(x=>x.id===c.customerId)||{}).mobile||''}</div>

                            <div style={{fontSize:11,fontWeight:700,color:'var(--red)',marginTop:2}}>💰 ₹{c.outstandingAmount.toLocaleString('en-IN',{maximumFractionDigits:2})} due</div>

                          {(c.complaintType==='chargeback'||c.complaintType==='cyber')&&c.cardInfo&&(

                        </td>
                        <td style={{maxWidth:220}}><div style={{fontSize:13,lineHeight:1.5,color:'var(--text2)'}}>{c.text.length>80?c.text.slice(0,80)+'...':c.text}</div></td>

                      </tr>

                                  <th style={{textAlign:'right',padding:'5px 10px',color:'var(--red)',fontWeight:600}}>Debit</th>
                                  <th style={{textAlign:'right',padding:'5px 10px',color:'var(--green)',fontWeight:600}}>Credit</th>
                                  <th style={{textAlign:'right',padding:'5px 10px',color:'var(--text3)',fontWeight:600}}>Balance</th>
                                </tr>

                              <tbody>

                                    <td style={{padding:'5px 10px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",color:'var(--red)'}}>{r.debit>0?'₹'+r.debit.toLocaleString('en-IN',{maximumFractionDigits:2}):'—'}</td>
                                    <td style={{padding:'5px 10px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",color:'var(--green)'}}>{r.credit>0?'₹'+r.credit.toLocaleString('en-IN',{maximumFractionDigits:2}):'—'}</td>
                                    <td style={{padding:'5px 10px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:r.bal>0?'var(--red)':r.bal<0?'var(--green)':'var(--text3)'}}>₹{r.bal.toLocaleString('en-IN',{maximumFractionDigits:2})}</td>
                                  </tr>
                                ))}
                              </tbody>
                              <tfoot>
                                <tr style={{borderTop:'2px solid var(--border2)'}}>
                                  <td colSpan={4} style={{padding:'8px 10px',fontWeight:700,fontSize:13}}>Total Outstanding</td>
                                  <td style={{padding:'8px 10px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",fontWeight:800,fontSize:15,color:(c.outstandingAmount||0)>0?'var(--red)':'var(--green)'}}>
                                    ₹{(c.outstandingAmount||0).toLocaleString('en-IN',{maximumFractionDigits:2})}
                                  </td>
                                </tr>
                              </tfoot>
                            </table>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
        }
      </div>
    </div>
  );
}

// ─── WORKER COMPLAINTS PAGE ───────────────────────────────────────────────────
function WorkerComplaintsPage({ state, dispatch, user }) {
  const myComplaints = (state.complaints||[]).filter(c=>c.workerId===user.id).sort((a,b)=>b.date>a.date?1:-1);
  const [chatComplaint, setChatComplaint] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ type:'general', custId:'', subject:'', desc:'' });
  const [success, setSuccess] = useState('');
  const currentUser = { role:'worker', name:user.name, id:user.id };
  const myCustomers = state.customers.filter(c=>c.workerId===user.id);
  const liveChatComplaint = chatComplaint ? (state.complaints||[]).find(c=>c.id===chatComplaint.id)||chatComplaint : null;

  const typeMeta = {
    cyber:{icon:'🛡️',label:'Cyber Fraud',col:'chip-red'},
    chargeback:{icon:'↩️',label:'Chargeback',col:'chip-orange'},
    outstanding:{icon:'💰',label:'Outstanding',col:'chip-yellow'},
    general:{icon:'📋',label:'General',col:'chip-blue'},
    technical:{icon:'⚙️',label:'Technical',col:'chip-purple'},
    other:{icon:'🚨',label:'Other',col:'chip-red'},
  };

  function submitComplaint() {
    if (!form.subject.trim()) return alert('Subject required');
    if (!form.desc.trim())    return alert('Description required');
    const cust = myCustomers.find(c=>c.id===form.custId);
    dispatch({ type:'ADD_COMPLAINT', payload:{
      id:'CMP'+Date.now(), workerId:user.id, workerName:user.name,
      customerId:form.custId||null, customerName:cust?.name||'—',
      complaintType:form.type, subject:form.subject.trim(),
      text:form.desc.trim(), status:'pending',
      date:new Date().toISOString().slice(0,10), messages:[]
    }});
    setForm({ type:'general', custId:'', subject:'', desc:'' });
    setShowForm(false);
    setSuccess('✅ Complaint submitted!');
    setTimeout(()=>setSuccess(''),3000);
  }

  return (
    <div className="content fade-in">
      {liveChatComplaint && <ComplaintChat complaint={liveChatComplaint} currentUser={currentUser} dispatch={dispatch} onClose={()=>setChatComplaint(null)} />}
      {success && <div className="alert-banner alert-success">{success}</div>}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div className="stats-grid" style={{flex:1,marginBottom:0}}>
          <div className="stat-card blue"><div className="stat-label">Total</div><div className="stat-value">{myComplaints.length}</div></div>
          <div className="stat-card orange"><div className="stat-label">Pending</div><div className="stat-value">{myComplaints.filter(c=>c.status==='pending').length}</div></div>
          <div className="stat-card green"><div className="stat-label">Resolved</div><div className="stat-value">{myComplaints.filter(c=>c.status==='resolved').length}</div></div>
        </div>
        <button onClick={()=>setShowForm(true)} style={{marginLeft:16,padding:'11px 20px',background:'linear-gradient(135deg,var(--red),#dc2626)',border:'none',borderRadius:10,color:'#fff',cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:13,whiteSpace:'nowrap',flexShrink:0}}>
          ＋ New Complaint
        </button>
      </div>

      {myComplaints.length===0
        ? <div className="empty-state"><div className="empty-icon">✅</div><div className="empty-text">No complaints yet.</div></div>
        : <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {myComplaints.map(c=>{
              const meta = typeMeta[c.complaintType]||{icon:'🚨',label:'General',col:'chip-blue'};
              const msgCount = (c.messages||[]).length;
              const adminMsgs = (c.messages||[]).filter(m=>m.sender==='admin').length;
              const lastMsg = (c.messages||[])[msgCount-1];
              return (
                <div key={c.id} style={{background:'var(--surface)',border:`1px solid ${c.status==='pending'?'var(--border2)':'rgba(16,185,129,0.3)'}`,borderRadius:14,padding:'16px 18px',boxShadow:adminMsgs>0?'0 0 0 2px rgba(59,130,246,0.2)':'none'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,flexWrap:'wrap'}}>
                        <span className={`chip ${meta.col}`} style={{fontSize:11}}>{meta.icon} {meta.label}</span>
                        <span className={`status-badge ${c.status==='pending'?'status-pending':'status-active'}`}>{c.status}</span>
                        <span style={{fontSize:11,color:'var(--text3)'}}>{c.date}</span>
                      </div>
                      {c.subject&&<div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{c.subject}</div>}

      {showForm && (

// ─── SUBSCRIPTIONS ADMIN PAGE ─────────────────────────────────────────────────
function SubscriptionsAdminPage({ state, dispatch }) {
  const [showAssign,  setShowAssign]  = useState(false);
  const [assignForm,  setAssignForm]  = useState({ workerId:'', planId:'', startDate:new Date().toISOString().slice(0,10), paymentMode:'Cash', txnRef:'', notes:'' });
  const [filterStatus,setFilterStatus]= useState('all');
  const [filterWorker,setFilterWorker]= useState('all');
  const [successMsg,  setSuccessMsg]  = useState('');
  const [renewModal,  setRenewModal]  = useState(null);
  const plans   = state.plans||[];
  const workers = state.workers||[];
  const subs    = state.subscriptions||[];
  const today   = new Date();

  function getDaysLeft(expiryDate) {
    if (!expiryDate) return null;
    return Math.ceil((new Date(expiryDate) - today) / (1000*60*60*24));
  }

  function getSubStatus(s) {
    if (!s.expiryDate) return 'pending';
    const d = getDaysLeft(s.expiryDate);
    if (d < 0)  return 'expired';
    if (d <= 7) return 'expiring';
    return 'active';
  }

  const filtered = subs
    .filter(s=>filterStatus==='all'||getSubStatus(s)===filterStatus)
    .filter(s=>filterWorker==='all'||s.workerId===filterWorker)
    .sort((a,b)=>b.createdAt>a.createdAt?1:-1);

  const totalActive   = subs.filter(s=>getSubStatus(s)==='active').length;
  const totalExpiring = subs.filter(s=>getSubStatus(s)==='expiring').length;
  const totalExpired  = subs.filter(s=>getSubStatus(s)==='expired').length;
  const totalRevenue  = subs.reduce((s,x)=>s+(x.planPrice||0),0);

  function assignPlan() {
    if (!assignForm.workerId) return alert('Select a worker');
    if (!assignForm.planId)   return alert('Select a plan');
    const plan = plans.find(p=>p.id===assignForm.planId);
    const start = new Date(assignForm.startDate);
    const expiry = new Date(start); expiry.setDate(expiry.getDate()+plan.duration);
    dispatch({ type:'ADD_SUBSCRIPTION', payload:{
      id:'SUB'+Date.now(), workerId:assignForm.workerId,
      planId:assignForm.planId, planName:plan.name, planPrice:plan.price, planColor:plan.color||'blue',
      duration:plan.duration, startDate:assignForm.startDate,
      expiryDate:expiry.toISOString().slice(0,10), status:'active',
      paymentMode:assignForm.paymentMode, txnRef:assignForm.txnRef.trim(),
      notes:assignForm.notes.trim(), createdAt:new Date().toISOString().slice(0,10),
      payments:[{ amount:plan.price, date:assignForm.startDate, mode:assignForm.paymentMode, ref:assignForm.txnRef.trim()||('RCP'+Date.now()), note:'Initial payment' }]
    }});
    setShowAssign(false);
    setAssignForm({ workerId:'', planId:'', startDate:new Date().toISOString().slice(0,10), paymentMode:'Cash', txnRef:'', notes:'' });
    setSuccessMsg('✅ Plan assigned successfully!');
    setTimeout(()=>setSuccessMsg(''),3000);
  }

  function doRenew(sub) {
    const plan = plans.find(p=>p.id===sub.planId);
    if (!plan) return alert('Plan not found');
    const base = getDaysLeft(sub.expiryDate)>=0 ? new Date(sub.expiryDate) : new Date();
    const newExpiry = new Date(base); newExpiry.setDate(newExpiry.getDate()+plan.duration);
    dispatch({ type:'RENEW_SUBSCRIPTION', payload:{ id:sub.id, expiryDate:newExpiry.toISOString().slice(0,10), status:'active',
      payment:{ amount:plan.price, date:new Date().toISOString().slice(0,10), mode:renewModal?.mode||'Cash', ref:renewModal?.ref||'RCP'+Date.now(), note:'Renewal' }
    }});
    setRenewModal(null);
    setSuccessMsg('✅ Subscription renewed!');
    setTimeout(()=>setSuccessMsg(''),3000);
  }

  const colorMap = { blue:'var(--accent)', purple:'var(--accent3)', gold:'var(--orange)', green:'var(--green)' };

  return (
    <div className="content fade-in">
      {successMsg && <div className="alert-banner alert-success">{successMsg}</div>}

      {/* Pending Requests */}
      {(()=>{
        const pendingReqs = (state.subscriptionRequests||[]).filter(r=>r.status==='pending').sort((a,b)=>b.createdAt>a.createdAt?1:-1);
        if(pendingReqs.length===0) return null;
        return (
          <div style={{marginBottom:24}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:12,display:'flex',alignItems:'center',gap:8}}>
              🔔 Pending Purchase Requests
              <span style={{background:'var(--red)',color:'#fff',borderRadius:10,padding:'1px 8px',fontSize:11,fontWeight:700}}>{pendingReqs.length}</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {pendingReqs.map(r=>{
                const w=workers.find(x=>x.id===r.workerId);
                return (
                  <div key={r.id} style={{background:'rgba(245,158,11,0.07)',border:'1px solid rgba(245,158,11,0.3)',borderRadius:14,padding:'14px 18px',display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
                    <div style={{flex:1,minWidth:200}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                        <div className="avatar avatar-blue">{(w?.name||'?')[0]}</div>
                        <div>
                          <div style={{fontWeight:700,fontSize:14}}>{w?.name||r.workerName}</div>
                          <div style={{fontSize:11,color:'var(--text3)'}}>{w?.mobile||r.workerEmail||''}</div>
                        </div>
                      </div>
                      <div style={{fontSize:13,marginBottom:3}}>
                        Wants: <strong style={{color:'var(--accent)'}}>{r.planName}</strong> — <span style={{fontFamily:"'JetBrains Mono',monospace",color:'var(--green)',fontWeight:700}}>₹{r.planPrice.toLocaleString('en-IN')}</span>
                      </div>
                      <div style={{fontSize:12,color:'var(--text3)'}}>
                        Payment: <strong>{r.paymentMode}</strong>
                        {r.txnRef&&<span style={{fontFamily:"'JetBrains Mono',monospace",marginLeft:6,color:'var(--accent)'}}>· {r.txnRef}</span>}
                        {r.notes&&<span style={{marginLeft:6}}>· "{r.notes}"</span>}
                      </div>
                      <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Requested on {r.createdAt}</div>
                    </div>
                    <div style={{display:'flex',gap:8}}>
                      <button onClick={()=>{dispatch({type:'APPROVE_PLAN_REQUEST',payload:{id:r.id}});setSuccessMsg('✅ Plan activated for '+( w?.name||r.workerName)+'!');setTimeout(()=>setSuccessMsg(''),3000);}} style={{padding:'10px 18px',background:'linear-gradient(135deg,var(--green),#059669)',border:'none',borderRadius:10,color:'#fff',cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:13}}>
                        ✅ Approve
                      </button>
                      <button onClick={()=>{dispatch({type:'REJECT_PLAN_REQUEST',payload:r.id});setSuccessMsg('Request rejected.');setTimeout(()=>setSuccessMsg(''),3000);}} style={{padding:'10px 14px',background:'rgba(239,68,68,0.12)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:10,color:'var(--red)',cursor:'pointer',fontFamily:"'Sora',sans-serif",fontWeight:600,fontSize:13}}>
                        ✕ Reject
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* Stats */}
      <div className="stats-grid" style={{marginBottom:24}}>
        <div className="stat-card green"><div className="stat-icon">✅</div><div className="stat-label">Active</div><div className="stat-value">{totalActive}</div></div>
        <div className="stat-card orange"><div className="stat-icon">⚠️</div><div className="stat-label">Expiring (7d)</div><div className="stat-value">{totalExpiring}</div></div>
        <div className="stat-card red"><div className="stat-icon">❌</div><div className="stat-label">Expired</div><div className="stat-value">{totalExpired}</div></div>
        <div className="stat-card purple"><div className="stat-icon">💰</div><div className="stat-label">Total Revenue</div><div className="stat-value mono" style={{fontSize:17}}>₹{totalRevenue.toLocaleString('en-IN')}</div></div>
      </div>

      {/* Table */}
      <div className="table-wrap">
        <div className="table-header">
          <div className="table-title">🔑 Worker Subscriptions ({filtered.length})</div>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <select className="search-input" style={{width:140}} value={filterWorker} onChange={e=>setFilterWorker(e.target.value)}>
              <option value="all">All Workers</option>
              {workers.map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
            </select>
            <div style={{display:'flex',gap:4}}>
              {['all','active','expiring','expired'].map(f=>(
                <button key={f} className={`btn btn-sm ${filterStatus===f?'btn-primary':'btn-outline'}`} onClick={()=>setFilterStatus(f)} style={{textTransform:'capitalize',fontSize:11}}>{f}</button>
              ))}
            </div>
            {plans.length>0&&workers.length>0&&<button className="btn btn-sm btn-primary" onClick={()=>setShowAssign(true)}>+ Assign Plan</button>}
          </div>
        </div>

        {filtered.length===0
          ? <div className="empty-state"><div className="empty-icon">🔑</div><div className="empty-text">{plans.length===0?'Create plans first from Manage Plans.':'No subscriptions found.'}</div></div>
          : <table>
              <thead><tr><th>Worker</th><th>Plan</th><th>Price</th><th>Start</th><th>Expiry</th><th>Payment</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                {filtered.map(s=>{
                  const w  = workers.find(x=>x.id===s.workerId);
                  const st = getSubStatus(s);
                  const dl = getDaysLeft(s.expiryDate);
                  const col = colorMap[s.planColor]||'var(--accent)';
                  return (
                    <tr key={s.id}>
                      <td>
                        <div className="flex-center">
                          <div className="avatar avatar-blue">{(w?.name||'?')[0]}</div>
                          <div><div className="fw-600" style={{fontSize:13}}>{w?.name||'—'}</div><div className="text-sm">{w?.mobile||''}</div></div>
                        </div>
                      </td>
                      <td>
                        <div style={{display:'flex',alignItems:'center',gap:7}}>
                          <div style={{width:10,height:10,borderRadius:'50%',background:col,flexShrink:0}}/>
                          <div>
                            <div className="fw-600" style={{fontSize:13}}>{s.planName}</div>
                            <div className="text-sm">{s.duration} days</div>
                          </div>
                        </div>
                      </td>
                      <td className="text-mono fw-600 text-green">₹{(s.planPrice||0).toLocaleString('en-IN')}</td>
                      <td className="text-sm">{s.startDate||'—'}</td>
                      <td>
                        <div className="fw-600" style={{fontSize:13,color:st==='expired'?'var(--red)':st==='expiring'?'var(--orange)':'var(--text)'}}>{s.expiryDate||'—'}</div>
                        {dl!==null&&<div style={{fontSize:10,color:st==='expired'?'var(--red)':st==='expiring'?'var(--orange)':'var(--text3)',marginTop:1}}>{dl<0?'Expired '+Math.abs(dl)+'d ago':dl===0?'Expires today!':dl+'d left'}</div>}
                      </td>
                      <td>
                        <div style={{fontSize:12}}>{s.paymentMode||'—'}</div>
                        {s.txnRef&&<div className="text-mono text-sm" style={{fontSize:10}}>{s.txnRef}</div>}
                      </td>
                      <td>
                        <span className={`chip ${st==='active'?'chip-green':st==='expiring'?'chip-yellow':'chip-red'}`} style={{fontSize:11}}>
                          {st==='active'?'✅ Active':st==='expiring'?'⚠️ Expiring':'🔴 Expired'}
                        </span>
                      </td>
                      <td>
                        <div className="action-btns">
                          <button className="btn btn-sm btn-success" style={{fontSize:10}} onClick={()=>setRenewModal({sub:s,mode:'Cash',ref:''})}>🔄 Renew</button>
                          {st!=='expired'&&<button className="btn btn-sm btn-danger" style={{fontSize:10}} onClick={()=>{if(window.confirm('Expire this subscription?'))dispatch({type:'EXPIRE_SUBSCRIPTION',payload:s.id});}}>⛔</button>}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
        }
      </div>

      {/* Assign Modal */}
      {showAssign && <div className="modal-overlay" onClick={()=>setShowAssign(false)}>
        <div className="modal" style={{width:500}} onClick={e=>e.stopPropagation()}>
          <div className="modal-title">🔑 Assign Subscription Plan</div>
          <div className="modal-sub">Assign a plan to a worker and record payment.</div>
          <div className="form-group"><label className="form-label">Worker *</label>
            <select className="form-input" value={assignForm.workerId} onChange={e=>setAssignForm({...assignForm,workerId:e.target.value})}>
              <option value="">Select Worker</option>
              {workers.filter(w=>w.status==='active').map(w=><option key={w.id} value={w.id}>{w.name} — {w.mobile||w.email}</option>)}
            </select>
          </div>
          <div className="form-group"><label className="form-label">Plan *</label>
            <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:4}}>
              {plans.filter(p=>p.active!==false).map(p=>(
                <label key={p.id} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',background:assignForm.planId===p.id?'rgba(59,130,246,0.1)':'var(--surface2)',border:`1px solid ${assignForm.planId===p.id?'var(--accent)':'var(--border)'}`,borderRadius:10,cursor:'pointer',transition:'all 0.15s'}}>
                  <input type="radio" name="plan" value={p.id} checked={assignForm.planId===p.id} onChange={e=>setAssignForm({...assignForm,planId:e.target.value})} style={{cursor:'pointer'}} />
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13}}>{p.name} {p.popular&&<span style={{fontSize:10,color:'var(--orange)',marginLeft:4}}>⭐ Popular</span>}</div>
                    <div style={{fontSize:11,color:'var(--text3)'}}>{p.duration} days · {(p.features||[]).length} features</div>
                  </div>
                  <div className="text-mono fw-600 text-green" style={{fontSize:15}}>₹{p.price.toLocaleString('en-IN')}</div>
                </label>
              ))}
            </div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Start Date *</label><input type="date" className="form-input" value={assignForm.startDate} onChange={e=>setAssignForm({...assignForm,startDate:e.target.value})} /></div>
            <div className="form-group"><label className="form-label">Payment Mode</label>
              <select className="form-input" value={assignForm.paymentMode} onChange={e=>setAssignForm({...assignForm,paymentMode:e.target.value})}>
                {['Cash','UPI','Bank Transfer','Cheque','Free / Trial','Other'].map(m=><option key={m}>{m}</option>)}
              </select>
            </div>
          </div>
          <div className="form-group"><label className="form-label">Transaction Ref / Receipt No</label><input className="form-input text-mono" placeholder="UTR / Ref number (optional)" value={assignForm.txnRef} onChange={e=>setAssignForm({...assignForm,txnRef:e.target.value})} /></div>
          <div className="form-group"><label className="form-label">Notes</label><input className="form-input" placeholder="Any notes..." value={assignForm.notes} onChange={e=>setAssignForm({...assignForm,notes:e.target.value})} /></div>
          <div className="modal-footer">
            <button className="btn btn-secondary" onClick={()=>setShowAssign(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={assignPlan}>🔑 Assign Plan</button>
          </div>
        </div>
      </div>}

      {/* Renew Modal */}
      {renewModal && <div className="modal-overlay" onClick={()=>setRenewModal(null)}>
        <div className="modal" style={{width:420}} onClick={e=>e.stopPropagation()}>
          <div className="modal-title">🔄 Renew Subscription</div>
          <div style={{padding:'12px 14px',background:'rgba(59,130,246,0.07)',border:'1px solid rgba(59,130,246,0.2)',borderRadius:10,marginBottom:18}}>
            <div className="fw-600">{workers.find(w=>w.id===renewModal.sub.workerId)?.name}</div>
            <div className="text-sm">{renewModal.sub.planName} — ₹{renewModal.sub.planPrice} / {renewModal.sub.duration} days</div>
            <div className="text-sm" style={{marginTop:4}}>New expiry: <strong style={{color:'var(--green)'}}>
              {(()=>{ const base=getDaysLeft(renewModal.sub.expiryDate)>=0?new Date(renewModal.sub.expiryDate):new Date(); const ne=new Date(base); ne.setDate(ne.getDate()+(renewModal.sub.duration||30)); return ne.toISOString().slice(0,10); })()}
            </strong></div>
          </div>
          <div className="form-group"><label className="form-label">Payment Mode</label>
            <select className="form-input" value={renewModal.mode} onChange={e=>setRenewModal({...renewModal,mode:e.target.value})}>
              {['Cash','UPI','Bank Transfer','Cheque','Free / Trial','Other'].map(m=><option key={m}>{m}</option>)}
            </select>
          </div>
          <div className="form-group"><label className="form-label">Transaction Ref</label><input className="form-input text-mono" placeholder="UTR / Ref (optional)" value={renewModal.ref} onChange={e=>setRenewModal({...renewModal,ref:e.target.value})} /></div>
          <div className="modal-footer">
            <button className="btn btn-secondary" onClick={()=>setRenewModal(null)}>Cancel</button>
            <button className="btn btn-primary" style={{background:'linear-gradient(135deg,var(--green),#059669)'}} onClick={()=>doRenew(renewModal.sub)}>🔄 Confirm Renewal</button>
          </div>
        </div>
      </div>}
    </div>
  );
}


// ─── WORKER MY PLAN PAGE ─────────────────────────────────────────────────────
function WorkerMyPlanPage({ state, dispatch, user }) {
  const today = new Date().toISOString().slice(0,10);
  const activePlans = (state.plans||[]).filter(p=>p.active!==false);
  const mySubs = (state.subscriptions||[]).filter(s=>s.workerId===user.id).sort((a,b)=>b.createdAt>a.createdAt?1:-1);
  const activeSub = mySubs.find(s=>s.status==='active'&&s.expiryDate>=today);
  const myRequests = (state.subscriptionRequests||[]).filter(r=>r.workerId===user.id).sort((a,b)=>b.createdAt>a.createdAt?1:-1);
  const pendingReq = myRequests.find(r=>r.status==='pending');

  const [selectedPlan, setSelectedPlan] = useState(null);
  const [showReqModal, setShowReqModal] = useState(false);
  const [reqForm, setReqForm] = useState({ paymentMode:'UPI', txnRef:'', notes:'' });
  const [success, setSuccess] = useState('');

  const colorMap = {
    blue:   { bg:'linear-gradient(135deg,#1e3a8a,#3730a3)', border:'rgba(59,130,246,0.5)',  text:'#93c5fd', glow:'rgba(59,130,246,0.25)' },
    purple: { bg:'linear-gradient(135deg,#4c1d95,#6d28d9)', border:'rgba(139,92,246,0.5)', text:'#c4b5fd', glow:'rgba(139,92,246,0.25)' },
    gold:   { bg:'linear-gradient(135deg,#78350f,#b45309)', border:'rgba(245,158,11,0.5)', text:'#fcd34d', glow:'rgba(245,158,11,0.2)' },
    green:  { bg:'linear-gradient(135deg,#064e3b,#065f46)', border:'rgba(16,185,129,0.5)', text:'#6ee7b7', glow:'rgba(16,185,129,0.2)' },
  };

  function daysLeft(exp) {
    return Math.ceil((new Date(exp)-new Date())/(1000*60*60*24));
  }

  function sendRequest() {
    if (!selectedPlan) return alert('Select a plan');
    dispatch({ type:'ADD_PLAN_REQUEST', payload:{
      id:'REQ'+Date.now(),
      workerId:user.id, workerName:user.name, workerEmail:user.email||'',
      planId:selectedPlan.id, planName:selectedPlan.name, planPrice:selectedPlan.price, planDuration:selectedPlan.duration,
      paymentMode:reqForm.paymentMode, txnRef:reqForm.txnRef.trim(), notes:reqForm.notes.trim(),
      status:'pending', createdAt:new Date().toISOString().slice(0,10), respondedAt:null
    }});
    setShowReqModal(false);
    setSuccess('✅ Request sent to Admin! They will activate your plan shortly.');
    setTimeout(()=>setSuccess(''),5000);
  }

  return (
    <div className="content fade-in">
      {success && <div className="alert-banner alert-success">{success}</div>}

      {/* Current Plan Status */}
      <div style={{marginBottom:28}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>💎 My Subscription</div>
        {activeSub ? (
          <div style={{background:'linear-gradient(135deg,rgba(16,185,129,0.12),rgba(5,150,105,0.08))',border:'1px solid rgba(16,185,129,0.35)',borderRadius:16,padding:'20px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:16}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <span style={{fontSize:20}}>✅</span>
                <span style={{fontSize:18,fontWeight:800,color:'var(--green)'}}>Active — {activeSub.planName}</span>
              </div>
              <div style={{fontSize:12,color:'var(--text3)',fontFamily:"'JetBrains Mono',monospace"}}>
                {activeSub.startDate} → {activeSub.expiryDate}
              </div>
              <div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>
                Payment: {activeSub.paymentMode} {activeSub.txnRef?'· '+activeSub.txnRef:''}
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:4}}>Days Remaining</div>
              <div style={{fontSize:36,fontWeight:800,color:daysLeft(activeSub.expiryDate)<=7?'var(--orange)':' var(--green)',fontFamily:"'Space Grotesk',sans-serif"}}>
                {daysLeft(activeSub.expiryDate)}
              </div>
              {daysLeft(activeSub.expiryDate)<=10 && (
                <div style={{fontSize:11,color:'var(--orange)',fontWeight:600,marginTop:2}}>⚠️ Expiring soon — renew now!</div>
              )}
            </div>
          </div>
        ) : (
          <div style={{background:'rgba(239,68,68,0.07)',border:'1px solid rgba(239,68,68,0.25)',borderRadius:16,padding:'18px 22px',display:'flex',alignItems:'center',gap:14}}>
            <div style={{fontSize:32}}>🔒</div>
            <div>
              <div style={{fontWeight:700,fontSize:15,color:'var(--red)',marginBottom:3}}>No Active Subscription</div>
              <div style={{fontSize:12,color:'var(--text3)'}}>Buy a plan below to activate your account.</div>
            </div>
          </div>
        )}
      </div>

      {/* Pending Request Banner */}
      {pendingReq && (
        <div style={{background:'rgba(245,158,11,0.08)',border:'1px solid rgba(245,158,11,0.3)',borderRadius:12,padding:'14px 18px',marginBottom:20,display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:20}}>⏳</span>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:'var(--orange)'}}>Request Pending — {pendingReq.planName}</div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>₹{pendingReq.planPrice} · {pendingReq.paymentMode}{pendingReq.txnRef?' · '+pendingReq.txnRef:''} · Sent on {pendingReq.createdAt}</div>
            <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>Admin will review and activate your plan shortly.</div>
          </div>
        </div>
      )}

      {/* Available Plans */}
      <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>📦 Available Plans</div>
      {activePlans.length===0
        ? <div className="empty-state"><div className="empty-icon">📦</div><div className="empty-text">No plans available. Contact Admin.</div></div>
        : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:20,marginBottom:28}}>
            {activePlans.map(p=>{
              const cm = colorMap[p.color]||colorMap.blue;
              const isCurrent = activeSub&&activeSub.planId===p.id;
              const isSelected = selectedPlan?.id===p.id;
              return (
                <div
                  key={p.id}
                  onClick={()=>setSelectedPlan(isSelected?null:p)}
                  style={{
                    background:cm.bg, border:`2px solid ${isSelected?'#fff':isCurrent?'rgba(255,255,255,0.5)':cm.border}`,
                    borderRadius:18, overflow:'hidden', position:'relative',
                    boxShadow:`0 8px 32px rgba(0,0,0,0.3)${isSelected?', 0 0 0 3px '+cm.glow:''}`,
                    cursor:'pointer', transition:'all 0.2s',
                    transform:isSelected?'translateY(-4px) scale(1.02)':' translateY(0) scale(1)'
                  }}
                >
                  {isCurrent && <div style={{position:'absolute',top:12,left:12,background:'rgba(16,185,129,0.9)',color:'#fff',fontSize:10,fontWeight:800,padding:'3px 10px',borderRadius:20,zIndex:2}}>✅ Current Plan</div>}
                  {p.popular&&!isCurrent && <div style={{position:'absolute',top:12,right:12,background:'rgba(255,255,255,0.2)',backdropFilter:'blur(8px)',border:'1px solid rgba(255,255,255,0.3)',borderRadius:20,padding:'3px 12px',fontSize:11,fontWeight:700,color:'#fff',zIndex:2}}>⭐ Popular</div>}

                💳 Buy Now — ₹{selectedPlan.price.toLocaleString('en-IN')}

      {/* Payment / Request Modal */}
      {showReqModal && selectedPlan && (

                  <div style={{fontWeight:700,fontSize:15}}>{selectedPlan.name}</div>
                  <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{selectedPlan.duration} days validity</div>

      {/* My History */}
      {mySubs.length>0 && (
